    function handleSlotClick(slotIndex, slotPos) {
  const currentPid = gameState.squadSlots ? gameState.squadSlots[String(slotIndex)] : null;

  // ── Нет выбранного игрока ──────────────────────────────────────────────
  if (selectedReservePlayerId === null) {
    if (currentPid != null) {
      // Просто запоминаем кто выбран — НЕ удаляем из слота!
      selectedReservePlayerId = currentPid;
      renderSquadModal(); // перерисовываем с подсветкой
    }
    return;
  }

  // ── Есть выбранный, кликнули на того же — снимаем выделение ───────────
  if (currentPid === selectedReservePlayerId) {
    selectedReservePlayerId = null;
    renderSquadModal();
    return;
  }

  // ── Есть выбранный, кликнули на занятый слот — меняем местами ─────────
  if (currentPid != null) {
    // Найдём откуда пришёл выбранный игрок
    let originType = 'reserve';
    let originIndex = null;

    for (const k in gameState.squadSlots) {
      if (gameState.squadSlots[k] === selectedReservePlayerId) {
        originType = 'squad';
        originIndex = parseInt(k);
        break;
      }
    }
    if (originType === 'reserve') {
      for (const k in gameState.benchSlots) {
        if (gameState.benchSlots[k] === selectedReservePlayerId) {
          originType = 'bench';
          originIndex = parseInt(k);
          break;
        }
      }
    }

    // Проверяем совместимость позиций (GK нельзя на поле и наоборот)
    const selectedPlayer = findPlayerById(selectedReservePlayerId);
    const penalty = getPositionPenalty(selectedPlayer, slotPos);
    if (penalty >= 999) {
      botReply('❌ Вратаря нельзя поставить на позицию полевого игрока и наоборот.', 400);
      selectedReservePlayerId = null;
      renderSquadModal();
      return;
    }

    // Убираем выбранного с его старого места
    if (originType === 'squad')       delete gameState.squadSlots[String(originIndex)];
    else if (originType === 'bench')  delete gameState.benchSlots[String(originIndex)];

    // Убираем целевого с его места
    delete gameState.squadSlots[String(slotIndex)];

    // Ставим выбранного на целевой слот
    gameState.squadSlots[String(slotIndex)] = selectedReservePlayerId;

    // Ставим целевого на место выбранного
    if (originType === 'squad')       gameState.squadSlots[String(originIndex)] = currentPid;
    else if (originType === 'bench')  gameState.benchSlots[String(originIndex)] = currentPid;

    saveState();
    selectedReservePlayerId = null;
    renderSquadModal();
    return;
  }

  // ── Есть выбранный, кликнули на пустой слот — ставим туда ─────────────
  assignToSlot(selectedReservePlayerId, slotIndex, slotPos);
  selectedReservePlayerId = null;
  renderSquadModal();
}

function handleBenchClick(benchIndex) {
  const currentPid = gameState.benchSlots ? gameState.benchSlots[String(benchIndex)] : null;

  // ── Нет выбранного игрока ──────────────────────────────────────────────
  if (selectedReservePlayerId === null) {
    if (currentPid != null) {
      // Просто запоминаем кто выбран — НЕ удаляем со скамейки!
      selectedReservePlayerId = currentPid;

    return;

  // ── Есть выбранный, кликнули на того же — снимаем выделение ───────────
  if (currentPid === selectedReservePlayerId) {
    selectedReservePlayerId = null;
    renderSquadModal();
    return;
  }

  // ── Есть выбранный, кликнули на занятое место скамейки — меняем ───────
  if (currentPid != null) {
    let originType = 'reserve';
    let originIndex = null;

    for (const k in gameState.squadSlots) {
      if (gameState.squadSlots[k] === selectedReservePlayerId) {

    if (originType === 'reserve') {

    // Убираем выбранного с его старого места
    if (originType === 'squad')       delete gameState.squadSlots[String(originIndex)];
    else if (originType === 'bench')  delete gameState.benchSlots[String(originIndex)];

    // Убираем целевого с его места на скамейке
    delete gameState.benchSlots[String(benchIndex)];

    // Ставим выбранного на скамейку
    gameState.benchSlots[String(benchIndex)] = selectedReservePlayerId;

    // Ставим целевого на место выбранного
    if (originType === 'squad')       gameState.squadSlots[String(originIndex)] = currentPid;
    else if (originType === 'bench')  gameState.benchSlots[String(originIndex)] = currentPid;

  // ── Есть выбранный, кликнули на пустое место — ставим туда ───────────
  assignToBench(selectedReservePlayerId, benchIndex);
  selectedReservePlayerId = null;
  renderSquadModal();
}

    // ── DRAG AND DROP ──────────────────────────────────────────────────────
    let dragPlayerId = null;
    function handleDragStart(event) {
      const el = event.target.closest('[data-player-id]');
      if (!el) return;
      dragPlayerId = parseInt(el.getAttribute('data-player-id'));
      event.dataTransfer.setData('text/plain', String(dragPlayerId));
      event.dataTransfer.effectAllowed = 'move';
    }
    function handleDragOver(event) {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      const target = event.target.closest('.slot, .bench-slot');
      if (target) { target.style.borderColor = '#f0c040'; target.style.background = 'rgba(240,192,64,0.12)'; }
    }
    function handleDragLeave(event) {
      const target = event.target.closest('.slot, .bench-slot');
      if (target) { target.style.borderColor = ''; target.style.background = ''; }
    }
    function handleDrop(event) {
      event.preventDefault();
      const target = event.target.closest('.slot, .bench-slot');
      if (!target) return;
      target.style.borderColor = ''; target.style.background = '';
      const playerId = dragPlayerId || parseInt(event.dataTransfer.getData('text/plain'));
      dragPlayerId = null;
      if (!playerId || isNaN(playerId)) return;
      const player = findPlayerById(playerId);
      if (!player) return;
      if (target.hasAttribute('data-slot')) {
        const slotIndex = parseInt(target.getAttribute('data-slot'));
        const slotPos   = target.getAttribute('data-pos');
        const currentPid = gameState.squadSlots ? gameState.squadSlots[String(slotIndex)] : null;
        if (currentPid == null) assignToSlot(playerId, slotIndex, slotPos);
        else swapPlayers(playerId, slotIndex, slotPos);
      } else if (target.hasAttribute('data-bench')) {
        const benchIndex = parseInt(target.getAttribute('data-bench'));
        const currentPid = gameState.benchSlots ? gameState.benchSlots[String(benchIndex)] : null;
        if (currentPid == null) assignToBench(playerId, benchIndex);
        else swapPlayersToBench(playerId, benchIndex);
      }
    }

    // ── SWAP / ASSIGN ──────────────────────────────────────────────────────
    function swapPlayers(movedPlayerId, targetSlotIndex, targetSlotPos) {
      if (!gameState.squadSlots) gameState.squadSlots = {};
      if (!gameState.benchSlots) gameState.benchSlots = {};
      const movedPlayer = findPlayerById(movedPlayerId);
      if (!movedPlayer) return;
      let originSlotIndex = null, originIsBench = false, originBenchIndex = null;
      for (const k in gameState.squadSlots) if (gameState.squadSlots[k] === movedPlayerId) { originSlotIndex = parseInt(k); break; }
      if (originSlotIndex === null) for (const k in gameState.benchSlots) if (gameState.benchSlots[k] === movedPlayerId) { originBenchIndex = parseInt(k); originIsBench = true; break; }
      const currentTargetPid = gameState.squadSlots[String(targetSlotIndex)];
      const currentTargetPlayer = currentTargetPid ? findPlayerById(currentTargetPid) : null;
      if (currentTargetPlayer) {
        const penalty1 = getPositionPenalty(movedPlayer, targetSlotPos);
        if (penalty1 >= 999) { botReply('❌ Вратаря нельзя поставить на позицию полевого игрока и наоборот.', 400); return; }
        if (originSlotIndex !== null) {
          const originPos = getCurrentFormation().positions[originSlotIndex];
          if (getPositionPenalty(currentTargetPlayer, originPos) >= 999) { botReply('❌ Вратаря нельзя поставить на позицию полевого игрока и наоборот.', 400); return; }
        }
      }
      if (originSlotIndex !== null) delete gameState.squadSlots[String(originSlotIndex)];
      else if (originIsBench) delete gameState.benchSlots[String(originBenchIndex)];
      if (currentTargetPlayer) {

function autoPickSquad() {
  if (!gameState.myPlayers || gameState.myPlayers.length === 0) {
    botReply('❌ Нет игроков для подбора.', 300);
    return;
  }

  const formation = getCurrentFormation();
  const positions = formation.positions; // 11 позиций основы

  // Сбрасываем слоты
  gameState.squadSlots = {};
  gameState.benchSlots = {};

  // Копия всех игроков (будем убирать уже назначенных)
  let pool = [...gameState.myPlayers];

  // Группы совместимости позиций (для фолбэка)
  const LINE_GROUPS = {
    GK:  ['GK'],
    LB:  ['LB','RB','CB'],
    CB:  ['CB','LB','RB','CDM'],
    RB:  ['RB','LB','CB'],
    CDM: ['CDM','CM','CB'],
    CM:  ['CM','CDM','CAM','LM','RM'],
    CAM: ['CAM','CM','LM','RM','LW','RW'],
    LM:  ['LM','CM','CAM','LW','RM'],
    RM:  ['RM','CM','CAM','RW','LM'],
    LW:  ['LW','LM','CAM','RW','CF','ST'],
    RW:  ['RW','RM','CAM','LW','CF','ST'],
    ST:  ['ST','CF','LW','RW'],
    CF:  ['CF','ST','LW','RW','CAM'],
  };

  // Функция: найти лучшего игрока из pool для слота slotPos
  function pickBestFor(slotPos) {
    // 1) Сначала ищем игрока с родной позицией или альтернативной
    let candidates = pool.filter(p =>
      p.position === slotPos ||
      (Array.isArray(p.altPositions) && p.altPositions.includes(slotPos))
    );
    // 2) Если нет — берём из линейной группы (без штрафа GK↔поле)
    if (candidates.length === 0) {
      const fallbacks = LINE_GROUPS[slotPos] || [];
      const isGKSlot = slotPos === 'GK';
      candidates = pool.filter(p => {
        const isGKPlayer = p.position === 'GK';
        if (isGKSlot !== isGKPlayer) return false; // нельзя мешать GK и поле
        return fallbacks.includes(p.position);
      });
    }
    // 3) Если совсем ничего — любой с той же стороной поля (GK или полевой)
    if (candidates.length === 0) {
      const isGKSlot = slotPos === 'GK';
      candidates = pool.filter(p => (p.position === 'GK') === isGKSlot);
    }
    if (candidates.length === 0) return null;
    // Берём лучшего по OVR
    candidates.sort((a, b) => getEffectiveOvr(b) - getEffectiveOvr(a));
    return candidates[0];
  }

  // ── Заполняем основу ─────────────────────────────────────────────────
  for (let i = 0; i < 11; i++) {
    const slotPos = positions[i];
    const picked = pickBestFor(slotPos);
    if (picked) {
      gameState.squadSlots[String(i)] = picked.id;
      pool = pool.filter(p => p.id !== picked.id);
    }
  }

  // ── Заполняем скамейку (7 мест) — по убыванию OVR ────────────────────
  pool.sort((a, b) => getEffectiveOvr(b) - getEffectiveOvr(a));
  for (let i = 0; i < 7 && i < pool.length; i++) {
    gameState.benchSlots[String(i)] = pool[i].id;
  }

  saveState();
  renderSquadModal();
  botReply('⚡ Автоподбор выполнен! Расставлены лучшие игроки по схеме <b>' + gameState.squadFormation + '</b>.', 400, { html: true });
}

            const p = findPlayerById(pid);
            if (p) benchPlayers.push({...p, stamina: p.stamina || 3.0, staminaPct: 100,
              preferredFoot: p.preferredFoot || 'right', weakFoot: p.weakFoot || 1,
              height: p.height || 178, weight: p.weight || 75,
              skill: p.skill != null ? p.skill : 2.5,
              matchStats: { goals:0, assists:0, shots:0, shotsOnTarget:0, fouls:0, yellow:0, red:0, rating:6.5 } });
          }
        }
      }

      const bot = getRandomBot();
      const awayOvr  = bot.ovr;
      const awayName = bot.name;
      const botSquad = getBotSquad(awayName);
      const awayPlayers = botSquad.starting.map(p => ({ ...p, redCarded: false,
        stamina: p.stamina || (2.5 + Math.random() * 1.5), staminaPct: 100,
        height: p.height || 178, weight: p.weight || 75,
        skill: p.skill != null ? p.skill : 2.5,
        matchStats: { goals:0, assists:0, shots:0, shotsOnTarget:0, fouls:0, yellow:0, red:0, rating:6.5 } }));
      const awayBench = (botSquad.bench || []).map(p => ({ ...p,
        stamina: p.stamina || (2.5 + Math.random() * 1.5), staminaPct: 100,
        height: p.height || 178, weight: p.weight || 75,
        skill: p.skill != null ? p.skill : 2.5,
        matchStats: { goals:0, assists:0, shots:0, shotsOnTarget:0, fouls:0, yellow:0, red:0, rating:6.5 } }));

      const tactic     = getCurrentTactic();
      const tacticName = Object.keys(TACTICS).find(k => TACTICS[k] === tactic) || 'Баланс';

      matchState = {
        homeName: gameState.nickname || 'Вы',
        homeClub: gameState.clubName || 'Ваш клуб',
        awayName, awayOvr,
        homeScore: 0, awayScore: 0, minute: 0,
        homePlayers, benchPlayers,
        awayPlayers, awayBench,
        homeTactic: tactic,
        subCount: 0, maxSubs: 5,
        awaySubCount: 0, awayMaxSubs: 3,
        events: [],
        homeCards: {}, awayCards: {},
        homeRedCards: 0, awayRedCards: 0,
        finished: false,
        possession: 50,
        homeShots: 0, awayShots: 0,
        homeShotsOnTarget: 0, awayShotsOnTarget: 0,
        homePasses: 0, awayPasses: 0,
        homePassSuccess: 0, awayPassSuccess: 0,
        homeFouls: 0, awayFouls: 0,
        homeCorners: 0, awayCorners: 0,
        homeXG: 0, awayXG: 0,
        subbedOutIds: [],
        awaySubbedOutIds: []
      };

      gameState.inMatch = true;
      saveState();

      await botReply(`⚽ Матч начинается! <b>${matchState.homeName}</b> vs <b>${awayName}</b>`, 400, { html: true });
      await botReply(`🏟️ OVR соперника: <b>${awayOvr}</b> | Тактика: <b>${tacticName}</b>`, 300, { html: true });

      showMatchControls();
      await botReply('⏳ Матч начнётся через 10 секунд...', 400);
      setTimeout(() => startSimulation(), 10000);
    }

    function startSimulation() {
      if (!matchState || matchState.finished) return;
      botReply('▶️ Стартовый свисток!', 300);
      matchInterval = setInterval(simulateMinute, 2000);
    }

    function changeMatchTactic(tacticKey) {
      if (!matchState || matchState.finished) return;
      if (!TACTICS[tacticKey]) return;
      matchState.homeTactic = TACTICS[tacticKey];
      botReply(`🔄 Тактика изменена на <b>${tacticKey}</b>`, 200, { html: true });
      renderMatchControls();
    }

    function drainStamina() {
      const BASE_RATE = 0.8;
      const update = (list) => {
        for (const p of list) {
          if (!p.staminaPct || p.staminaPct <= 0) continue;
          const rate = BASE_RATE / (p.stamina || 3.0);
          p.staminaPct = Math.max(0, p.staminaPct - rate);
        }
      };
      update(matchState.homePlayers);
      update(matchState.awayPlayers);
    }

    function simulateMinute() {
      if (matchState._halftimeActive) return;
      if (!matchState || matchState.finished) { clearInterval(matchInterval); matchInterval = null; return; }
      matchState.minute++;
      const min = matchState.minute;

      if (min === 45) {
        clearInterval(matchInterval); matchInterval = null;
        matchState._halftimeActive = true;
        botReply(`⏸️ Перерыв! Счёт ${matchState.homeScore}:${matchState.awayScore}. Можно сделать замены (20 сек).`, 400);
        setTimeout(() => {
          if (!matchState || matchState.finished) return;
          matchState._halftimeActive = false;
          matchState.minute = 46;
          botReply('▶️ Второй тайм начался!', 400);
          matchInterval = setInterval(simulateMinute, 2000);
        }, 20000);
        return;
      }

      if (min > 90) { endMatch(); return; }

      if (min >= 69 && matchState.awaySubCount < matchState.awayMaxSubs && matchState.awayBench.length > 0 && Math.random() < 0.25) {
        performBotSub();
      }

      drainStamina();
      generateMatchEvent(min);
      renderMatchControls();
    }

    function performBotSub() {
      if (matchState.awaySubCount >= matchState.awayMaxSubs || matchState.awayBench.length === 0) return;
      const outIdx = Math.floor(Math.random() * matchState.awayPlayers.length);
      const outPlayer = matchState.awayPlayers[outIdx];
      if (outPlayer.redCarded) return;
      const inPlayer = matchState.awayBench.shift();
      matchState.awayBench.push(outPlayer);
      matchState.awayPlayers[outIdx] = inPlayer;
      matchState.awaySubCount++;
      matchState.awaySubbedOutIds.push(outPlayer.name);
    }

    function generateMatchEvent(minute) {
      const homeOvr = getSquadAverageOvr();
      const awayOvr = matchState.awayOvr;

      let homeGoalChance = 0.022;
      let awayGoalChance = 0.018;
      const ovrDiff = homeOvr - awayOvr;
      homeGoalChance += ovrDiff * 0.0006;
      awayGoalChance -= ovrDiff * 0.0006;

      if (matchState.homeTactic.attackMult > 1) homeGoalChance += 0.003;
      if (matchState.homeTactic.defMult > 1)    awayGoalChance -= 0.002;
      homeGoalChance += (matchState.homeTactic.fastAttackChance || 0) * 0.4;
      awayGoalChance += (matchState.homeTactic.counterChance || 0) * 0.4;

      homeGoalChance -= matchState.homeRedCards * 0.005;
      awayGoalChance += matchState.homeRedCards * 0.005;

      const captain = matchState.homePlayers.find(p => p.id === gameState.captain && !p.redCarded);
      if (captain) homeGoalChance += 0.002;

      const homeAttackers = matchState.homePlayers.filter(p => !p.redCarded && ['ST','CF','LW','RW','CAM'].includes(p.position));
      const awayAttackers = matchState.awayPlayers.filter(p => !p.redCarded && ['ST','CF','LW','RW','CAM'].includes(p.position));
      const avgHomeStaminaPct = homeAttackers.length > 0 ? homeAttackers.reduce((s,p) => s + (p.staminaPct || 100), 0) / homeAttackers.length : 100;
      const avgAwayStaminaPct = awayAttackers.length > 0 ? awayAttackers.reduce((s,p) => s + (p.staminaPct || 100), 0) / awayAttackers.length : 100;
      homeGoalChance *= (0.7 + 0.3 * (avgHomeStaminaPct / 100));
      awayGoalChance *= (0.7 + 0.3 * (avgAwayStaminaPct / 100));

      homeGoalChance = Math.max(0.004, Math.min(0.15, homeGoalChance));
      awayGoalChance = Math.max(0.004, Math.min(0.12, awayGoalChance));

      matchState.homeXG += homeGoalChance;
      matchState.awayXG += awayGoalChance;

      matchState.homePasses      += Math.floor(Math.random() * 5) + 2;
      matchState.homePassSuccess += Math.floor(Math.random() * 4) + 1;
      matchState.awayPasses      += Math.floor(Math.random() * 5) + 2;
      matchState.awayPassSuccess += Math.floor(Math.random() * 4) + 1;

      const roll = Math.random();

      // ---- ПЕНАЛЬТИ (рост/вес вратаря влияет на сейв) ----
      if (Math.random() < 0.008) {
        let taker = matchState.homePlayers.find(p => p.id === gameState.penaltyKicker && !p.redCarded);
        if (!taker) {
          const eligible = matchState.homePlayers.filter(p => !p.redCarded && p.position !== 'GK');
          if (eligible.length > 0) taker = eligible.reduce((best, p) => (getEffectiveStats(p).SHO || 0) > (getEffectiveStats(best).SHO || 0) ? p : best);
          else taker = matchState.homePlayers[0];
        }
        const gk = matchState.awayPlayers.find(p => p.position === 'GK' && !p.redCarded);
        const gkStats = gk ? getEffectiveStats(gk) : { REF: 50, DIV: 50, HAN: 50 };
        const shootStat = getEffectiveStats(taker).SHO || 50;
        const gkAvg = ((gkStats.REF || 50) + (gkStats.DIV || 50) + (gkStats.HAN || 50)) / 3;
        let penGoalChance = 0.75 + (shootStat - gkAvg) * 0.003;
        penGoalChance *= getFootModifier(taker);
        // Влияние роста/веса вратаря на сейв пенальти
        if (gk) {
          penGoalChance *= (2.0 - getHeightModifier(gk, 'gk_save'));
          penGoalChance *= (2.0 - getWeightModifier(gk, 'gk_save'));
        }
        penGoalChance = Math.max(0.25, Math.min(0.95, penGoalChance));

        matchState.homeShots++;
        matchState.homeShotsOnTarget++;
        taker.matchStats.shots++;
        taker.matchStats.shotsOnTarget++;

        if (Math.random() < penGoalChance) {
          matchState.homeScore++;
          gameState.goalsScored = (gameState.goalsScored || 0) + 1;
          gameState.goalsForQuest = (gameState.goalsForQuest || 0) + 1;
          taker.matchStats.goals++;
          botReply(`<div class="match-event event-goal"><span class="minute">${minute}'</span> ⚽ ПЕНАЛЬТИ! <b>${taker.name}</b> (${matchState.homeClub}) реализует! ${matchState.homeScore}:${matchState.awayScore}</div>`, 200, { html: true });
          matchState.events.push({ minute, type: 'goal', team: 'home', player: taker.name, penalty: true });
        } else {
          botReply(`<div class="match-event"><span class="minute">${minute}'</span> 🥅 ПЕНАЛЬТИ! <b>${taker.name}</b> (${matchState.homeClub}) не забивает! Вратарь парирует.</div>`, 200, { html: true });
          matchState.events.push({ minute, type: 'penalty_miss', team: 'home', player: taker.name });
        }
        saveState();
        return;
      }

      // ---- ГОЛ ДОМА (дриблинг + рост/вес) ----
      if (roll < homeGoalChance) {
        const scorer = pickRandomAttacker('home');
        const assist = pickRandomAssister('home', scorer);
        const footMod = getFootModifier(scorer);
        const dribbleMod = getHeightModifier(scorer, 'dribble') * getWeightModifier(scorer, 'dribble') * getSkillModifier(scorer);
        if (Math.random() > footMod * dribbleMod) {
          matchState.homeShots++;
          scorer.matchStats.shots++;
          const msg = SHOOT_MISS_COMMENTS[Math.floor(Math.random() * SHOOT_MISS_COMMENTS.length)];
          botReply(`<div class="match-event"><span class="minute">${minute}'</span> Удар! <b>${scorer.name}</b> (${matchState.homeClub}) — ${msg}</div>`, 150, { html: true });
          return;
        }
        matchState.homeScore++;
        matchState.homeShots++;
        matchState.homeShotsOnTarget++;
        gameState.goalsScored   = (gameState.goalsScored   || 0) + 1;
        gameState.goalsForQuest = (gameState.goalsForQuest || 0) + 1;
        scorer.matchStats.goals++;
        scorer.matchStats.shots++;
        scorer.matchStats.shotsOnTarget++;
        if (assist) assist.matchStats.assists++;
        const assistText = assist ? ` (асс. <b>${assist.name}</b>, ${matchState.homeClub})` : '';
        botReply(`<div class="match-event event-goal"><span class="minute">${minute}'</span> ⚽ ГОЛ! <b>${scorer.name}</b> (${matchState.homeClub})${assistText}! ${matchState.homeScore}:${matchState.awayScore}</div>`, 200, { html: true });
        matchState.events.push({ minute, type: 'goal', team: 'home', player: scorer.name, assist: assist?.name || '' });
        saveState();
        return;
      }

      // ---- ГОЛ ГОСТЕЙ (аналогично) ----
      if (roll < homeGoalChance + awayGoalChance) {
        const scorer = pickRandomAttacker('away');
        const assist = pickRandomAssister('away', scorer);
        const footMod = getFootModifier(scorer);
        const dribbleMod = getHeightModifier(scorer, 'dribble') * getWeightModifier(scorer, 'dribble') * getSkillModifier(scorer);
        if (Math.random() > footMod * dribbleMod) {
          matchState.awayShots++;
          scorer.matchStats.shots++;
          const msg = SHOOT_MISS_COMMENTS[Math.floor(Math.random() * SHOOT_MISS_COMMENTS.length)];
          botReply(`<div class="match-event"><span class="minute">${minute}'</span> Удар от <b>${scorer.name}</b> (${matchState.awayName}). ${msg}</div>`, 150, { html: true });
          return;
        }
        matchState.awayScore++;
        matchState.awayShots++;
        matchState.awayShotsOnTarget++;
        scorer.matchStats.goals++;
        scorer.matchStats.shots++;
        scorer.matchStats.shotsOnTarget++;
        if (assist) assist.matchStats.assists++;
        const assistText = assist ? ` (асс. <b>${assist.name}</b>, ${matchState.awayName})` : '';
        botReply(`<div class="match-event event-goal"><span class="minute">${minute}'</span> ⚽ ГОЛ! <b>${scorer.name}</b> (${matchState.awayName})${assistText}! ${matchState.homeScore}:${matchState.awayScore}</div>`, 200, { html: true });
        matchState.events.push({ minute, type: 'goal', team: 'away', player: scorer.name, assist: assist?.name || '' });
        return;
      }

      // ---- УДАРЫ МИМО (дриблинг) ----
      if (Math.random() < 0.05) {
        const shooter = pickRandomAttacker('home');
        matchState.homeShots++; shooter.matchStats.shots++;
        const msg = SHOOT_MISS_COMMENTS[Math.floor(Math.random() * SHOOT_MISS_COMMENTS.length)];
        botReply(`<div class="match-event"><span class="minute">${minute}'</span> Удар! <b>${shooter.name}</b> (${matchState.homeClub}) — ${msg}</div>`, 150, { html: true });
        return;
      }
      if (Math.random() < 0.04) {
        const shooter = pickRandomAttacker('away');
        matchState.awayShots++; shooter.matchStats.shots++;
        const msg = SHOOT_MISS_COMMENTS[Math.floor(Math.random() * SHOOT_MISS_COMMENTS.length)];
        botReply(`<div class="match-event"><span class="minute">${minute}'</span> Удар от <b>${shooter.name}</b> (${matchState.awayName}). ${msg}</div>`, 150, { html: true });
        return;
      }

      // ---- ЖЁЛТЫЕ / КРАСНЫЕ (рост/вес на отбор) ----
      if (Math.random() < 0.018) {
        const active = matchState.homePlayers.filter(p => !p.redCarded);
        if (active.length > 0) {
          const player = active[Math.floor(Math.random() * active.length)];
          matchState.homeCards[player.id] = (matchState.homeCards[player.id] || 0) + 1;
          if (matchState.homeCards[player.id] >= 2) {
            player.redCarded = true; matchState.homeRedCards++;
            player.matchStats.red = 1;
            botReply(`<div class="match-event event-red"><span class="minute">${minute}'</span> 🟥 <b>${player.name}</b> (${matchState.homeClub}) удалён (2ЖК)!</div>`, 200, { html: true });
            if (matchState.homeRedCards >= 5) { matchState.finished = true; matchState.homeScore = 0; matchState.awayScore = 3; endMatch(); return; }
          } else {
            player.matchStats.yellow = 1;
            const ycMsg = YELLOW_COMMENTS[Math.floor(Math.random() * YELLOW_COMMENTS.length)].replace('{name}', `<b>${player.name}</b> (${matchState.homeClub})`);
            botReply(`<div class="match-event event-yellow"><span class="minute">${minute}'</span> 🟨 ${ycMsg}</div>`, 200, { html: true });
          }
        }
        return;
      }

      if (Math.random() < 0.012) {
        const active = matchState.awayPlayers.filter(p => !p.redCarded);
        if (active.length > 0) {
          const player = active[Math.floor(Math.random() * active.length)];
          matchState.awayCards[player.name] = (matchState.awayCards[player.name] || 0) + 1;
          if (matchState.awayCards[player.name] >= 2) {
            player.redCarded = true; matchState.awayRedCards++;
            player.matchStats.red = 1;
            botReply(`<div class="match-event event-red"><span class="minute">${minute}'</span> 🟥 <b>${player.name}</b> (${matchState.awayName}) удалён!</div>`, 200, { html: true });
          } else {
            player.matchStats.yellow = 1;
            const ycMsg = YELLOW_COMMENTS[Math.floor(Math.random() * YELLOW_COMMENTS.length)].replace('{name}', `<b>${player.name}</b> (${matchState.awayName})`);
            botReply(`<div class="match-event event-yellow"><span class="minute">${minute}'</span> 🟨 ${ycMsg}</div>`, 200, { html: true });
          }
        }
        return;
      }

      // ---- УГЛОВЫЕ (рост влияет на подающего) ----
      if (Math.random() < 0.05) {
        matchState.homeCorners++;
        let taker = matchState.homePlayers.find(p => p.id === gameState.cornerKicker && !p.redCarded);
        if (!taker) taker = matchState.homePlayers.find(p => !p.redCarded && p.position !== 'GK');
        const name = taker ? taker.name : 'игрок';
        const msg = CORNER_COMMENTS[Math.floor(Math.random() * CORNER_COMMENTS.length)].replace('{name}', `<b>${name}</b> (${matchState.homeClub})`);
        botReply(`<div class="match-event"><span class="minute">${minute}'</span> ${msg}</div>`, 150, { html: true });
        return;
      }
      if (Math.random() < 0.04) {
        matchState.awayCorners++;
        const taker = matchState.awayPlayers.find(p => !p.redCarded);
        const name = taker ? taker.name : 'игрок';
        const msg = CORNER_COMMENTS[Math.floor(Math.random() * CORNER_COMMENTS.length)].replace('{name}', `<b>${name}</b> (${matchState.awayName})`);
        botReply(`<div class="match-event"><span class="minute">${minute}'</span> У ворот ${matchState.homeName}: ${msg}</div>`, 150, { html: true });
        return;
      }

      // ---- ШТРАФНЫЕ (вратарь) ----
      if (Math.random() < 0.02) {
        let taker = matchState.homePlayers.find(p => p.id === gameState.freeKicker && !p.redCarded);
        if (!taker) taker = matchState.homePlayers.find(p => !p.redCarded && p.position !== 'GK');
        if (taker) {
          const gk = matchState.awayPlayers.find(p => p.position === 'GK' && !p.redCarded);
          const gkStats = gk ? getEffectiveStats(gk) : { REF: 50, DIV: 50, HAN: 50 };
          const shootStat = getEffectiveStats(taker).SHO || 50;
          const gkAvg = ((gkStats.REF || 50) + (gkStats.DIV || 50) + (gkStats.HAN || 50)) / 3;
          let fkGoalChance = 0.12 + (shootStat - gkAvg) * 0.002;
          fkGoalChance *= getFootModifier(taker);
          if (gk) {
            fkGoalChance *= (2.0 - getHeightModifier(gk, 'gk_save'));
            fkGoalChance *= (2.0 - getWeightModifier(gk, 'gk_save'));
          }
          fkGoalChance = Math.max(0.05, Math.min(0.40, fkGoalChance));
          matchState.homeShots++;
          matchState.homeShotsOnTarget++;
          taker.matchStats.shots++;
          taker.matchStats.shotsOnTarget++;

          if (Math.random() < fkGoalChance) {
            matchState.homeScore++;
            gameState.goalsScored = (gameState.goalsScored || 0) + 1;
            gameState.goalsForQuest = (gameState.goalsForQuest || 0) + 1;
            taker.matchStats.goals++;
            botReply(`<div class="match-event event-goal"><span class="minute">${minute}'</span> ⚽ ШТРАФНОЙ! <b>${taker.name}</b> (${matchState.homeClub}) забивает прямым ударом! ${matchState.homeScore}:${matchState.awayScore}</div>`, 200, { html: true });
            matchState.events.push({ minute, type: 'goal', team: 'home', player: taker.name, freekick: true });
            saveState();
          } else {
            botReply(`<div class="match-event"><span class="minute">${minute}'</span> 🥅 Штрафной удар <b>${taker.name}</b> (${matchState.homeClub}) — мимо!</div>`, 150, { html: true });
          }
        }
        return;
      }

      // ---- ФОЛЫ (рост/вес на отбор) ----
      if (Math.random() < 0.03) {
        matchState.homeFouls++;
        const fouler = matchState.homePlayers[Math.floor(Math.random() * matchState.homePlayers.length)];
        fouler.matchStats.fouls++;
        const msg = FOUL_COMMENTS[Math.floor(Math.random() * FOUL_COMMENTS.length)].replace('{name}', `<b>${fouler.name}</b> (${matchState.homeClub})`);
        botReply(`<div class="match-event"><span class="minute">${minute}'</span> ${msg}</div>`, 150, { html: true });
        return;
      }
      if (Math.random() < 0.03) {
        matchState.awayFouls++;
        const fouler = matchState.awayPlayers[Math.floor(Math.random() * matchState.awayPlayers.length)];
        fouler.matchStats.fouls++;
        const msg = FOUL_COMMENTS[Math.floor(Math.random() * FOUL_COMMENTS.length)].replace('{name}', `<b>${fouler.name}</b> (${matchState.awayName})`);
        botReply(`<div class="match-event"><span class="minute">${minute}'</span> ${msg}</div>`, 150, { html: true });
        return;
      }

      const comment = NEUTRAL_COMMENTS[Math.floor(Math.random() * NEUTRAL_COMMENTS.length)];
      botReply(`<div class="match-event"><span class="minute">${minute}'</span> ${comment}.</div>`, 150, { html: true });
    }

    function pickRandomAttacker(team) {
      const players = team === 'home' ? matchState.homePlayers : matchState.awayPlayers;
      const active = players.filter(p => !p.redCarded);
      if (active.length === 0) return players[0];
      const strikers = active.filter(p => ['ST','CF'].includes(p.position));
      const wingers  = active.filter(p => ['LW','RW','CAM'].includes(p.position));
      const mids     = active.filter(p => ['CM','CDM','LM','RM'].includes(p.position));
      const roll = Math.random();
      if (strikers.length && roll < 0.55) return strikers[Math.floor(Math.random()*strikers.length)];
      if (wingers.length  && roll < 0.80) return wingers[Math.floor(Math.random()*wingers.length)];
      if (mids.length     && roll < 0.95) return mids[Math.floor(Math.random()*mids.length)];
      return active[Math.floor(Math.random()*active.length)];
    }

    function pickRandomAssister(team, scorer) {
      const players = team === 'home' ? matchState.homePlayers : matchState.awayPlayers;
      const candidates = players.filter(p => !p.redCarded && p.name !== scorer.name);
      if (candidates.length === 0) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function staminaColor(pct) {
      if (pct >= 0.9) return '#4fc3f7';
      if (pct >= 0.78) return '#81c784';
      if (pct >= 0.65) return '#ffb74d';
      if (pct >= 0.5) return '#ff8a65';
      if (pct >= 0.25) return '#e57373';
      return '#880e4f';
    }

    function renderStaminaBar(player) {
      const pct = (player.staminaPct != null) ? player.staminaPct : 100;
      const val = Math.min(100, pct) / 100;
      const color = staminaColor(val);
      return `<div style="height:4px;background:#2a3a4a;border-radius:2px;margin-top:2px;width:100%;"><div style="height:100%;width:${val*100}%;background:${color};border-radius:2px;"></div></div>`;
    }

    async function showActiveSquad() {
      if (!matchState || matchState.finished) return;
      const formation = getCurrentFormation();
      const positions = formation.positions;
      const rows = formation.rows;
      let html = '<div style="padding:10px;font-size:12px;color:#7d8e9e;">🔄 Активный состав (перетащи игрока скамейки на поле для замены)</div>';
      html += '<div style="background:linear-gradient(180deg,#1a4a1a 0%,#2d7a2d 30%,#1a4a1a 100%);border-radius:12px;padding:12px;margin:8px 0;border:2px solid rgba(255,255,255,0.1);">';
      for (const row of rows) {
        html += '<div style="display:flex;justify-content:center;gap:6px;margin:4px 0;">';
        for (const slotIndex of row) {
          const pos = positions[slotIndex];
          const player = matchState.homePlayers[slotIndex];
          if (player && !player.redCarded) {
            const effOvr = getEffectiveOvr(player);
            const staminaBar = renderStaminaBar(player);
            html += `<div class="slot filled" data-slot="${slotIndex}" data-pos="${pos}" ondragover="handleDragOver(event)" ondrop="handleActiveSquadDrop(event, '${slotIndex}')" style="width:54px;min-height:64px;background:rgba(0,0,0,0.3);border:2px dashed rgba(255,255,255,0.2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:2px;cursor:pointer;">
              <div style="font-size:9px;color:#fff;">${player.name}</div>

              ${staminaBar}
              <button onclick="event.stopPropagation();subPlayerOut('${slotIndex}')" style="position:absolute;bottom:2px;background:rgba(82,136,193,0.8);border:none;color:#fff;border-radius:4px;font-size:9px;padding:1px 4px;cursor:pointer;">⇄</button>
            </div>`;
          } else if (player && player.redCarded) {
            html += `<div class="slot" style="width:54px;min-height:64px;background:rgba(200,0,0,0.3);border:2px dashed rgba(255,0,0,0.4);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:9px;margin:2px;">${player.name}<br>🟥</div>`;

      html += '<div style="margin-top:10px;font-size:12px;color:#7d8e9e;">Скамейка (перетащи на слот):</div><div style="display:flex;gap:6px;overflow-x:auto;padding:6px;">';
      const eligibleBench = matchState.benchPlayers.filter(p => !matchState.subbedOutIds.includes(p.id));
      for (const bp of eligibleBench) {
        const posColor = getPositionColor(bp.position);
        html += `<div class="mini-card" draggable="true" data-player-id="${bp.id}" ondragstart="handleDragStart(event)" style="width:54px;min-height:70px;background:#1e2d3d;border:1px solid #2a4060;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0;cursor:grab;font-size:10px;padding:4px;">
          <div style="width:26px;height:26px;border-radius:50%;background:${posColor};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;">${bp.position}</div>

          <div style="font-size:11px;font-weight:700;color:#f0c040;">${getEffectiveOvr(bp)}</div>

      }
      if (eligibleBench.length === 0) html += '<div style="font-size:10px;color:#7d8e9e;">Нет доступных замен</div>';
      html += '</div>';
      await botReply(html, 400, { html: true });

    function subPlayerOut(slotIndex) {
      if (!matchState || matchState.finished) return;
      if (matchState.subCount >= matchState.maxSubs) { botReply('❌ Лимит замен.', 300); return; }
      const eligibleBench = matchState.benchPlayers.filter(p => !matchState.subbedOutIds.includes(p.id));
      if (!eligibleBench.length) { botReply('ℹ️ Все игроки скамейки уже выходили на поле.', 300); return; }
      matchState._pendingSlotIndex = parseInt(slotIndex);
      let html = '<div class="msg-text"><b>Выбери игрока со скамейки:</b></div><div class="inline-btn-row">';
      for (const p of eligibleBench) {
        html += `<button class="inline-btn" onclick="confirmSub('${p.id}')">${p.name} (OVR ${getEffectiveOvr(p)}, ${p.position})</button>`;
      }
      html += '</div>';
      botReply(html, 300, { html: true });
    }

    async function confirmSub(benchId) {
      const slotIndex = matchState._pendingSlotIndex;
      if (slotIndex === undefined) return;
      const benchPlayer = findPlayerById(parseInt(benchId));
      if (!benchPlayer) return;
      const slotPos = getCurrentFormation().positions[slotIndex];
      if ((benchPlayer.position === 'GK') !== (slotPos === 'GK')) {
        botReply('❌ Нельзя поставить вратаря в поле или полевого в ворота.', 300); return;
      }
      const fieldPlayer = matchState.homePlayers[slotIndex];
      if (!fieldPlayer) { botReply('❌ Слот пуст.', 300); return; }
      matchState.homePlayers[slotIndex] = { ...benchPlayer, slotPosition: slotPos, redCarded: false,
        stamina: benchPlayer.stamina || 3.0, staminaPct: benchPlayer.staminaPct != null ? benchPlayer.staminaPct : 100,
        preferredFoot: benchPlayer.preferredFoot || 'right', weakFoot: benchPlayer.weakFoot || 1,
        height: benchPlayer.height || 178, weight: benchPlayer.weight || 75,
        matchStats: { goals:0, assists:0, shots:0, shotsOnTarget:0, fouls:0, yellow:0, red:0, rating:6.5 } };
      matchState.benchPlayers = matchState.benchPlayers.filter(p => p.id !== benchPlayer.id);
      matchState.benchPlayers.push(fieldPlayer);
      matchState.subbedOutIds.push(fieldPlayer.id);
      matchState.subCount++;
      matchState._pendingSlotIndex = undefined;
      saveState();
      renderMatchControls();
      botReply(`🔄 Замена: <b>${fieldPlayer.name}</b> ↓ <b>${benchPlayer.name}</b> ↑ (позиция ${slotPos})`, 300, { html: true });
    }

    async function handleActiveSquadDrop(event, slotIndex) {
      event.preventDefault();
      const target = event.target.closest('.slot');
      if (!target) return;
      const playerId = dragPlayerId || parseInt(event.dataTransfer.getData('text/plain'));
      dragPlayerId = null;
      if (!playerId || isNaN(playerId)) return;
      const benchPlayer = findPlayerById(playerId);
      if (!benchPlayer) return;
      if (matchState.subCount >= matchState.maxSubs) { botReply('❌ Лимит замен.', 300); return; }
      const slotPos = getCurrentFormation().positions[slotIndex];
      if ((benchPlayer.position === 'GK') !== (slotPos === 'GK')) {
        botReply('❌ Нельзя поставить вратаря в поле или полевого в ворота.', 300); return;
      }
      const fieldPlayer = matchState.homePlayers[slotIndex];
      if (!fieldPlayer) { botReply('❌ Слот пуст.', 300); return; }
      if (matchState.subbedOutIds.includes(fieldPlayer.id)) { botReply('❌ Этот игрок уже был заменён.', 300); return; }
      matchState.homePlayers[slotIndex] = { ...benchPlayer, slotPosition: slotPos, redCarded: false,
        stamina: benchPlayer.stamina || 3.0, staminaPct: benchPlayer.staminaPct != null ? benchPlayer.staminaPct : 100,
        preferredFoot: benchPlayer.preferredFoot || 'right', weakFoot: benchPlayer.weakFoot || 1,
        height: benchPlayer.height || 178, weight: benchPlayer.weight || 75,
        matchStats: { goals:0, assists:0, shots:0, shotsOnTarget:0, fouls:0, yellow:0, red:0, rating:6.5 } };
      matchState.benchPlayers = matchState.benchPlayers.filter(p => p.id !== benchPlayer.id);
      matchState.benchPlayers.push(fieldPlayer);
      matchState.subbedOutIds.push(fieldPlayer.id);
      matchState.subCount++;
      saveState();
      renderMatchControls();
      botReply(`🔄 Замена: <b>${fieldPlayer.name}</b> ↓ <b>${benchPlayer.name}</b> ↑ (позиция ${slotPos})`, 300, { html: true });
    }

    function calculateRating(stats, minutes) {
      let rating = 6.5;
      if (stats.goals > 0) rating += stats.goals * 0.8;
      if (stats.assists > 0) rating += stats.assists * 0.6;
      if (stats.shotsOnTarget > 0) rating += stats.shotsOnTarget * 0.15;
      if (stats.shots > 0) rating += (stats.shots - stats.shotsOnTarget) * 0.05;
      if (stats.fouls > 0) rating -= stats.fouls * 0.2;
      if (stats.yellow > 0) rating -= 0.5;
      if (stats.red > 0) rating -= 2.5;
      return Math.min(10.0, Math.max(3.0, Math.round(rating * 10) / 10));
    }

    function endMatch() {
      clearInterval(matchInterval); matchInterval = null; hideMatchControls();
      if (!matchState) return;
      matchState.finished = true; gameState.inMatch = false;
      gameState.matchesPlayed   = (gameState.matchesPlayed   || 0) + 1;
      gameState.matchesForQuest = (gameState.matchesForQuest || 0) + 1;
      const result = matchState.homeScore > matchState.awayScore ? 'win' : matchState.homeScore === matchState.awayScore ? 'draw' : 'loss';
      let rubinsEarned = 0, xpEarned = 0;
      if (MATCH_REWARDS[result]) {
        const rw = MATCH_REWARDS[result]; rubinsEarned = rw.rubinsBase || 0;
        if (result === 'win') { rubinsEarned += matchState.homeScore * (rw.rubinsPerGoal || 0) + matchState.awayScore * (rw.rubinsPerConceded || 0); }
        xpEarned = rw.xp || 0;
      }
      rubinsEarned = Math.max(0, rubinsEarned);
      gameState.rubins = (gameState.rubins || 0) + rubinsEarned; gameState.xp = (gameState.xp || 0) + xpEarned;
      if (result === 'win') gameState.stars = (gameState.stars || 0) + 1;
      else if (result === 'loss') gameState.stars = Math.max(0, (gameState.stars || 0) - 1);
      saveState(); updateHeaderResources();
      const emoji = result === 'win' ? '🎉' : result === 'draw' ? '🤝' : '😞';
      const text  = result === 'win' ? 'Победа!' : result === 'draw' ? 'Ничья' : 'Поражение';
      botReply(`${emoji} <b>${text}</b> ${matchState.homeScore}:${matchState.awayScore}`, 500, { html: true });
      botReply(`${SAPPHIRE_ICON} +${rubinsEarned} сапфиров | ${XP_ICON} +${xpEarned} | ${DIVISION_STAR_ICON} Звёзды: ${gameState.stars}`, 400, { html: true });
      const homePassAcc = matchState.homePasses ? Math.round(matchState.homePassSuccess/matchState.homePasses*100) : 0;
      const awayPassAcc = matchState.awayPasses ? Math.round(matchState.awayPassSuccess/matchState.awayPasses*100) : 0;
      const homeYellows = matchState.events.filter(e=>e.type==='yellow'&&e.team==='home').length;
      const awayYellows = matchState.events.filter(e=>e.type==='yellow'&&e.team==='away').length;
      botReply(`<div class="msg-text" style="font-size:12px;color:#7d8e9e;">📊 Статистика<br>` +
        `⚽ Голы: ${matchState.homeScore} – ${matchState.awayScore}<br>` +
        `🎯 Удары: ${matchState.homeShots} (в створ ${matchState.homeShotsOnTarget}) – ${matchState.awayShots} (в створ ${matchState.awayShotsOnTarget})<br>` +
        `🏃 Владение: ${Math.round(matchState.possession)}% – ${100-Math.round(matchState.possession)}%<br>` +
        `🔁 Пасы: ${matchState.homePasses} (точность ${homePassAcc}%) – ${matchState.awayPasses} (точность ${awayPassAcc}%)<br>` +
        `🚩 Угловые: ${matchState.homeCorners} – ${matchState.awayCorners}<br>` +
        `⚠️ Фолы: ${matchState.homeFouls} – ${matchState.awayFouls}<br>` +
        `🟨 ЖК: ${homeYellows} – ${awayYellows}<br>` +
        `🟥 КК: ${matchState.homeRedCards} – ${matchState.awayRedCards}<br>` +
        `🔄 Замен: ${matchState.subCount} – ${matchState.awaySubCount}<br>` +
        `📈 xG: ${matchState.homeXG.toFixed(2)} – ${matchState.awayXG.toFixed(2)}</div>`, 500, { html: true });
      let mvp = null;
      let bestRating = -1;
      for (const p of matchState.homePlayers) {
        const r = calculateRating(p.matchStats, 90);
        p.matchStats.rating = r;
        if (r > bestRating) { bestRating = r; mvp = p; }
      }
      if (mvp) {
        botReply(`🏆 MVP: <b>${mvp.name}</b> (${matchState.homeClub})<br>⚽ Голы: ${mvp.matchStats.goals} | 🅰️ Ассисты: ${mvp.matchStats.assists}<br>🎯 Удары: ${mvp.matchStats.shots} (в створ: ${mvp.matchStats.shotsOnTarget}) | ⭐ Оценка: ${mvp.matchStats.rating.toFixed(1)}`, 500, { html: true });
      }
      botReply(`<div class="inline-btn-row"><button class="inline-btn" onclick="startMatch()">🔁 Сыграть снова</button><button class="inline-btn" onclick="handleNavSquad()">📋 Состав</button></div>`, 600, { html: true });
      if (typeof checkDivisionRewards === 'function') checkDivisionRewards();
    }

// ── Дата окончания сезона (МСК = UTC+3) ──────────────────────────────────
// Чтобы изменить — просто поменяй строку ниже.
// Формат: 'YYYY-MM-DDTHH:MM:SS+03:00'
const SEASON_END_DATE = new Date('2026-07-01T00:00:00+03:00');

// ── Данные дивизионов ─────────────────────────────────────────────────────
// (уже объявлены в DIVISIONS, используем их)
// Для удобства дублируем шаблон наград здесь же — берём из DIVISIONS.

function getDivisionByIndex(idx) {
  return DIVISIONS.find(d => d.index === idx) || DIVISIONS[0];
}

function getDivisionByStars(stars) {
  for (const d of DIVISIONS) {
    if (stars >= d.minStars && stars <= d.maxStars) return d;
  }
  return DIVISIONS[DIVISIONS.length - 1];
}

// ── Время до конца сезона ──────────────────────────────────────────────────
function getSeasonTimeLeft() {
  const now = new Date();
  const diff = SEASON_END_DATE - now;
  if (diff <= 0) return null; // сезон закончился
  const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  return { days, hours, minutes, total: diff };
}

function formatSeasonTimeLeft() {
  const t = getSeasonTimeLeft();
  if (!t) return '⏰ Сезон завершён';
  if (t.days > 0) return `⏳ До конца сезона: ${t.days} д. ${t.hours} ч.`;
  if (t.hours > 0) return `⏳ До конца сезона: ${t.hours} ч. ${t.minutes} мин.`;
  return `⏳ До конца сезона: ${t.minutes} мин.`;
}

// ── Построение звёздного прогресса дивизиона ─────────────────────────────
function buildDivisionStarsHTML(div, stars) {
  // Для Diamond I (maxStars = 9999) звёзды не показываем вообще
  if (div.maxStars >= 9999) {
    return `<div style="font-size:12px;color:#7d8e9e;">⭐ Максимальный дивизион — звёзды не ограничены</div>`;
  }
  const total = div.maxStars - div.minStars + 1;
  const filled = Math.min(stars - div.minStars, total);
  let html = '<div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;">';
  for (let i = 0; i < total; i++) {
    if (i < filled) {
      html += `<span style="color:#f0c040;font-size:16px;">★</span>`;
    } else {
      html += `<span style="color:#2a3a4a;font-size:16px;">★</span>`;
    }
  }
  html += '</div>';
  return html;
}

// ── Форматирование наград дивизиона ──────────────────────────────────────
function formatDivisionReward(rewards) {
  const parts = [];
  if (rewards.rubins)       parts.push(`<img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:13px;height:13px;vertical-align:middle;" /> ${rewards.rubins}`);
  if (rewards.passCredits)  parts.push(`<img src="https://i.ibb.co/zVW0z5nQ/image.png" style="width:13px;height:13px;vertical-align:middle;" /> ${rewards.passCredits}`);
  if (rewards.ovrPoints)    parts.push(`<img src="https://i.ibb.co/jv3KsbMx/OVR.png" style="width:13px;height:13px;vertical-align:middle;" /> ${rewards.ovrPoints}`);
  if (rewards.draftTokens)  parts.push(`<img src="https://i.ibb.co/6RTT8K1z/image.png" style="width:13px;height:13px;vertical-align:middle;" /> ${rewards.draftTokens}`);
  return parts.join('  ') || 'Нет наград';
}

// ── Открытие модального окна Дивизиона ───────────────────────────────────
function openDivisionModal() {
  let overlay = document.getElementById('division-modal');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'division-modal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;';
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeDivisionModal();
    });
    overlay.innerHTML = `<div id="div-modal-box" style="background:#17212b;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:16px;"></div>`;
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'flex';
  renderDivisionModal();
}

function closeDivisionModal() {
  const overlay = document.getElementById('division-modal');
  if (overlay) overlay.style.display = 'none';
}

function renderDivisionModal() {
  const box = document.getElementById('div-modal-box');
  if (!box) return;

  const stars  = gameState.stars || 0;
  const curDiv = getDivisionByStars(stars);
  const timeLeft = formatSeasonTimeLeft();
  const seasonEnded = getSeasonTimeLeft() === null;

  // Прогресс звёзд внутри дивизиона
  const starsInDiv = stars - curDiv.minStars;
  const totalInDiv = curDiv.maxStars - curDiv.minStars + 1;

  // Награда за текущий дивизион
  const alreadyClaimed = (gameState.claimedDivisionRewards || []).includes(curDiv.index);
  const hasDivReward   = curDiv.rewards && curDiv.rewards.rubins > 0;

  let html = '';

  // ── Шапка ─────────────────────────────────────────────────────────────
  html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <h3 style="margin:0;font-size:16px;">⚽ Дивизион</h3>
    <button onclick="closeDivisionModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;">✕</button>
  </div>`;

  // ── Текущий дивизион ──────────────────────────────────────────────────
  html += `<div style="background:linear-gradient(135deg,#1a2f45,#1e3550);border:2px solid ${curDiv.color};border-radius:12px;padding:14px;margin-bottom:12px;">`;
  html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">`;
  html += `<div style="width:42px;height:42px;border-radius:50%;background:${curDiv.color}22;border:2px solid ${curDiv.color};display:flex;align-items:center;justify-content:center;font-size:20px;">⚽</div>`;
  html += `<div>`;
  html += `<div style="font-size:16px;font-weight:700;color:${curDiv.color};">${curDiv.name}</div>`;
  html += `<div style="font-size:11px;color:#7d8e9e;">Звёзды: ${stars} (${starsInDiv}/${totalInDiv} в дивизионе)</div>`;
  html += `</div></div>`;
  html += buildDivisionStarsHTML(curDiv, stars);
  html += `<div style="font-size:11px;color:#7d8e9e;margin-top:6px;">${timeLeft}</div>`;
  html += `</div>`;

  // ── Кнопки действий ──────────────────────────────────────────────────
  html += `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">`;

  if (seasonEnded) {
    html += `<div style="width:100%;background:rgba(224,80,80,0.15);border:1px solid rgba(224,80,80,0.4);border-radius:8px;padding:10px;text-align:center;font-size:13px;color:#e05050;">
      ⏰ Сезон завершён. Ожидайте начала нового сезона.
    </div>`;
  } else {
    html += `<button class="inline-btn" onclick="closeDivisionModal();startMatch();" style="flex:1;text-align:center;padding:10px;">
      ⚽ Сыграть матч
    </button>`;
  }

  html += `</div>`;

  // ── Таблица всех дивизионов ──────────────────────────────────────────
  html += `<div style="font-size:13px;font-weight:700;color:#7d8e9e;margin-bottom:8px;">📊 Все дивизионы</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:6px;">`;

  for (let i = DIVISIONS.length - 1; i >= 0; i--) {
    const div = DIVISIONS[i];
    const isCurrent  = div.index === curDiv.index;
    const isPassed   = stars > div.maxStars;
    const isClaimed  = (gameState.claimedDivisionRewards || []).includes(div.index);
    const hasReward  = div.rewards && div.rewards.rubins > 0;

    const borderStyle = isCurrent
      ? `border:2px solid ${div.color};`
      : `border:1px solid #1e2d3d;`;
    const bgStyle = isCurrent
      ? `background:${div.color}18;`
      : isPassed
        ? `background:rgba(255,255,255,0.03);opacity:0.7;`
        : `background:rgba(255,255,255,0.03);`;

    html += `<div style="${bgStyle}${borderStyle}border-radius:8px;padding:8px 10px;">`;
    html += `<div style="display:flex;align-items:center;justify-content:space-between;">`;
    html += `<div style="display:flex;align-items:center;gap:8px;">`;

    // Иконка статуса
    // wasReached = true если игрок когда-либо достигал этого дивизиона
    // (либо он сейчас выше, либо уже забрал награду за этот дивизион)
    const wasReached = isPassed || isClaimed;
    if (isCurrent) {
      html += `<span style="font-size:14px;">👈</span>`;
    } else if (wasReached) {
      html += `<span style="font-size:14px;color:#4dc05a;">✓</span>`;
    } else {
      html += `<span style="font-size:14px;color:#2a3a4a;">○</span>`;
    }

    html += `<div>`;
    html += `<div style="font-size:13px;font-weight:${isCurrent ? '700' : '500'};color:${isCurrent ? div.color : '#e8e8e8'};">${div.name}</div>`;
    html += `<div style="font-size:10px;color:#7d8e9e;">${div.minStars}${div.maxStars >= 9999 ? '+' : '–'+div.maxStars} ⭐</div>`;
    html += `</div></div>`;

    // Награда
    if (hasReward) {
      if (isClaimed) {
        html += `<div style="font-size:10px;color:#4dc05a;">✓ Получено</div>`;
      } else if (isCurrent || isPassed) {
        html += `<button class="inline-btn" onclick="claimDivisionReward(${div.index})" style="font-size:10px;padding:3px 8px;">
          🎁 Забрать
        </button>`;
      } else {
        html += `<div style="font-size:10px;color:#7d8e9e;">${formatDivisionReward(div.rewards)}</div>`;
      }
    } else {
      html += `<div style="font-size:10px;color:#7d8e9e;">—</div>`;
    }

    html += `</div>`;

    // Подробности награды (если есть и ещё не получена)
    if (hasReward && !isClaimed && (isCurrent || !isPassed)) {
      html += `<div style="font-size:10px;color:#7d8e9e;margin-top:4px;">${formatDivisionReward(div.rewards)}</div>`;
    }

    html += `</div>`;
  }

  html += `</div>`;

  // ── Правила сезона ────────────────────────────────────────────────────
  html += `<div style="margin-top:14px;background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;font-size:11px;color:#7d8e9e;">
    <div style="font-weight:700;color:#e8e8e8;margin-bottom:4px;">📋 Правила сезона</div>
    <div>⭐ Победа +1 звезда</div>
    <div>🤝 Ничья — без изменений</div>
    <div>❌ Поражение −1 звезда (минимум 0)</div>
    <div style="margin-top:4px;">🏆 Награды за дивизион выдаются один раз при первом достижении.</div>
    <div>📅 Дата окончания сезона: <b style="color:#f0c040;">1 июля 2026, 00:00 МСК</b></div>
  </div>`;

  box.innerHTML = html;
}

// ── Забрать награду дивизиона ─────────────────────────────────────────────
async function claimDivisionReward(divIndex) {
  closeDivisionModal();

  const div = getDivisionByIndex(divIndex);
  if (!div) { await botReply('❌ Дивизион не найден.', 300); return; }

  if (!gameState.claimedDivisionRewards) gameState.claimedDivisionRewards = [];

  // Проверка: уже получена?
  if (gameState.claimedDivisionRewards.includes(divIndex)) {
    await botReply('ℹ️ Ты уже получил награду за этот дивизион.', 400);
    openDivisionModal();
    return;
  }

  // Проверка: игрок достиг этого дивизиона?
  const stars = gameState.stars || 0;
  if (stars < div.minStars) {
    await botReply(`❌ Ты ещё не достиг дивизиона <b>${div.name}</b>.`, 400, { html: true });
    openDivisionModal();
    return;
  }

  const rewards = div.rewards;
  if (!rewards || rewards.rubins === 0) {
    await botReply('ℹ️ У этого дивизиона нет наград.', 400);
    openDivisionModal();
    return;
  }

  // Начисляем награды
  if (rewards.rubins)      gameState.rubins          = (gameState.rubins          || 0) + rewards.rubins;
  if (rewards.passCredits) gameState.passCredits     = (gameState.passCredits     || 0) + rewards.passCredits;
  if (rewards.ovrPoints)   gameState.ovrUpgradePoints= (gameState.ovrUpgradePoints|| 0) + rewards.ovrPoints;
  if (rewards.draftTokens) gameState.draftTokens     = (gameState.draftTokens     || 0) + rewards.draftTokens;

  gameState.claimedDivisionRewards.push(divIndex);
  saveState();
  updateHeaderResources();

  const rewardStr = formatDivisionReward(rewards);
  await botReply(
    `🎉 Награда дивизиона <b style="color:${div.color};">${div.name}</b> получена!<br><br>${rewardStr}`,
    500,
    { html: true }
  );

  openDivisionModal();
}

// ── Проверка и автовыдача наград после матча ──────────────────────────────
function checkDivisionRewards() {
  if (!gameState.claimedDivisionRewards) gameState.claimedDivisionRewards = [];
  const stars  = gameState.stars || 0;
  const curDiv = getDivisionByStars(stars);

  // Проверяем все дивизионы, которых достиг игрок
  for (const div of DIVISIONS) {
    if (
      stars >= div.minStars &&
      div.rewards &&
      div.rewards.rubins > 0 &&
      !gameState.claimedDivisionRewards.includes(div.index)
    ) {
      // Показываем уведомление о доступной награде в чате
      const rewardStr = formatDivisionReward(div.rewards);
      botReply(
        `🏆 Ты достиг дивизиона <b style="color:${div.color};">${div.name}</b>!<br>
         Доступна награда: ${rewardStr}<br>
         <button class="inline-btn" onclick="claimDivisionReward(${div.index})" style="margin-top:6px;">🎁 Забрать награду</button>`,
        800,
        { html: true }
      );
      break; // Показываем только одно уведомление за раз
    }
  }

  // Проверяем окончание сезона
  checkSeasonEnd();
}

// ── Проверка окончания сезона ─────────────────────────────────────────────
function checkSeasonEnd() {
  if (gameState.seasonEndNotified) return;
  const t = getSeasonTimeLeft();
  if (t === null) {
    gameState.seasonEndNotified = true;
    saveState();
    const curDiv = getDivisionByStars(gameState.stars || 0);
    botReply(
      `⏰ <b>Сезон завершён!</b><br>
       Твой итоговый дивизион: <b style="color:${curDiv.color};">${curDiv.name}</b><br>
       Звёзд набрано: <b>${gameState.stars || 0}</b><br>
       Открой вкладку <b>Дивизион</b>, чтобы забрать оставшиеся награды.`,
      1000,
      { html: true }
    );
  }
}

// ── Переопределяем навигационную заглушку ────────────────────────────────
handleNavDivision = function() {
  if (!gameState.registered) { promptRegister(); return; }
  setActiveNav('nav-division');
  openDivisionModal();
};

// ── Периодическая проверка окончания сезона (каждые 60 секунд) ───────────
setInterval(() => {
  if (gameState.registered) checkSeasonEnd();
}, 60000);

// ── Периодическая проверка обновлений дата-пака (каждые 10 секунд) ───────
setInterval(() => {
  if (gameState.customDataUrl) checkCustomDataUpdate();
}, 10 * 1000);

// === END MODULE: division ===

// ========== INIT ==========
function init() {
  loadState();
  checkCustomDataUpdate();
  gameState.inMatch = false;   // сбрасываем флаг матча при перезагрузке
  updateHeaderResources();
  const savedPlayers = localStorage.getItem('footballManager_allPlayers');
  if (savedPlayers) {
    try {
      allPlayers = JSON.parse(savedPlayers);
    } catch (e) {
      allPlayers = JSON.parse(JSON.stringify(ALL_PLAYERS_TEMPLATE));
    }
  } else {
    allPlayers = JSON.parse(JSON.stringify(ALL_PLAYERS_TEMPLATE));
  }
  if (!gameState.myPlayers || gameState.myPlayers.length === 0) {
    gameState.myPlayers = STARTER_PLAYER_IDS.map(id=>allPlayers.find(p=>p.id===id)).filter(p=>p).map(p=>{
  const copy = JSON.parse(JSON.stringify(p));
  copy.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  return copy;
});
    saveState();
  }
  if (gameState.registered) { hideStartOverlay(); botReply(`С возвращением, <b>${escapeHtml(gameState.nickname)}</b>! ⚽`, 600, {html:true}); }
  else if (gameState.awaitingNickname) { hideStartOverlay(); botReply('Введи никнейм для продолжения регистрации:', 400); }
  else { startOverlay.classList.remove('hidden'); }
}
document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
</script>
