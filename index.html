<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Тренер — Футбольный Менеджер</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-main: #0e1621;
      --bg-header: #17212b;
      --bg-input: #17212b;
      --bg-bot-bubble: #182533;
      --bg-user-bubble: #2b5278;
      --bg-nav: #17212b;
      --text-primary: #e8e8e8;
      --text-secondary: #7d8e9e;
      --text-time: #6b7d8d;
      --accent: #5288c1;
      --border: #1e2d3d;
      --avatar-bg: #2b5278;
      --start-overlay-bg: #0e1621;
      --btn-primary: #5288c1;
      --btn-primary-hover: #4a7ab0;
      --nav-active: #5288c1;
      --nav-inactive: #6b7d8d;
      --shadow: rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0f18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ===== MAIN WRAPPER ===== */
    #app {
      max-width: 600px;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* ===== START OVERLAY ===== */
    #start-overlay {
      position: absolute;
      inset: 0;
      background: var(--start-overlay-bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }

    #start-overlay.hidden {
      display: none;
    }

    .start-logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 8px;
      box-shadow: 0 4px 24px rgba(82, 136, 193, 0.4);
    }

    .start-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .start-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 320px;
    }

    #btn-start {
      margin-top: 12px;
      padding: 14px 48px;
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    #btn-start:hover {
      background: var(--btn-primary-hover);
    }

    #btn-start:active {
      transform: scale(0.97);
    }

    /* ===== HEADER ===== */
    #header {
      background: var(--bg-header);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 56px;
      z-index: 10;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-status {
      font-size: 12px;
      color: #4dcd6c;
      margin-top: 1px;
    }

    .header-resources {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .resources-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .resource-item span.emoji {
      font-size: 13px;
    }

    .resource-item span.val {
      font-weight: 600;
      color: var(--text-primary);
      min-width: 20px;
    }

    /* ===== CHAT AREA ===== */
    #chat {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 4px;
    }

    #chat::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat::-webkit-scrollbar-thumb {
      background: #2a3a4a;
      border-radius: 2px;
    }

    /* ===== DATE DIVIDER ===== */
    .date-divider {
      text-align: center;
      margin: 8px 0;
      font-size: 12px;
      color: var(--text-time);
      position: relative;
    }

    .date-divider span {
      background: var(--bg-main);
      padding: 0 10px;
      position: relative;
      z-index: 1;
    }

    .date-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
    }

    /* ===== MESSAGE WRAPPER ===== */
    .msg-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      max-width: 100%;
      animation: fadeIn 0.25s ease forwards;
    }

    .msg-wrapper.bot {
      align-self: flex-start;
      flex-direction: row;
      max-width: 88%;
    }

    .msg-wrapper.user {
      align-self: flex-end;
      flex-direction: row-reverse;
      max-width: 80%;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== BOT AVATAR (small, in chat) ===== */
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-avatar.hidden {
      visibility: hidden;
    }

    /* ===== BUBBLES ===== */
    .msg-bubble {
      padding: 8px 10px 6px;
      border-radius: 12px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
      max-width: 100%;
    }

    .msg-wrapper.bot .msg-bubble {
      background: var(--bg-bot-bubble);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .msg-wrapper.user .msg-bubble {
      background: var(--bg-user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .msg-text {
      font-size: 14px;
      line-height: 1.5;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-time);
      text-align: right;
      margin-top: 3px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
    }

    .msg-wrapper.user .msg-time {
      color: rgba(255,255,255,0.55);
    }

    /* ===== PROFILE CARD BUBBLE ===== */
    .profile-card {
      background: linear-gradient(135deg, #1a2f45 0%, #182533 100%);
      border: 1px solid #2a4060;
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 220px;
      max-width: 280px;
    }

    .profile-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }

    .profile-card-row:last-child {
      border-bottom: none;
    }

    .profile-card-row .label {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .profile-card-row .value {
      font-weight: 600;
      color: var(--text-primary);
    }

    .profile-card-id {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: var(--text-time);
      word-break: break-all;
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ===== INPUT AREA ===== */
    #input-area {
      background: var(--bg-input);
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      z-index: 10;
    }

    #msg-input {
      flex: 1;
      background: #0e1621;
      border: 1px solid #1e2d3d;
      border-radius: 20px;
      padding: 9px 14px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
    }

    #msg-input:focus {
      border-color: var(--accent);
    }

    #msg-input::placeholder {
      color: var(--text-secondary);
    }

    #btn-send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--btn-primary);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #btn-send:hover {
      background: var(--btn-primary-hover);
    }

    #btn-send:active {
      transform: scale(0.92);
    }

    /* ===== BOTTOM NAV ===== */
    #bottom-nav {
      background: var(--bg-nav);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      z-index: 10;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 2px 8px;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--nav-inactive);
      font-size: 10px;
      transition: color 0.2s;
      min-width: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn .nav-emoji {
      font-size: 20px;
      line-height: 1;
    }

    .nav-btn .nav-label {
      font-size: 9.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      text-align: center;
      font-family: inherit;
    }

    .nav-btn:hover,
    .nav-btn.active {
      color: var(--nav-active);
    }

    .nav-btn.active .nav-emoji {
      filter: drop-shadow(0 0 4px rgba(82, 136, 193, 0.6));
    }

    /* ===== INLINE BUTTONS in messages ===== */
    .inline-btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .inline-btn {
      padding: 6px 12px;
      background: rgba(82, 136, 193, 0.2);
      border: 1px solid rgba(82, 136, 193, 0.4);
      border-radius: 16px;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    .inline-btn:hover {
      background: rgba(82, 136, 193, 0.35);
    }

    .inline-btn:active {
      background: rgba(82, 136, 193, 0.5);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
      .nav-btn .nav-label {
        font-size: 8.5px;
      }
      .nav-btn .nav-emoji {
        font-size: 18px;
      }
      .header-resources {
        gap: 2px;
      }
      .resource-item {
        font-size: 11px;
      }
    }

    /* ===== UTILITY ===== */
    .hidden { display: none !important; }

    .text-accent { color: var(--accent); }
    .text-muted { color: var(--text-secondary); }
    .text-bold { font-weight: 700; }

    /* Scrollbar for webkit */
    * {
      scrollbar-width: thin;
      scrollbar-color: #2a3a4a transparent;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ===== START OVERLAY ===== -->
    <div id="start-overlay">
      <div class="start-logo">⚽</div>
      <div class="start-title">Тренер<br>Футбольный Менеджер</div>
      <div class="start-subtitle">
        Собери команду мечты, побеждай в дивизионах<br>и стань лучшим менеджером!
      </div>
      <button id="btn-start">▶ НАЧАТЬ ИГРУ</button>
    </div>

    <!-- ===== HEADER ===== -->
    <div id="header">
      <div class="header-avatar">⚽</div>
      <div class="header-info">
        <div class="header-name">Тренер</div>
        <div class="header-status">online</div>
      </div>
      <div class="header-resources">
        <div class="resources-row">
          <div class="resource-item">
            <span class="emoji">💎</span>
            <span class="val" id="hdr-rubins">0</span>
          </div>
          <div class="resource-item">
            <span class="emoji">🔮</span>
            <span class="val" id="hdr-offside">0</span>
          </div>
        </div>
        <div class="resources-row">
          <div class="resource-item">
            <span class="emoji">⭐</span>
            <span class="val" id="hdr-xp">0</span>
          </div>
          <div class="resource-item">
            <span class="emoji">🏆</span>
            <span class="val" id="hdr-level">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== CHAT AREA ===== -->
    <div id="chat"></div>

    <!-- ===== INPUT AREA ===== -->
    <div id="input-area">
      <input
        type="text"
        id="msg-input"
        placeholder="Написать сообщение..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        maxlength="200"
      />
      <button id="btn-send" title="Отправить">➤</button>
    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav id="bottom-nav">
      <button class="nav-btn" id="nav-squad">
        <span class="nav-emoji">👥</span>
        <span class="nav-label">Состав</span>
      </button>
      <button class="nav-btn" id="nav-inventory">
        <span class="nav-emoji">🎒</span>
        <span class="nav-label">Игроки</span>
      </button>
      <button class="nav-btn" id="nav-shop">
        <span class="nav-emoji">🏪</span>
        <span class="nav-label">Магазин</span>
      </button>
      <button class="nav-btn" id="nav-events">
        <span class="nav-emoji">📋</span>
        <span class="nav-label">События</span>
      </button>
      <button class="nav-btn" id="nav-division">
        <span class="nav-emoji">⚽</span>
        <span class="nav-label">Дивизион</span>
      </button>
      <button class="nav-btn" id="nav-quests">
        <span class="nav-emoji">🏅</span>
        <span class="nav-label">Квесты</span>
      </button>
    </nav>

  </div><!-- /#app -->

  <script>
    /* ======================================================
       CONSTANTS & CONFIG
    ====================================================== */
    const STORAGE_KEY = 'footballManager_gameState';

    /* ======================================================
       DEFAULT / INITIAL GAME STATE
    ====================================================== */
    const DEFAULT_STATE = {
      rubins: 1500,
      offsideTokens: 0,
      trainingPoints: 1000,
      ovrUpgradePoints: 500,
      passCredits: 0,
      fragments: 500,
      draftTokens: 10,
      xp: 0,
      level: 0,
      nickname: '',
      playerId: '',
      stars: 0,
      matchesPlayed: 0,
      goalsScored: 0,
      registered: false,
      awaitingNickname: false
    };

    /* ======================================================
       GAME STATE
    ====================================================== */
    let gameState = {};

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          gameState = Object.assign({}, DEFAULT_STATE, JSON.parse(raw));
        } else {
          gameState = Object.assign({}, DEFAULT_STATE);
        }
      } catch (e) {
        console.warn('loadState error:', e);
        gameState = Object.assign({}, DEFAULT_STATE);
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
      } catch (e) {
        console.warn('saveState error:', e);
      }
    }

    /* ======================================================
       UTILITY HELPERS
    ====================================================== */
    function getTimestamp() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    function generatePlayerId() {
      // 15-digit unique ID
      try {
        const arr = new Uint32Array(2);
        crypto.getRandomValues(arr);
        const part1 = String(arr[0]).padStart(10, '0');
        const part2 = String(arr[1]).padStart(10, '0');
        const combined = (part1 + part2).replace(/\D/g, '');
        return combined.slice(0, 15).padEnd(15, '0');
      } catch (e) {
        // fallback
        const ts = String(Date.now());
        const rnd = String(Math.floor(Math.random() * 1e9)).padStart(9, '0');
        return (ts + rnd).slice(0, 15);
      }
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    /* ======================================================
       HEADER RESOURCES UPDATE
    ====================================================== */
    function updateHeaderResources() {
      document.getElementById('hdr-rubins').textContent = gameState.rubins ?? 0;
      document.getElementById('hdr-offside').textContent = gameState.offsideTokens ?? 0;
      document.getElementById('hdr-xp').textContent = gameState.xp ?? 0;
      document.getElementById('hdr-level').textContent = gameState.level ?? 0;
    }

    /* ======================================================
       CHAT MESSAGE FUNCTIONS
    ====================================================== */
    const chatEl = document.getElementById('chat');
    let lastDateLabel = '';
    let lastBotSequence = false;

    function getTodayLabel() {
      const now = new Date();
      const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
      const d = now.getDate();
      const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
      return `${d} ${months[now.getMonth()]}`;
    }

    function ensureDateDivider() {
      const label = getTodayLabel();
      if (label !== lastDateLabel) {
        lastDateLabel = label;
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.innerHTML = `<span>${label}</span>`;
        chatEl.appendChild(div);
      }
    }

    function scrollChatToBottom() {
      setTimeout(() => {
        chatEl.scrollTop = chatEl.scrollHeight;
      }, 50);
    }

    /**
     * addMessage(text, type, options)
     * type: 'bot' | 'user'
     * options: { html: bool, noAvatar: bool, card: html-string }
     */
    function addMessage(content, type = 'bot', options = {}) {
      ensureDateDivider();

      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${type}`;

      const time = getTimestamp();

      if (type === 'bot') {
        // Avatar
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'msg-avatar' + (options.noAvatar ? ' hidden' : '');
        avatarDiv.textContent = '⚽';
        wrapper.appendChild(avatarDiv);

        // Bubble
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        if (options.card) {
          bubble.innerHTML = options.card;
        } else if (options.html) {
          const textDiv = document.createElement('div');
          textDiv.className = 'msg-text';
          textDiv.innerHTML = content;
          bubble.appendChild(textDiv);
        } else {
          const textDiv = document.createElement('div');
          textDiv.className = 'msg-text';
          textDiv.textContent = content;
          bubble.appendChild(textDiv);
        }

        const timeDiv = document.createElement('div');
        timeDiv.className = 'msg-time';
        timeDiv.textContent = time;
        bubble.appendChild(timeDiv);

        wrapper.appendChild(bubble);
        lastBotSequence = true;
      } else {
        // User message
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        const textDiv = document.createElement('div');
        textDiv.className = 'msg-text';
        if (options.html) {
          textDiv.innerHTML = content;
        } else {
          textDiv.textContent = content;
        }
        bubble.appendChild(textDiv);

        const timeDiv = document.createElement('div');
        timeDiv.className = 'msg-time';
        timeDiv.innerHTML = `${time} <span>✓✓</span>`;
        bubble.appendChild(timeDiv);

        wrapper.appendChild(bubble);
        lastBotSequence = false;
      }

      chatEl.appendChild(wrapper);
      scrollChatToBottom();
      return wrapper;
    }

    function addTypingIndicator() {
      ensureDateDivider();
      const wrapper = document.createElement('div');

    async function startRegistrationFlow() {
      await botReply(
        'Привет! Я — твой виртуальный тренер. 👋\n\nКак тебя зовут? Введи свой никнейм:',
        800
      );
      gameState.awaitingNickname = true;
      saveState();
    }

    async function completeRegistration(nickname) {
      const trimmed = nickname.trim();
      if (!trimmed || trimmed.length < 2) {
        await botReply('Никнейм должен содержать минимум 2 символа. Попробуй ещё раз! 😊', 500);
        return;
      }
      if (trimmed.length > 20) {
        await botReply('Никнейм слишком длинный (максимум 20 символов). Попробуй ещё раз! 😊', 500);
        return;
      }

      const playerId = generatePlayerId();
      gameState.nickname = trimmed;
      gameState.playerId = playerId;
      gameState.awaitingNickname = false;
      gameState.registered = true;
      saveState();
      updateHeaderResources();

      await botReply(
        `Привет, <b>${escapeHtml(trimmed)}</b>! 🎉\n\nТвой ID: <code>${escapeHtml(playerId)}</code>\n\nТеперь ты — менеджер своей команды мечты. Собирай игроков, побеждай в дивизионах и веди свою команду к чемпионству! 🏆`,
        700,
        { html: true }
      );

      await botReply(
        null,
        900,
        { card: buildProfileCardHTML(gameState) }
      );

      await botReply(
        'Используй кнопки внизу для навигации. Удачи на поле! ⚽',
        600
      );
    }

    /* ======================================================
       SEND MESSAGE LOGIC
    ====================================================== */
    const msgInput = document.getElementById('msg-input');
    const btnSend = document.getElementById('btn-send');

    function sendUserMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      msgInput.value = '';
      msgInput.style.height = '';

      addMessage(text, 'user');
      processUserMessage(text);
    }

    btnSend.addEventListener('click', sendUserMessage);

    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendUserMessage();
      }
    });

    /* ======================================================
       PROCESS USER MESSAGE
    ====================================================== */
    function processUserMessage(text) {
      const lower = text.toLowerCase().trim();

      // --- Registration: awaiting nickname ---
      if (gameState.awaitingNickname) {
        completeRegistration(text);
        return;
      }

      // --- Not registered yet ---
      if (!gameState.registered) {
        botReply('Нажми кнопку «НАЧАТЬ ИГРУ», чтобы начать! 😊', 500);
        return;
      }

      // --- Basic command routing ---
      if (lower === 'профиль' || lower === '/profile' || lower === '/профиль') {
        showProfile();
        return;
      }

      if (lower === 'помощь' || lower === '/help' || lower === '/помощь' || lower === 'помоги') {
        showHelp();
        return;
      }

      if (lower === 'состав' || lower === '/состав' || lower === '/squad') {
        handleNavSquad();
        return;
      }

      if (lower === 'магазин' || lower === '/магазин' || lower === '/shop') {
        handleNavShop();
        return;
      }

      if (lower === 'игроки' || lower === '/игроки' || lower === '/inventory') {
        handleNavInventory();
        return;
      }

      if (lower === 'события' || lower === '/события' || lower === '/events') {
        handleNavEvents();
        return;
      }

      if (lower === 'дивизион' || lower === '/дивизион' || lower === '/division') {
        handleNavDivision();
        return;
      }

      if (lower === 'квесты' || lower === '/квесты' || lower === '/quests') {
        handleNavQuests();
        return;
      }

      // --- Default fallback ---
      botReply(
        `Я не понял команду «${escapeHtml(text)}». 🤔\n\nНапиши «помощь» или воспользуйся кнопками навигации внизу.`,
        600,
        { html: true }
      );
    }

        startOverlay.classList.remove('hidden');

      dailyQuestsDate:    '',   // date string of last quest refresh
      allQuestsBonus:     false,
      dailyRewardLastDate:'',
      passLevel:          0,
      passClaimedLevels:  [],   // [{ level, free, paid }, ...]
      draftCounterB:      0,    // guaranteed pool-B pull every 10
      draftCounterA:      0,    // guaranteed pool-A pull every 100
      promoUsed:          [],   // promo codes already redeemed
      goalsForQuest:      0,    // goals scored today
      matchesForQuest:    0,    // matches played today
      packsOpened:        0,    // packs opened today
      levelsGained:       0     // levels gained today
    });

    // ── Runtime player catalogue (deep-cloned from template on every page load) ─
    let allPlayers = [];

    // ── Helper functions ─────────────────────────────────────────────────────────

    /**
     * Returns the effective OVR of a player (base ovr + ovrUpgrade bonuses).
     */
    function getEffectiveOvr(player) {
      if (!player) return 0;
      return (player.ovr || 0) + (player.ovrUpgrade || 0);
    }

    /**
     * Returns a copy of a player's stats with training bonus applied.
     * Each training level adds +1 to every stat.
     */
    function getEffectiveStats(player) {
      if (!player || !player.stats) return {};
      const stats = Object.assign({}, player.stats);
      const bonus = player.trainingLevel || 0;
      for (const key in stats) {
        stats[key] = (stats[key] || 0) + bonus;
      }
      return stats;
    }

    /**
     * Finds a player in the user's own collection by numeric id.
     * Returns null if not found.
     */
    function findPlayerById(id) {
      if (!gameState || !Array.isArray(gameState.myPlayers)) return null;
      return gameState.myPlayers.find(p => p.id === id) || null;
    }

    /**
     * Returns the fragment reward for a given effective OVR value.
     */
    function getFragmentReward(ovr) {
      for (const [min, max, frags] of FRAGMENT_EXCHANGE_RATES) {
        if (ovr >= min && ovr <= max) return frags;
      }
      return 50; // fallback
    }

    // ── Patch init() to seed allPlayers and starter squad ────────────────────────
    // We wrap the original init so the new logic runs after loadState().
    (function patchInit() {
      const _originalInit = typeof init === 'function' ? init : null;

      init = function () {
        // 1. Load allPlayers catalogue from the immutable template
        allPlayers = JSON.parse(JSON.stringify(ALL_PLAYERS_TEMPLATE));

        // 2. Run the original init (calls loadState → updateHeaderResources →
        //    shows overlay or welcome-back message)
        if (_originalInit) _originalInit();

        // 3. After state is loaded, give starter players to brand-new accounts
        if (!gameState.myPlayers || gameState.myPlayers.length === 0) {
          gameState.myPlayers = STARTER_PLAYER_IDS
            .map(id => allPlayers.find(p => p.id === id))
            .filter(p => p !== undefined)
            .map(p => JSON.parse(JSON.stringify(p)));
          saveState();
        }
      };
    })();
