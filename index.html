<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Offside 26 — Футбольный Симмулятор</title>
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #0e1621;
      --bg-header: #17212b;
      --bg-input: #17212b;
      --bg-bot-bubble: #182533;
      --bg-user-bubble: #2b5278;
      --bg-nav: #17212b;
      --text-primary: #e8e8e8;
      --text-secondary: #7d8e9e;
      --text-time: #6b7d8d;
      --accent: #5288c1;
      --border: #1e2d3d;
      --avatar-bg: #2b5278;
      --start-overlay-bg: #0e1621;
      --btn-primary: #5288c1;
      --btn-primary-hover: #4a7ab0;
      --nav-active: #5288c1;
      --nav-inactive: #6b7d8d;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0f18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      overflow: hidden;
    }

    #app {
      max-width: 600px;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* START OVERLAY */
    #start-overlay {
      position: absolute;
      inset: 0;
      background: var(--start-overlay-bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }
    #start-overlay.hidden { display: none; }

    .start-logo {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--avatar-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin-bottom: 8px;
      box-shadow: 0 4px 24px rgba(82,136,193,0.4);
    }
    .start-title { font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .start-subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 320px; }

    #btn-start {
      margin-top: 12px; padding: 14px 48px;
      background: var(--btn-primary); color: #fff; border: none;
      border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s; letter-spacing: 0.3px;
    }
    #btn-start:hover { background: var(--btn-primary-hover); }
    #btn-start:active { transform: scale(0.97); }

    /* HEADER */
    #header {
      background: var(--bg-header); padding: 8px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      min-height: 56px; z-index: 10;
    }
    .header-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--avatar-bg); display: flex;
      align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-size: 15px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 12px; color: #4dcd6c; margin-top: 1px; }
    .header-resources { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .resources-row { display: flex; gap: 8px; align-items: center; }
    .resource-item { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .resource-item span.emoji { font-size: 13px; }
    .resource-item span.val { font-weight: 600; color: var(--text-primary); min-width: 20px; }

    /* CHAT */
    #chat {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 12px 8px 8px; display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

    .date-divider { text-align: center; margin: 8px 0; font-size: 12px; color: var(--text-time); position: relative; }
    .date-divider span { background: var(--bg-main); padding: 0 10px; position: relative; z-index: 1; }
    .date-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }

    .msg-wrapper { display: flex; align-items: flex-end; gap: 6px; max-width: 100%; animation: fadeIn 0.25s ease forwards; }
    .msg-wrapper.bot { align-self: flex-start; flex-direction: row; max-width: 88%; }
    .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; align-self: flex-end; }
    .msg-avatar.hidden { visibility: hidden; }

    .msg-bubble { padding: 8px 10px 6px; border-radius: 12px; line-height: 1.5; word-break: break-word; position: relative; max-width: 100%; }
    .msg-wrapper.bot .msg-bubble { background: var(--bg-bot-bubble); border-bottom-left-radius: 4px; color: var(--text-primary); }
    .msg-wrapper.user .msg-bubble { background: var(--bg-user-bubble); border-bottom-right-radius: 4px; color: #fff; }
    .msg-text { font-size: 14px; line-height: 1.5; }
    .msg-time { font-size: 11px; color: var(--text-time); text-align: right; margin-top: 3px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
    .msg-wrapper.user .msg-time { color: rgba(255,255,255,0.55); }

    .profile-card { background: linear-gradient(135deg, #1a2f45 0%, #182533 100%); border: 1px solid #2a4060; border-radius: 10px; padding: 12px 14px; min-width: 220px; max-width: 280px; }
    .profile-card-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .profile-card-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .profile-card-row:last-child { border-bottom: none; }
    .profile-card-row .label { color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .profile-card-row .value { font-weight: 600; color: var(--text-primary); }
    .profile-card-id { margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: var(--text-time); word-break: break-all; }

    .typing-indicator { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: typingBounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-4px);opacity:1} }

    /* INPUT */
    #input-area { background: var(--bg-input); border-top: 1px solid var(--border); padding: 8px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; z-index: 10; }
    #msg-input { flex: 1; background: #0e1621; border: 1px solid #1e2d3d; border-radius: 20px; padding: 9px 14px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; resize: none; line-height: 1.4; }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-secondary); }
    #btn-send { width: 40px; height: 40px; border-radius: 50%; background: var(--btn-primary); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; }
    #btn-send:hover { background: var(--btn-primary-hover); }
    #btn-send:active { transform: scale(0.92); }

    /* BOTTOM NAV */
    #bottom-nav { background: var(--bg-nav); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; z-index: 10; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 2px 8px; gap: 3px; background: none; border: none; cursor: pointer; color: var(--nav-inactive); font-size: 10px; transition: color 0.2s; min-width: 0; -webkit-tap-highlight-color: transparent; }
    .nav-btn .nav-emoji { font-size: 20px; line-height: 1; }
    .nav-btn .nav-label { font-size: 9.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; font-family: inherit; }
    .nav-btn:hover, .nav-btn.active { color: var(--nav-active); }
    .nav-btn.active .nav-emoji { filter: drop-shadow(0 0 4px rgba(82,136,193,0.6)); }

    .inline-btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .inline-btn { padding: 6px 12px; background: rgba(82,136,193,0.2); border: 1px solid rgba(82,136,193,0.4); border-radius: 16px; color: var(--accent); font-size: 13px; cursor: pointer; transition: background 0.2s; font-family: inherit; }
    .inline-btn:hover { background: rgba(82,136,193,0.35); }
    .inline-btn:active { background: rgba(82,136,193,0.5); }

    @media (max-width: 400px) {
      .nav-btn .nav-label { font-size: 8.5px; }
      .nav-btn .nav-emoji { font-size: 18px; }
      .header-resources { gap: 2px; }
      .resource-item { font-size: 11px; }
    }

    .hidden { display: none !important; }
        /* Фиксированная панель управления матчем */
    #match-controls {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(23,33,43,0.95);
      border: 1px solid #2a4060;
      border-radius: 10px;
      padding: 6px 10px;
      display: none;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 600px;
      width: 90%;
    }
    #match-controls.visible { display: flex; }
    #match-controls .tactic-btn {
      padding: 5px 10px;
      background: rgba(82,136,193,0.2);
      border: 1px solid rgba(82,136,193,0.4);
      border-radius: 14px;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #match-controls .tactic-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    #match-controls .sub-btn {
      padding: 5px 12px;
      background: rgba(240,192,64,0.2);
      border: 1px solid rgba(240,192,64,0.4);
      border-radius: 14px;
      color: var(--gold);
      font-size: 12px;
      cursor: pointer;
    }
    .shop-nav-btn {
      background: rgba(82,136,193,0.2);
      border: 1px solid rgba(82,136,193,0.4);
      color: var(--accent);
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
    }
    .shop-nav-btn:hover {
      background: rgba(82,136,193,0.35);
    }
  </style>
</head>
<body>
<div id="app">
  <div id="start-overlay">
    <!-- Логотип игры -->
    <img src="https://i.ibb.co/0pN8LQch/Offside-26-logo.png" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 24px rgba(82,136,193,0.4);" />
    <div class="start-title">Offside 26</div>
    <div class="start-subtitle">Собирай лучших игроков, выигрывай турниры<br>и стань легендой футбола!</div>
    <button id="btn-start">▶ НАЧАТЬ ИГРУ</button>
  </div>

  <div id="header">
    <img class="header-avatar" src="https://i.ibb.co/0pN8LQch/Offside-26-logo.png" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;" />
    <div class="header-info">
      <div class="header-name">Тренер</div>
      <div class="header-status">online</div>
    </div>
    <div class="header-resources">
      <div class="resources-row">
        <div class="resource-item"><img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-rubins">0</span></div>
        <div class="resource-item"><img src="https://i.ibb.co/Cpq33M9q/Offside.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-offside">0</span></div>
      </div>
      <div class="resources-row">
        <div class="resource-item"><img src="https://i.ibb.co/TxwKYZVc/XP.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-xp">0</span></div>
        <div class="resource-item"><img src="https://i.ibb.co/twVpcSbk/image.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-level">0</span></div>
      </div>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Написать сообщение..." autocomplete="off" autocorrect="off" spellcheck="false" maxlength="200" />
    <button id="btn-send" title="Отправить">➤</button>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-squad"><span class="nav-emoji">👥</span><span class="nav-label">Состав</span></button>
    <button class="nav-btn" id="nav-inventory"><span class="nav-emoji">🎒</span><span class="nav-label">Игроки</span></button>
    <button class="nav-btn" id="nav-shop"><span class="nav-emoji">🏪</span><span class="nav-label">Магазин</span></button>
    <button class="nav-btn" id="nav-events"><span class="nav-emoji">📋</span><span class="nav-label">События</span></button>
    <button class="nav-btn" id="nav-division"><span class="nav-emoji">⚽</span><span class="nav-label">Дивизион</span></button>
    <button class="nav-btn" id="nav-quests"><span class="nav-emoji">🏅</span><span class="nav-label">Квесты</span></button>
  </nav>
</div>

<script>
// === CONSTANTS & CONFIG ===
const STORAGE_KEY = 'footballManager_gameState';

// === DEFAULT STATE ===
const DEFAULT_STATE = {
  rubins: 1500, offsideTokens: 0, trainingPoints: 1000, ovrUpgradePoints: 500,
  passCredits: 0, fragments: 500, draftTokens: 10, xp: 0, level: 0,
  nickname: '', playerId: '', stars: 0, matchesPlayed: 0, goalsScored: 0,
  registered: false, awaitingNickname: false, awaitingClubName: false,
  clubName: '' 
};

let gameState = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    gameState = raw ? Object.assign({}, DEFAULT_STATE, JSON.parse(raw)) : Object.assign({}, DEFAULT_STATE);
  } catch (e) { gameState = Object.assign({}, DEFAULT_STATE); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState)); }

// === UTILS ===
function getTimestamp() { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function generatePlayerId() {
  try {
    const arr = new Uint32Array(2); crypto.getRandomValues(arr);
    return (String(arr[0]).padStart(10,'0')+String(arr[1]).padStart(10,'0')).replace(/\D/g,'').slice(0,15).padEnd(15,'0');
  } catch(e) { return (String(Date.now())+String(Math.floor(Math.random()*1e9)).padStart(9,'0')).slice(0,15); }
}
function escapeHtml(t) { const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g,c=>m[c]); }

// === HEADER ===
function updateHeaderResources() {
  document.getElementById('hdr-rubins').textContent = gameState.rubins ?? 0;
  document.getElementById('hdr-offside').textContent = gameState.offsideTokens ?? 0;
  document.getElementById('hdr-xp').textContent = gameState.xp ?? 0;
  document.getElementById('hdr-level').textContent = gameState.level ?? 0;
}

// === CHAT ===
const chatEl = document.getElementById('chat');
let lastDateLabel = '';

function getTodayLabel() {
  const now = new Date();
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${now.getDate()} ${months[now.getMonth()]}`;
}
function ensureDateDivider() {
  const label = getTodayLabel();
  if (label !== lastDateLabel) {
    lastDateLabel = label;
    const div = document.createElement('div'); div.className = 'date-divider'; div.innerHTML = `<span>${label}</span>`;
    chatEl.appendChild(div);
  }
}
function scrollChatToBottom() { setTimeout(()=>{ chatEl.scrollTop = chatEl.scrollHeight; }, 50); }

function addMessage(content, type='bot', options={}) {
  ensureDateDivider();
  const wrapper = document.createElement('div'); wrapper.className = `msg-wrapper ${type}`;
  const time = getTimestamp();

  if (type === 'bot') {
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar' + (options.noAvatar ? ' hidden' : '');
    const img = document.createElement('img');
    img.src = 'https://i.ibb.co/0pN8LQch/Offside-26-logo.png';
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.borderRadius = '50%';
    img.style.objectFit = 'cover';
    avatar.appendChild(img);
    wrapper.appendChild(avatar);
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    if (options.card) bubble.innerHTML = options.card;
    else {
      const textDiv = document.createElement('div'); textDiv.className = 'msg-text';
      if (options.html) textDiv.innerHTML = content; else textDiv.textContent = content;
      bubble.appendChild(textDiv);
    }
    const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time'; timeDiv.textContent = time;
    bubble.appendChild(timeDiv);
    wrapper.appendChild(bubble);
  } else {
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    const textDiv = document.createElement('div'); textDiv.className = 'msg-text';
    if (options.html) textDiv.innerHTML = content; else textDiv.textContent = content;
    bubble.appendChild(textDiv);
    const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time'; timeDiv.innerHTML = `${time} <span>✓✓</span>`;
    bubble.appendChild(timeDiv);
    wrapper.appendChild(bubble);
  }
  chatEl.appendChild(wrapper);
  scrollChatToBottom();
  return wrapper;
}

function addTypingIndicator() {
  ensureDateDivider();
  const wrapper = document.createElement('div'); wrapper.className = 'msg-wrapper bot'; wrapper.id='typing-indicator';
  wrapper.innerHTML = `<img class="msg-avatar" src="https://i.ibb.co/0pN8LQch/Offside-26-logo.png" style="border-radius:50%; object-fit:cover;" /><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  chatEl.appendChild(wrapper); scrollChatToBottom(); return wrapper;
}
function removeTypingIndicator() { const el=document.getElementById('typing-indicator'); if(el)el.remove(); }
function botReply(content, delay=600, options={}) {
  return new Promise(resolve => {
    const typing = addTypingIndicator();
    setTimeout(()=>{ removeTypingIndicator(); resolve(addMessage(content,'bot',options)); }, delay);
  });
}

// === PROFILE CARD ===
function buildProfileCardHTML(s) {
  return `<div class="profile-card"><div class="profile-card-title">📊 Профиль менеджера</div>
    <div class="profile-card-row"><span class="label">👤 Ник</span><span class="value">${escapeHtml(s.nickname)}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/twVpcSbk/image.png" style="width:16px;height:16px;vertical-align:middle;" /> Уровень</span><span class="value">${s.level}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/TxwKYZVc/XP.png" style="width:16px;height:16px;vertical-align:middle;" /> XP</span><span class="value">${s.xp}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:16px;height:16px;vertical-align:middle;" /> Сапфиры</span><span class="value">${s.rubins}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/Cpq33M9q/Offside.png" style="width:16px;height:16px;vertical-align:middle;" /> Offside-токены</span><span class="value">${s.offsideTokens}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/gb178dPT/image.png" style="width:16px;height:16px;vertical-align:middle;" /> Очки тренировки</span><span class="value">${s.trainingPoints}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/jv3KsbMx/OVR.png" style="width:16px;height:16px;vertical-align:middle;" /> Очки повышения OVR</span><span class="value">${s.ovrUpgradePoints}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/xtBftkpX/image.png" style="width:16px;height:16px;vertical-align:middle;" /> Фрагменты</span><span class="value">${s.fragments}</span></div>
    <div class="profile-card-row"><span class="label"><img src="https://i.ibb.co/6RTT8K1z/image.png" style="width:16px;height:16px;vertical-align:middle;" /> Купоны открытия</span><span class="value">${s.draftTokens}</span></div>
    <div class="profile-card-row"><span class="label">⚽ Матчей сыграно</span><span class="value">${s.matchesPlayed}</span></div>
    <div class="profile-card-row"><span class="label">🥅 Голов забито</span><span class="value">${s.goalsScored}</span></div>
    <div class="profile-card-id">🆔 ID: ${escapeHtml(s.playerId)}</div></div>`;
}

// === REGISTRATION ===
async function startRegistrationFlow() {
  await botReply('Приветствую в Offside 26! Я — твой виртуальный тренер. Введи свой никнейм:', 800);
  gameState.awaitingNickname = true; saveState();
}
async function completeRegistration(nickname) {
  const trimmed = nickname.trim();
  if (!trimmed || trimmed.length < 2) { await botReply('Никнейм должен содержать минимум 2 символа.', 500); return; }
  if (trimmed.length > 20) { await botReply('Никнейм слишком длинный (макс. 20).', 500); return; }

  const playerId = generatePlayerId();
  gameState.nickname = trimmed;
  gameState.playerId = playerId;
  gameState.awaitingNickname = false;
  gameState.awaitingClubName = true;   // Включаем ожидание ввода клуба
  saveState();

  await botReply(`Привет, <b>${escapeHtml(trimmed)}</b>! Теперь введи название своего футбольного клуба:`, 700, { html: true });
}

async function completeClubRegistration(clubName) {
  const trimmed = clubName.trim();
  if (!trimmed || trimmed.length < 2) { await botReply('Название клуба должно содержать минимум 2 символа.', 500); return; }
  if (trimmed.length > 25) { await botReply('Название клуба слишком длинное (макс. 25).', 500); return; }

  gameState.clubName = trimmed;
  gameState.awaitingClubName = false;
  gameState.registered = true;
  saveState();
  updateHeaderResources();

  await botReply(`Клуб <b>${escapeHtml(trimmed)}</b> основан! 🎉\n\nТвой ID: <code>${escapeHtml(gameState.playerId)}</code>`, 700, {html:true});
  await botReply(null, 900, {card: buildProfileCardHTML(gameState)});
  await botReply('Используй кнопки внизу для навигации. Удачи на поле! ⚽', 600);
}

// === SEND MESSAGE ===
const msgInput = document.getElementById('msg-input');
const btnSend = document.getElementById('btn-send');
function sendUserMessage() {
  const text = msgInput.value.trim(); if (!text) return;
  msgInput.value = ''; addMessage(text,'user'); processUserMessage(text);
}
btnSend.addEventListener('click', sendUserMessage);
msgInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendUserMessage(); } });

function processUserMessage(text) {
  const lower = text.toLowerCase().trim();
  if (gameState.awaitingNickname) { completeRegistration(text); return; }
  if (gameState.awaitingClubName) { completeClubRegistration(text); return; }
  if (!gameState.registered) { botReply('Нажми кнопку «НАЧАТЬ ИГРУ»!', 500); return; }
  if (lower==='профиль'||lower==='/profile') showProfile();
  else if (lower==='помощь'||lower==='/help') showHelp();
  else if (lower==='состав'||lower==='/squad') handleNavSquad();
  else if (lower==='магазин'||lower==='/shop') handleNavShop();
  else if (lower==='игроки'||lower==='/inventory') handleNavInventory();
  else if (lower==='события'||lower==='/events') handleNavEvents();
  else if (lower==='дивизион'||lower==='/division') handleNavDivision();
  else if (lower==='квесты'||lower==='/quests') handleNavQuests();
  else botReply(`Не понял команду. Напиши «помощь».`, 600);
}

function showProfile() { botReply(null, 500, {card: buildProfileCardHTML(gameState)}); }
function showHelp() {
  botReply(`<div class="msg-text"><b>📖 Доступные команды:</b><br><br><b>профиль</b> — профиль<br><b>состав</b> — состав<br><b>игроки</b> — инвентарь<br><b>магазин</b> — магазин<br><b>события</b> — события<br><b>дивизион</b> — матчи<br><b>квесты</b> — квесты</div>`, 400, {html:true});
}

function setActiveNav(btnId) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const a=document.getElementById(btnId); if(a)a.classList.add('active');
}
function promptRegister() { botReply('Сначала зарегистрируйся!', 400); }

function handleNavSquad() { if(!gameState.registered){promptRegister();return;} setActiveNav('nav-squad'); botReply('👥 <b>Состав</b> — в разработке.', 500, {html:true}); }
function handleNavInventory() { if(!gameState.registered){promptRegister();return;} setActiveNav('nav-inventory'); botReply('🎒 <b>Игроки</b> — в разработке.', 500, {html:true}); }
function handleNavEvents() { if(!gameState.registered){promptRegister();return;} setActiveNav('nav-events'); botReply('📋 <b>События</b> — в разработке.', 500, {html:true}); }
function handleNavDivision() { if(!gameState.registered){promptRegister();return;} setActiveNav('nav-division'); botReply('⚽ <b>Дивизион</b> — в разработке.', 500, {html:true}); }

let shopState = { screen: 'main' }; // main / packs / special / resources / promo / packInfo:{id}

function openShopModal() {
  let overlay = document.getElementById('shop-modal');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'shop-modal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeShopModal(); });
    overlay.innerHTML = `<div id="shop-modal-box" style="background:#17212b;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:16px;"></div>`;
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'flex';
  renderShopScreen();
}

function closeShopModal() {
  const overlay = document.getElementById('shop-modal');
  if (overlay) overlay.style.display = 'none';
}

function shopBack() {
  if (typeof shopState.screen === 'object' && shopState.screen.packInfo) {
    // Если была информация о паке, возвращаемся к категории
    shopState.screen = shopState.screen.returnTo || 'packs';
  } else {
    shopState.screen = 'main';
  }
  renderShopScreen();
}

function renderShopScreen() {
  const box = document.getElementById('shop-modal-box');
  if (!box) return;

  let html = '';
  const backBtn = shopState.screen !== 'main'
    ? `<button onclick="shopBack()" style="background:rgba(255,255,255,0.1);border:none;color:#fff;padding:6px 12px;border-radius:8px;margin-bottom:10px;cursor:pointer;">← Назад</button>`
    : '';

  if (shopState.screen === 'main') {
    html = '<h3 style="margin:0 0 12px;">🏪 Магазин</h3>';
    html += '<div style="display:flex;flex-direction:column;gap:8px;">';
    html += '<button class="shop-nav-btn" onclick="shopState.screen=\'packs\';renderShopScreen();">📦 Паки</button>';
    html += '<button class="shop-nav-btn" onclick="shopState.screen=\'special\';renderShopScreen();">💎 Спец. предложения</button>';
    html += '<button class="shop-nav-btn" onclick="shopState.screen=\'resources\';renderShopScreen();">🎯 Ресурсы</button>';
    html += '<button class="shop-nav-btn" onclick="shopState.screen=\'promo\';renderShopScreen();">🔑 Промокод</button>';
    html += '</div>';
  } else if (shopState.screen === 'packs' || shopState.screen === 'special' || shopState.screen === 'resources') {
    const category = shopState.screen;
    const packs = SHOP_PACKS.filter(p => p.category === category);
    html = backBtn + `<h3 style="margin:0 0 12px;">${category === 'packs' ? '📦 Паки' : category === 'special' ? '💎 Спец. предложения' : '🎯 Ресурсы'}</h3>`;
    if (packs.length === 0) {
      html += '<div style="color:#7d8e9e;">Нет доступных предложений.</div>';
    } else {
      html += '<div style="display:flex;flex-direction:column;gap:10px;">';
      for (const pack of packs) {
        const currencyIcon = pack.currency === 'rubins'
          ? '<img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:14px;height:14px;vertical-align:middle;" />'
          : '<img src="https://i.ibb.co/Cpq33M9q/Offside.png" style="width:14px;height:14px;vertical-align:middle;" />';
        html += `<div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;cursor:pointer;" onclick="shopState.screen={packInfo:'${pack.id}',returnTo:'${category}'};renderShopScreen();">`;
        if (pack.label) html += `<div style="font-size:10px;color:#f0c040;margin-bottom:4px;">${pack.label}</div>`;
        html += `<div style="display:flex;align-items:center;gap:8px;">`;
        html += `<span style="font-size:24px;">${pack.emoji}</span>`;
        html += `<div style="flex:1;"><div style="font-weight:700;">${pack.name}</div>`;
        html += `<div style="font-size:11px;color:#7d8e9e;">${pack.description || ''}</div></div>`;
        html += `<div style="font-size:14px;color:#f0c040;">${currencyIcon} ${pack.price}</div>`;
        html += `</div></div>`;
      }
      html += '</div>';
    }
  } else if (typeof shopState.screen === 'object' && shopState.screen.packInfo) {
    const pack = SHOP_PACKS.find(p => p.id === shopState.screen.packInfo);
    if (!pack) { shopState.screen = 'packs'; renderShopScreen(); return; }
    const currencyIcon = pack.currency === 'rubins'
      ? '<img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:14px;height:14px;vertical-align:middle;" />'
      : '<img src="https://i.ibb.co/Cpq33M9q/Offside.png" style="width:14px;height:14px;vertical-align:middle;" />';
    html = backBtn + `<h3 style="margin:0 0 12px;">${pack.emoji} ${pack.name}</h3>`;
    html += `<div style="font-size:12px;color:#7d8e9e;margin-bottom:8px;">${pack.description || ''}</div>`;
    if (pack.type === 'players') {
      html += '<div style="font-size:12px;margin-bottom:8px;">📦 Содержит: <b>' + pack.count + '</b> карт.</div>';
      if (pack.ovrRanges) {
        html += '<div style="font-size:11px;color:#7d8e9e;">Шансы OVR:</div>';
        for (const r of pack.ovrRanges) {
          html += `<div style="font-size:11px;">${r.minOvr}-${r.maxOvr}: ${r.chance}%</div>`;
        }
      }
      if (pack.idPools) {
        html += '<div style="font-size:11px;color:#7d8e9e;">Специальные пулы:</div>';
        for (const p of pack.idPools) {
          html += `<div style="font-size:11px;">Пул (${p.chance}%): ${p.ids.join(', ')}</div>`;
        }
      }
    } else if (pack.type === 'resources') {
      html += '<div style="font-size:12px;margin-bottom:8px;">🎯 Ресурсы:</div>';
      if (pack.resourceReward) {
        html += `<div style="font-size:11px;">${formatResource(pack.resourceReward)}</div>`;
      }
      if (pack.resourcePool) {
        html += '<div style="font-size:11px;color:#7d8e9e;">Случайный ресурс:</div>';
        for (const r of pack.resourcePool) {
          html += `<div style="font-size:11px;">${formatResource(r.reward)} — ${r.chance}%</div>`;
        }
      }
    }
    html += `<button class="shop-nav-btn" onclick="closeShopModal();purchasePack('${pack.id}');" style="margin-top:10px;width:100%;">${currencyIcon} Открыть за ${pack.price}</button>`;
  } else if (shopState.screen === 'promo') {
    html = backBtn + '<h3 style="margin:0 0 12px;">🔑 Промокод</h3>';
    html += '<div style="display:flex;gap:6px;"><input id="promo-input" type="text" placeholder="Введите код..." style="flex:1;background:#0e1621;border:1px solid #1e2d3d;border-radius:6px;padding:6px 10px;color:#fff;font-size:13px;" /><button class="shop-nav-btn" onclick="closeShopModal();redeemPromoCode();" style="padding:6px 12px;">Активировать</button></div>';
  }

  box.innerHTML = html;
}

function formatResource(reward) {
  const parts = [];
  if (reward.rubins) parts.push(`💎 ${reward.rubins} сапфиров`);
  if (reward.trainingPoints) parts.push(`🎯 ${reward.trainingPoints} очк. тренировки`);
  if (reward.ovrUpgradePoints) parts.push(`⚡ ${reward.ovrUpgradePoints} очк. OVR`);
  if (reward.fragments) parts.push(`🧩 ${reward.fragments} фрагментов`);
  if (reward.draftTokens) parts.push(`🎟️ ${reward.draftTokens} купонов`);
  if (reward.offsideTokens) parts.push(`🔮 ${reward.offsideTokens} Offside-токенов`);
  if (reward.passCredits) parts.push(`🪙 ${reward.passCredits} очк. прогресса`);
  return parts.join(', ') || 'пусто';
}

// ── Покупка пака ─────────────────────────────────────────────────────────
async function purchasePack(packId) {
  const pack = SHOP_PACKS.find(p => p.id === packId);
  if (!pack) { await botReply('❌ Пак не найден.', 300); openShopModal(); return; }
  const currencyKey = pack.currency === 'rubins' ? 'rubins' : 'offsideTokens';
  if ((gameState[currencyKey] || 0) < pack.price) {
    await botReply(`❌ Недостаточно средств.`, 400);
    openShopModal();
    return;
  }
  gameState[currencyKey] -= pack.price;

  if (pack.type === 'resources') {
    // Выдача ресурсов
    if (pack.resourceReward) {
      applyResourceReward(pack.resourceReward);
      saveState(); updateHeaderResources();
      await botReply(`🎁 Вы получили: ${formatResource(pack.resourceReward)}`, 500, { html: true });
    } else if (pack.resourcePool) {
      const totalChance = pack.resourcePool.reduce((s, r) => s + r.chance, 0);
      let rand = Math.random() * totalChance;
      let selected = null;
      for (const r of pack.resourcePool) {
        rand -= r.chance;
        if (rand <= 0) { selected = r.reward; break; }
      }
      if (!selected) selected = pack.resourcePool[0].reward;
      applyResourceReward(selected);
      saveState(); updateHeaderResources();
      await botReply(`🎁 Вы получили: ${formatResource(selected)}`, 500, { html: true });
    }
    openShopModal();
    return;
  }

  // Выдача игроков
  const drawn = drawPackCards(pack);
  if (!drawn.length) {
    gameState[currencyKey] += pack.price;
    await botReply('⚠️ Нет доступных игроков.', 400);
    openShopModal();
    return;
  }
  for (const p of drawn) gameState.myPlayers.push(p);
  gameState.packsOpened = (gameState.packsOpened || 0) + 1;
  saveState(); updateHeaderResources();

  // Сортируем по убыванию OVR
  drawn.sort((a, b) => b.ovr - a.ovr);

  const hasWalkout = drawn.some(p => p.ovr >= WALKOUT_THRESHOLD);

  if (drawn.length === 1) {
    const player = drawn[0];
    if (player.ovr >= WALKOUT_THRESHOLD) {
      await playWalkoutAnimation(player);
    } else {
      await botReply(null, 800, { card: buildPlayerCardHTML(player) });
    }
  } else {
    if (hasWalkout) {
      // Одна карта с волкаутом, остальные отдельно
      const walkoutPlayer = drawn.find(p => p.ovr >= WALKOUT_THRESHOLD);
      const others = drawn.filter(p => p !== walkoutPlayer);
      await playWalkoutAnimation(walkoutPlayer);
      if (others.length > 0) {
        await showRemainingCards(others);
      }
    } else {
      // Все карты в одном сообщении
      await showRemainingCards(drawn);
    }
  }

  await botReply(`${pack.currency === 'rubins'
    ? '<img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:14px;height:14px;vertical-align:middle;" />'
    : '<img src="https://i.ibb.co/Cpq33M9q/Offside.png" style="width:14px;height:14px;vertical-align:middle;" />'} Остаток: <b>${gameState[currencyKey] || 0}</b>`, 400, { html: true });
  openShopModal();
}

function applyResourceReward(reward) {
  if (reward.rubins) gameState.rubins = (gameState.rubins || 0) + reward.rubins;
  if (reward.trainingPoints) gameState.trainingPoints = (gameState.trainingPoints || 0) + reward.trainingPoints;
  if (reward.ovrUpgradePoints) gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) + reward.ovrUpgradePoints;
  if (reward.fragments) gameState.fragments = (gameState.fragments || 0) + reward.fragments;
  if (reward.draftTokens) gameState.draftTokens = (gameState.draftTokens || 0) + reward.draftTokens;
  if (reward.offsideTokens) gameState.offsideTokens = (gameState.offsideTokens || 0) + reward.offsideTokens;
  if (reward.passCredits) gameState.passCredits = (gameState.passCredits || 0) + reward.passCredits;
}

// ── Волкаут-анимация ────────────────────────────────────────────────────
async function playWalkoutAnimation(player) {
  // 1) Только изображение карточки
  if (player.image) {
    await botReply(`<img src="${player.image}" style="width:100%;border-radius:8px;" />`, 500, { html: true });
  } else {
    await botReply('🔥 Волкаут...', 500);
  }
  // 2) Флаг (нация)
  await botReply(`🏳️ ${player.nation}`, 500);
  // 3) Позиция
  await botReply(`📍 ${player.position}`, 500);
  // 4) Клуб
  await botReply(`🏟️ ${player.club}`, 1000);
  // 5) Карточка игрока
  await botReply(null, 500, { card: buildPlayerCardHTML(player) });
}

// ── Остальные карты ─────────────────────────────────────────────────────
async function showRemainingCards(cards) {
  let html = '';
  for (const p of cards) {
    html += buildPlayerCardHTML(p);
  }
  await botReply(html, 800, { html: true });
}

function pickWeightedRange(ranges) {
  if (!ranges?.length) return null;
  const tw = ranges.reduce((s,r)=>s+(r.chance||0),0);
  if (tw<=0) return ranges[0];
  let rand = Math.random()*tw;
  for (const r of ranges) if ((rand-=r.chance||0)<=0) return r;
  return ranges[ranges.length-1];
}
function getPlayersInOvrRange(min,max) { return allPlayers.filter(p=>p.ovr>=min&&p.ovr<=max); }
function drawPackCards(pack) {
  const drawn = [];

  // ── Новый режим: пулы конкретных ID ──────────────────────────────────
  if (pack.idPools && pack.idPools.length > 0) {
    // Собираем только те пулы, в которых есть реальные игроки в allPlayers
    const availablePools = [];
    for (const pool of pack.idPools) {
      const existing = pool.ids
        .map(id => allPlayers.find(p => p.id === id))
        .filter(p => p !== undefined);
      if (existing.length > 0) {
        availablePools.push({
          chance: pool.chance,
          candidates: existing
        });
      }
    }
    if (availablePools.length === 0) return drawn;

    const totalWeight = availablePools.reduce((sum, p) => sum + p.chance, 0);

    for (let i = 0; i < (pack.count || 1); i++) {
      let rand = Math.random() * totalWeight;
      let selectedPool = null;
      for (const p of availablePools) {
        rand -= p.chance;
        if (rand <= 0) {
          selectedPool = p;
          break;
        }
      }
      if (!selectedPool) selectedPool = availablePools[availablePools.length - 1];

      const player = JSON.parse(JSON.stringify(
        selectedPool.candidates[Math.floor(Math.random() * selectedPool.candidates.length)]
      ));
      player.trainingLevel = 0;
      player.ovrUpgrade    = 0;
      player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      drawn.push(player);
    }
    return drawn;
  }

  // ── Старый режим: OVR‑диапазоны ──────────────────────────────────────
  const availableRanges = [];
  for (const range of pack.ovrRanges) {
    const candidates = getPlayersInOvrRange(range.minOvr, range.maxOvr);
    if (candidates.length > 0) {
      availableRanges.push({
        minOvr: range.minOvr,
        maxOvr: range.maxOvr,
        chance: range.chance,
        candidates: candidates
      });
    }
  }

  if (availableRanges.length === 0) return drawn;

  const totalWeight = availableRanges.reduce((sum, r) => sum + r.chance, 0);

  for (let i = 0; i < (pack.count || 1); i++) {
    let rand = Math.random() * totalWeight;
    let selectedRange = null;
    for (const r of availableRanges) {
      rand -= r.chance;
      if (rand <= 0) {
        selectedRange = r;
        break;
      }
    }
    if (!selectedRange) selectedRange = availableRanges[availableRanges.length - 1];

    const player = JSON.parse(JSON.stringify(
      selectedRange.candidates[Math.floor(Math.random() * selectedRange.candidates.length)]
    ));
    player.trainingLevel = 0;
    player.ovrUpgrade    = 0;
    player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    drawn.push(player);
  }

  return drawn;
}
function getPackById(id) { return SHOP_PACKS.find(p=>p.id===id)||null; }
function resolveDraftPull(cfg) {
  const roll = Math.random(); let tier;
  if (roll<DRAFT_PROB_A && cfg.poolA?.length) tier='A';
  else if (roll<DRAFT_PROB_A+DRAFT_PROB_B && cfg.poolB?.length) tier='B';
  else tier='C';
  if (tier==='A'&&!cfg.poolA?.length) tier='B';

  const pickedId = pool[Math.floor(Math.random()*pool.length)];
  const tpl = allPlayers.find(p=>p.id===pickedId)||null;
  const player = tpl ? JSON.parse(JSON.stringify(tpl)) : null;
  if (player) player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  if (player) { player.trainingLevel=0; player.ovrUpgrade=0; }

    // === OPEN DRAFT (single pull) ===
    async function openDraft(draftId) {
      const config = getDraftConfig(draftId);
      if (!config) {
        await botReply('❌ Драфт не найден.', 300);
        return;
      }

      if ((gameState.draftTokens || 0) < config.cost) {
        await botReply('❌ Недостаточно купонов открытия.', 400);
        return;
      }

      gameState.draftTokens -= config.cost;

      // Initialise counters if missing
      if (!gameState.draftCounterB) gameState.draftCounterB = 0;
      if (!gameState.draftCounterA) gameState.draftCounterA = 0;

      gameState.draftCounterB++;
      gameState.draftCounterA++;

      let { tier, player } = resolveDraftPull(config);

      // ── Pity B: every 10 pulls guaranteed pool B+ ─────────────────────────
      if (gameState.draftCounterB >= 10 && tier === 'C') {
        const result = forcePoolB(config);
        if (result) { tier = result.tier; player = result.player; }
      }

      // ── Pity A: every 100 pulls guaranteed pool A ─────────────────────────
      if (gameState.draftCounterA >= 100) {
        const result = forcePoolA(config);
        if (result) { tier = result.tier; player = result.player; }
      }

      // ── Reset counters on natural high-tier drops ─────────────────────────
      if (tier === 'A') {
        gameState.draftCounterA = 0;
        gameState.draftCounterB = 0;
      } else if (tier === 'B') {
        gameState.draftCounterB = 0;
      }

      if (player) {
        gameState.myPlayers.push(player);
      }

      saveState();
      updateHeaderResources();

      if (player) {
        const card      = buildPlayerCardHTML(player);
        const tierEmoji = tier === 'A' ? '👑' : tier === 'B' ? '⭐' : '';
        await botReply(
          `${tierEmoji} Драфт: <b>${config.name}</b>`,
          400,
          { html: true }
        );
        await botReply(null, 800, { card: card });
      } else {
        await botReply('⚠️ В этом драфте пока нет игроков.', 400);
      }
    }

    // === OPEN DRAFT (bulk 10x) ===
    async function openDraftBulk(draftId) {
      const config = getDraftConfig(draftId);
      if (!config) {
        await botReply('❌ Драфт не найден.', 300);
        return;
      }

      const bulkCost = config.costBulk || 10;
      if ((gameState.draftTokens || 0) < bulkCost) {
        await botReply('❌ Недостаточно купонов открытия.', 400);
        return;
      }

      gameState.draftTokens -= bulkCost;

      const results      = [];
      let hasBOrBetter   = false;
      let bestPlayer     = null;
      let bestTier       = 'C';

      for (let i = 0; i < 10; i++) {
        let { tier, player } = resolveDraftPull(config);

        gameState.draftCounterB = (gameState.draftCounterB || 0) + 1;
        gameState.draftCounterA = (gameState.draftCounterA || 0) + 1;

        // Per-pull pity checks
        if (gameState.draftCounterB >= 10 && tier === 'C') {
          const forced = forcePoolB(config);
          if (forced) { tier = forced.tier; player = forced.player; }
        }
        if (gameState.draftCounterA >= 100) {
          const forced = forcePoolA(config);
          if (forced) { tier = forced.tier; player = forced.player; }
        }

        if (tier === 'A') {
          gameState.draftCounterA = 0;
          gameState.draftCounterB = 0;
        } else if (tier === 'B') {
          gameState.draftCounterB = 0;
        }

        if (tier === 'A' || tier === 'B') hasBOrBetter = true;

        if (player) {
          gameState.myPlayers.push(player);

          // Track the best result for the walkout reveal
          const isBetter =
            tier === 'A' ||
            (tier === 'B' && bestTier !== 'A') ||
            (tier === 'C' && bestTier === 'C' && (!bestPlayer || player.ovr > bestPlayer.ovr));

          if (isBetter) {
            bestPlayer = player;
            bestTier   = tier;
          }
        }

        results.push({ tier, player });
      }

      // ── Bulk guarantee: at least one B+ in the whole batch ────────────────
      if (!hasBOrBetter) {
        const forced = forcePoolB(config);
        if (forced && forced.player) {
          gameState.myPlayers.push(forced.player);
          results.push({ tier: forced.tier, player: forced.player });
          bestPlayer = forced.player;
          bestTier   = forced.tier;
          gameState.draftCounterB = 0;
        }
      }

      saveState();
      updateHeaderResources();

      // ── Walkout reveal for the best card ──────────────────────────────────
      if (bestPlayer) {
        await botReply(
          `🌟 Волкаут! <b>${config.name}</b>`,
          400,
          { html: true }
        );
        await botReply(null, 1000, { card: buildPlayerCardHTML(bestPlayer) });
      }

      // ── List remaining cards (sorted best → worst by OVR) ─────────────────
      const others = results.filter(
        r => r.player && r.player !== bestPlayer
      );
      others.sort(
        (a, b) => (b.player ? b.player.ovr : 0) - (a.player ? a.player.ovr : 0)
      );

      if (others.length > 0) {
        let listHtml = '<div class="msg-text"><b>Остальные игроки:</b></div>';
        for (const r of others) {
          if (r.player) {
            listHtml += buildPlayerCardHTML(r.player);

      await botReply(
        `<img src="https://i.ibb.co/6RTT8K1z/image.png" style="width:16px;height:16px;vertical-align:middle;" /> Осталось купонов: <b>${gameState.draftTokens || 0}</b>`,
        400,
        { html: true }
      );
    }

          } else if (r.type === 'player_program') {
            const count = (gameState.myPlayers || [])
              .filter(p => p.program === r.program && getEffectiveOvr(p) >= (r.minOvr || 0)).length;
            if (count < r.count) { canDo = false; break; }
          } else if (r.type === 'rubins'           && (gameState.rubins           || 0) < r.amount) { canDo = false; break; }
          else if (r.type === 'fragments'           && (gameState.fragments        || 0) < r.amount) { canDo = false; break; }

          + `" style="margin-top:4px;"${btnDisabled}>Обменять</button>`
          + `</div>`;
      }

      await botReply(html, 500, { html: true });
    }

    // === EXECUTE SBC ===
    async function executeSbc(sbcId) {
      const sbc = SBC_LIST.find(s => s.id === sbcId);
      if (!sbc) {
        await botReply('❌ Обмен не найден.', 300);
        return;
      }

      // ── Validate all requirements (read-only pass, no mutations yet) ────────
      const playersToRemove = [];

      for (const req of sbc.requirements) {

        if (req.type === 'player_any') {
          const eligible = (gameState.myPlayers || [])
            .filter(p => getEffectiveOvr(p) >= (req.minOvr || 0));
          if (eligible.length < req.count) {
            await botReply(
              `❌ Недостаточно игроков с OVR ${req.minOvr}+. `
              + `Нужно: ${req.count}, доступно: ${eligible.length}`,
              400
            );
            return;
          }
          eligible.sort((a, b) => getEffectiveOvr(a) - getEffectiveOvr(b));
          for (let i = 0; i < req.count; i++) {
            playersToRemove.push(eligible[i].id);
          }

        } else if (req.type === 'player_program') {
          const eligible = (gameState.myPlayers || [])
            .filter(p => p.program === req.program && getEffectiveOvr(p) >= (req.minOvr || 0));
          if (eligible.length < req.count) {
            await botReply(
              `❌ Недостаточно игроков программы «${req.program}» с OVR ${req.minOvr}+. `
              + `Нужно: ${req.count}, доступно: ${eligible.length}`,
              400
            );
            return;
          }
          eligible.sort((a, b) => getEffectiveOvr(a) - getEffectiveOvr(b));
          for (let i = 0; i < req.count; i++) {
            playersToRemove.push(eligible[i].id);
          }

        } else if (req.type === 'rubins') {
          if ((gameState.rubins || 0) < req.amount) {
            await botReply(`❌ Недостаточно сапфиров. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'fragments') {
          if ((gameState.fragments || 0) < req.amount) {
            await botReply(`❌ Недостаточно фрагментов. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'draftTokens') {
          if ((gameState.draftTokens || 0) < req.amount) {
            await botReply(`❌ Недостаточно купонов открытия. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'offsideTokens') {
          if ((gameState.offsideTokens || 0) < req.amount) {
            await botReply(`❌ Недостаточно Offside-токенов. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'trainingPoints') {
          if ((gameState.trainingPoints || 0) < req.amount) {
            await botReply(`❌ Недостаточно очков тренировки. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'ovrUpgradePoints') {
          if ((gameState.ovrUpgradePoints || 0) < req.amount) {
            await botReply(`❌ Недостаточно очков повышения OVR. Нужно: ${req.amount}`, 400);
            return;
          }
        }
      }

      // ── Deduct currency requirements ────────────────────────────────────────
      for (const req of sbc.requirements) {
        if (req.type === 'rubins')           gameState.rubins           = (gameState.rubins           || 0) - req.amount;
        if (req.type === 'fragments')        gameState.fragments        = (gameState.fragments        || 0) - req.amount;
        if (req.type === 'draftTokens')      gameState.draftTokens      = (gameState.draftTokens      || 0) - req.amount;
        if (req.type === 'offsideTokens')    gameState.offsideTokens    = (gameState.offsideTokens    || 0) - req.amount;
        if (req.type === 'trainingPoints')   gameState.trainingPoints   = (gameState.trainingPoints   || 0) - req.amount;
        if (req.type === 'ovrUpgradePoints') gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) - req.amount;
      }

      // ── Remove consumed players ─────────────────────────────────────────────
      for (const pid of playersToRemove) {
        const idx = gameState.myPlayers.findIndex(p => p.id === pid);
        if (idx !== -1) gameState.myPlayers.splice(idx, 1);
      }

      // ── Apply reward ────────────────────────────────────────────────────────
      const reward = sbc.reward;
      let rewardMsg = '';

      const rubyIcon = '<img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const fragmentIcon = '<img src="https://i.ibb.co/xtBftkpX/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const cuponIcon = '<img src="https://i.ibb.co/6RTT8K1z/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const trainingIcon = '<img src="https://i.ibb.co/gb178dPT/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const ovrIcon = '<img src="https://i.ibb.co/jv3KsbMx/OVR.png" style="width:16px;height:16px;vertical-align:middle;" />';

      if (reward.type === 'player') {
        const template = allPlayers.find(p => p.id === reward.playerId);
        if (template) {
          const newPlayer = JSON.parse(JSON.stringify(template));
          newPlayer.trainingLevel = 0;
          newPlayer.ovrUpgrade    = 0;
          newPlayer.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          gameState.myPlayers.push(newPlayer);
          rewardMsg = `👤 ${newPlayer.name} (OVR ${newPlayer.ovr})`;
        }
      } else if (reward.type === 'rubins') {
        gameState.rubins = (gameState.rubins || 0) + (reward.amount || 0);
        rewardMsg = `${rubyIcon} ${reward.amount} сапфиров`;
      } else if (reward.type === 'fragments') {
        gameState.fragments = (gameState.fragments || 0) + (reward.amount || 0);
        rewardMsg = `${fragmentIcon} ${reward.amount} фрагментов`;
      } else if (reward.type === 'draftTokens') {
        gameState.draftTokens = (gameState.draftTokens || 0) + (reward.amount || 0);
        rewardMsg = `${cuponIcon} ${reward.amount} купонов`;
      } else if (reward.type === 'trainingPoints') {
        gameState.trainingPoints = (gameState.trainingPoints || 0) + (reward.amount || 0);
        rewardMsg = `${trainingIcon} ${reward.amount} очк. тренировки`;
      } else if (reward.type === 'ovrUpgradePoints') {
        gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) + (reward.amount || 0);
        rewardMsg = `${ovrIcon} ${reward.amount} очк. OVR`;

      // If the exchange is one-time, show a player card for the new player

        if (acquired) {
          await botReply(null, 600, { card: buildPlayerCardHTML(acquired) });
        }

      const now  = new Date();
      return Math.ceil((end - now) / (1000 * 60 * 60 * 24));

        : `<span style="color:#4dc05a;">Ещё ${days} дн.</span>`;

    function updateClubFilter() {
      const leagueSelect = document.getElementById('filter-league');
      const clubSelect = document.getElementById('filter-club');
      if (!leagueSelect || !clubSelect) return;

      const selectedLeague = leagueSelect.value;
      const allPlayers = gameState.myPlayers || [];
      const currentClub = clubSelect.value;

      let filteredClubs;
      if (selectedLeague === '') {
        filteredClubs = [...new Set(allPlayers.map(p => p.club))].sort();
      } else {
        filteredClubs = [...new Set(allPlayers.filter(p => (p.league || 'Без лиги') === selectedLeague).map(p => p.club))].sort();
      }

      let optionsHtml = '<option value="">Все клубы</option>';
      for (const c of filteredClubs) {
        const sel = (c === currentClub) ? ' selected' : '';
        optionsHtml += `<option value="${c}"${sel}>${c}</option>`;
      }
      clubSelect.innerHTML = optionsHtml;
    }

    function renderInventoryList() {
      const container = document.getElementById('inv-list');
      if (!container) return;

      const nameFilter = document.getElementById('filter-name')?.value?.trim().toLowerCase() || '';
      const leagueFilter = document.getElementById('filter-league')?.value || '';
      const clubFilter = document.getElementById('filter-club')?.value || '';
      const nationFilter = document.getElementById('filter-nation')?.value || '';
      const posFilter = document.getElementById('filter-position')?.value || '';
      const progFilter = document.getElementById('filter-program')?.value || '';
      const ovrFilter = document.getElementById('filter-ovr')?.value || '';

      let filtered = [...(gameState.myPlayers || [])];

      if (nameFilter) filtered = filtered.filter(p => p.name.toLowerCase().includes(nameFilter));
      if (leagueFilter) filtered = filtered.filter(p => (p.league || 'Без лиги') === leagueFilter);
      if (clubFilter) filtered = filtered.filter(p => p.club === clubFilter);
      if (nationFilter) filtered = filtered.filter(p => p.nation === nationFilter);
      if (posFilter) filtered = filtered.filter(p => p.position === posFilter);
      if (progFilter) filtered = filtered.filter(p => p.program === progFilter);
      if (ovrFilter) {
        const [min, max] = ovrFilter.split('-').map(Number);
        filtered = filtered.filter(p => getEffectiveOvr(p) >= min && getEffectiveOvr(p) <= (max || 999));
      }

      filtered.sort((a, b) => getEffectiveOvr(b) - getEffectiveOvr(a));

      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#7d8e9e;padding:20px;">Нет игроков по выбранным фильтрам.</div>';
        return;
      }

      let html = '';
      for (const player of filtered) {
        html += buildPlayerCardHTML(player);
        html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">';

        // Кнопка тренировки
        if (player.trainingLevel < MAX_TRAINING_LEVEL) {
          html += `<button class="inline-btn" onclick="trainPlayer('${player.cardId}')" style="font-size:10px;padding:3px 8px;">
            <img src="https://i.ibb.co/gb178dPT/image.png" style="width:14px;height:14px;vertical-align:middle;" /> Тренировать (${TRAINING_COST_PER_LEVEL} очк)</button>`;
        }

        // Кнопка повышения OVR
        if (player.ovrUpgrade < 5) {
          const cost = OVR_UPGRADE_COSTS[player.ovrUpgrade];
          html += `<button class="inline-btn" onclick="upgradePlayerOvr('${player.cardId}')" style="font-size:10px;padding:3px 8px;">
            <img src="https://i.ibb.co/jv3KsbMx/OVR.png" style="width:14px;height:14px;vertical-align:middle;" /> Повысить OVR (${cost} очк)</button>`;
        }

        // Кнопка обмена на фрагменты
        html += `<button class="inline-btn" onclick="confirmExchangePlayer('${player.cardId}')" style="font-size:10px;padding:3px 8px;"><img src="https://i.ibb.co/xtBftkpX/image.png" style="width:14px;height:14px;vertical-align:middle;" /> Обменять на фрагменты</button>`;
        html += '</div>';
      }
      container.innerHTML = html;
    }

    // ── Функции тренировки и повышения OVR ─────────────────
    function trainPlayer(cardId) {
      const player = findPlayerByCardId(cardId);
      if (!player) { botReply('❌ Игрок не найден.', 300); return; }
      if (player.trainingLevel >= MAX_TRAINING_LEVEL) {
        botReply(`❌ Достигнут максимальный уровень тренировки (${MAX_TRAINING_LEVEL}).`, 300);
        return;
      }
      if ((gameState.trainingPoints || 0) < TRAINING_COST_PER_LEVEL) {
        botReply(`❌ Недостаточно очков тренировки (нужно ${TRAINING_COST_PER_LEVEL}).`, 300);
        return;
      }
      gameState.trainingPoints -= TRAINING_COST_PER_LEVEL;
      player.trainingLevel = (player.trainingLevel || 0) + 1;
      saveState();
      updateHeaderResources();
      renderInventoryList();
      botReply(`✅ Тренировка <b>${player.name}</b> завершена! Уровень теперь ${player.trainingLevel}.`, 300, { html: true });
    }

    function upgradePlayerOvr(cardId) {
      const player = findPlayerByCardId(cardId);
      if (!player) { botReply('❌ Игрок не найден.', 300); return; }
      if (player.ovrUpgrade >= 5) {
        botReply('❌ Достигнут максимальный ранг OVR (5).', 300);
        return;
      }
      const cost = OVR_UPGRADE_COSTS[player.ovrUpgrade];
      if ((gameState.ovrUpgradePoints || 0) < cost) {
        botReply(`❌ Недостаточно очков повышения OVR (нужно ${cost}).`, 300);
        return;
      }
      gameState.ovrUpgradePoints -= cost;
      player.ovrUpgrade = (player.ovrUpgrade || 0) + 1;
      saveState();
      updateHeaderResources();
      renderInventoryList();
      botReply(`✅ Ранг OVR <b>${player.name}</b> повышен! Теперь OVR +${player.ovrUpgrade}.`, 300, { html: true });
    }

    // ── НОВАЯ ЛОГИКА ОБМЕНА НА ФРАГМЕНТЫ (с подтверждением) ─────────────
    async function confirmExchangePlayer(cardId) {
      const player = findPlayerByCardId(cardId);
      if (!player) {
        await botReply('❌ Игрок не найден.', 300);
        return;
      }

      const ovr = getEffectiveOvr(player);
      const frags = getFragmentReward(ovr);
      const fragmentIcon = '<img src="https://i.ibb.co/xtBftkpX/image.png" style="width:14px;height:14px;vertical-align:middle;" />';

      const msg = `Вы уверены, что хотите обменять игрока <b>${player.name}</b> (OVR ${ovr}) на ${fragmentIcon} <b>${frags}</b> фрагментов?`;
      const btns = `
        <div class="inline-btn-row">
          <button class="inline-btn success" onclick="doExchangePlayerForFragments('${cardId}')">Да</button>
          <button class="inline-btn danger" onclick="botReply('❌ Обмен отменён.', 200); openInventoryModal();">Нет</button>
        </div>`;
      closeInventoryModal();
      await botReply(msg + btns, 400, { html: true });
    }

    async function doExchangePlayerForFragments(cardId) {
      const idx = (gameState.myPlayers || []).findIndex(p => p.cardId === cardId);
      if (idx === -1) {
        await botReply('❌ Игрок не найден.', 300);
        return;
      }
      const player = gameState.myPlayers[idx];
      const ovr = getEffectiveOvr(player);
      const frags = getFragmentReward(ovr);

      gameState.myPlayers.splice(idx, 1);
      gameState.fragments = (gameState.fragments || 0) + frags;
      saveState();
      updateHeaderResources();

      const fragmentIcon = '<img src="https://i.ibb.co/xtBftkpX/image.png" style="width:14px;height:14px;vertical-align:middle;" />';
      await botReply(`${fragmentIcon} Игрок <b>${player.name}</b> обменян на <b>${frags}</b> фрагментов.`, 500, { html: true });
      openInventoryModal();
    }

    function findPlayerByCardId(cardId) {
      return (gameState.myPlayers || []).find(p => p.cardId === cardId) || null;
    }

    function getPositionPenalty(player, slotPos) {
      if (!player || !slotPos) return 0;
      if (player.position === slotPos ||
          (Array.isArray(player.altPositions) && player.altPositions.includes(slotPos))) {
        return 0;
      }
      if ((player.position === 'GK') !== (slotPos === 'GK')) return 999;
      const LINE_GROUPS = {
        GK: [], LB: ['LB','CB','RB'], CB: ['LB','CB','RB','CDM'], RB: ['LB','CB','RB'],
        CDM: ['LM','CM','CAM','RM','CDM','CB'], CM: ['LM','CM','CAM','RM','CDM'],
        CAM: ['LM','CM','CAM','RM','CDM'], LM: ['LM','CM','CAM','RM','CDM'],
        RM: ['LM','CM','CAM','RM','CDM'], LW: ['LW','RW','ST','CF'],
        RW: ['LW','RW','ST','CF'], ST: ['LW','RW','ST','CF'], CF: ['LW','RW','ST','CF']
      };
      const sameLine = LINE_GROUPS[player.position] || [];
      return sameLine.includes(slotPos) ? 4 : 15;
    }

      const img = player ? (player.squadImage || player.image || '') : '';

      }
      return `background: rgba(0,0,0,0.3); border: 2px dashed rgba(255,255,255,0.2);`;
    }

        const posText = player ? `<span style="font-size:8px;color:rgba(255,255,255,0.7);">${player.position}</span>` : `<span style="font-size:9px;color:rgba(255,255,255,0.3);">пусто</span>`;

    function getHeightModifier(player, action) {
      if (!player || !player.height) return 1.0;
      const h = player.height;
      if (action === 'dribble') {
        if (h > 185) return 0.9;
        if (h < 170) return 1.1;
        return 1.0;
      } else if (action === 'header') {
        if (h > 185) return 1.15;
        if (h < 170) return 0.85;
        return 1.0;
      } else if (action === 'tackle') {
        if (h > 185) return 1.05;
        if (h < 170) return 0.95;
        return 1.0;
      } else if (action === 'gk_save') {
        if (h > 190) return 1.1;
        if (h < 180) return 0.9;
        return 1.0;
      }
      return 1.0;
    }

    function getWeightModifier(player, action) {
      if (!player || !player.weight) return 1.0;
      const w = player.weight;
      if (action === 'dribble') {
        if (w > 85) return 0.9;
        if (w < 70) return 1.1;
        return 1.0;
      } else if (action === 'tackle') {
        if (w > 85) return 1.1;
        if (w < 70) return 0.9;
        return 1.0;
      } else if (action === 'header') {
        return 1.0; // вес не влияет на верховую борьбу
      } else if (action === 'gk_save') {
        if (w > 85) return 0.95; // тяжёлые вратари хуже прыгают
        if (w < 70) return 1.05;
        return 1.0;
      }
      return 1.0;
    }
