<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Тренер — Футбольный Менеджер</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #0e1621;
      --bg-header: #17212b;
      --bg-input: #17212b;
      --bg-bot-bubble: #182533;
      --bg-user-bubble: #2b5278;
      --bg-nav: #17212b;
      --text-primary: #e8e8e8;
      --text-secondary: #7d8e9e;
      --text-time: #6b7d8d;
      --accent: #5288c1;
      --border: #1e2d3d;
      --avatar-bg: #2b5278;
      --start-overlay-bg: #0e1621;
      --btn-primary: #5288c1;
      --btn-primary-hover: #4a7ab0;
      --nav-active: #5288c1;
      --nav-inactive: #6b7d8d;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0f18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      overflow: hidden;
    }

    #app {
      max-width: 600px;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* ===== START OVERLAY ===== */
    #start-overlay {
      position: absolute;
      inset: 0;
      background: var(--start-overlay-bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }
    #start-overlay.hidden { display: none; }

    .start-logo {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--avatar-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin-bottom: 8px;
      box-shadow: 0 4px 24px rgba(82,136,193,0.4);
    }
    .start-title { font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .start-subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 320px; }

    #btn-start {
      margin-top: 12px; padding: 14px 48px;
      background: var(--btn-primary); color: #fff; border: none;
      border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s; letter-spacing: 0.3px;
    }
    #btn-start:hover { background: var(--btn-primary-hover); }
    #btn-start:active { transform: scale(0.97); }

    /* ===== HEADER ===== */
    #header {
      background: var(--bg-header); padding: 8px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      min-height: 56px; z-index: 10;
    }
    .header-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--avatar-bg); display: flex;
      align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-size: 15px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 12px; color: #4dcd6c; margin-top: 1px; }
    .header-resources { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .resources-row { display: flex; gap: 8px; align-items: center; }
    .resource-item { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .resource-item span.emoji { font-size: 13px; }
    .resource-item span.val { font-weight: 600; color: var(--text-primary); min-width: 20px; }

    /* ===== CHAT AREA ===== */
    #chat {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 12px 8px 8px; display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

    .date-divider { text-align: center; margin: 8px 0; font-size: 12px; color: var(--text-time); position: relative; }
    .date-divider span { background: var(--bg-main); padding: 0 10px; position: relative; z-index: 1; }
    .date-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }

    .msg-wrapper { display: flex; align-items: flex-end; gap: 6px; max-width: 100%; animation: fadeIn 0.25s ease forwards; }
    .msg-wrapper.bot { align-self: flex-start; flex-direction: row; max-width: 88%; }
    .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; align-self: flex-end; }
    .msg-avatar.hidden { visibility: hidden; }

    .msg-bubble { padding: 8px 10px 6px; border-radius: 12px; line-height: 1.5; word-break: break-word; position: relative; max-width: 100%; }
    .msg-wrapper.bot .msg-bubble { background: var(--bg-bot-bubble); border-bottom-left-radius: 4px; color: var(--text-primary); }
    .msg-wrapper.user .msg-bubble { background: var(--bg-user-bubble); border-bottom-right-radius: 4px; color: #fff; }
    .msg-text { font-size: 14px; line-height: 1.5; }
    .msg-time { font-size: 11px; color: var(--text-time); text-align: right; margin-top: 3px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
    .msg-wrapper.user .msg-time { color: rgba(255,255,255,0.55); }

    .profile-card { background: linear-gradient(135deg, #1a2f45 0%, #182533 100%); border: 1px solid #2a4060; border-radius: 10px; padding: 12px 14px; min-width: 220px; max-width: 280px; }
    .profile-card-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .profile-card-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .profile-card-row:last-child { border-bottom: none; }
    .profile-card-row .label { color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .profile-card-row .value { font-weight: 600; color: var(--text-primary); }
    .profile-card-id { margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: var(--text-time); word-break: break-all; }

    .typing-indicator { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: typingBounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-4px);opacity:1} }

    /* ===== INPUT AREA ===== */
    #input-area { background: var(--bg-input); border-top: 1px solid var(--border); padding: 8px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; z-index: 10; }
    #msg-input { flex: 1; background: #0e1621; border: 1px solid #1e2d3d; border-radius: 20px; padding: 9px 14px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; resize: none; line-height: 1.4; }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-secondary); }
    #btn-send { width: 40px; height: 40px; border-radius: 50%; background: var(--btn-primary); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; }
    #btn-send:hover { background: var(--btn-primary-hover); }
    #btn-send:active { transform: scale(0.92); }

    /* ===== BOTTOM NAV ===== */
    #bottom-nav { background: var(--bg-nav); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; z-index: 10; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 2px 8px; gap: 3px; background: none; border: none; cursor: pointer; color: var(--nav-inactive); font-size: 10px; transition: color 0.2s; min-width: 0; -webkit-tap-highlight-color: transparent; }
    .nav-btn .nav-emoji { font-size: 20px; line-height: 1; }
    .nav-btn .nav-label { font-size: 9.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; font-family: inherit; }
    .nav-btn:hover, .nav-btn.active { color: var(--nav-active); }
    .nav-btn.active .nav-emoji { filter: drop-shadow(0 0 4px rgba(82,136,193,0.6)); }

    .inline-btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .inline-btn { padding: 6px 12px; background: rgba(82,136,193,0.2); border: 1px solid rgba(82,136,193,0.4); border-radius: 16px; color: var(--accent); font-size: 13px; cursor: pointer; transition: background 0.2s; font-family: inherit; }
    .inline-btn:hover { background: rgba(82,136,193,0.35); }
    .inline-btn:active { background: rgba(82,136,193,0.5); }

    @media (max-width: 400px) {
      .nav-btn .nav-label { font-size: 8.5px; }
      .nav-btn .nav-emoji { font-size: 18px; }
      .header-resources { gap: 2px; }
      .resource-item { font-size: 11px; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <div id="start-overlay">
    <div class="start-logo">⚽</div>
    <div class="start-title">Тренер<br>Футбольный Менеджер</div>
    <div class="start-subtitle">Собери команду мечты, побеждай в дивизионах<br>и стань лучшим менеджером!</div>
    <button id="btn-start">▶ НАЧАТЬ ИГРУ</button>
  </div>

  <div id="header">
    <div class="header-avatar">⚽</div>
    <div class="header-info">
      <div class="header-name">Тренер</div>
      <div class="header-status">online</div>
    </div>
    <div class="header-resources">
      <div class="resources-row">
        <div class="resource-item"><span class="emoji">💎</span><span class="val" id="hdr-rubins">0</span></div>
        <div class="resource-item"><span class="emoji">🔮</span><span class="val" id="hdr-offside">0</span></div>
      </div>
      <div class="resources-row">
        <div class="resource-item"><span class="emoji">⭐</span><span class="val" id="hdr-xp">0</span></div>
        <div class="resource-item"><span class="emoji">🏆</span><span class="val" id="hdr-level">0</span></div>
      </div>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Написать сообщение..." autocomplete="off" autocorrect="off" spellcheck="false" maxlength="200" />
    <button id="btn-send" title="Отправить">➤</button>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-squad"><span class="nav-emoji">👥</span><span class="nav-label">Состав</span></button>
    <button class="nav-btn" id="nav-inventory"><span class="nav-emoji">🎒</span><span class="nav-label">Игроки</span></button>
    <button class="nav-btn" id="nav-shop"><span class="nav-emoji">🏪</span><span class="nav-label">Магазин</span></button>
    <button class="nav-btn" id="nav-events"><span class="nav-emoji">📋</span><span class="nav-label">События</span></button>
    <button class="nav-btn" id="nav-division"><span class="nav-emoji">⚽</span><span class="nav-label">Дивизион</span></button>
    <button class="nav-btn" id="nav-quests"><span class="nav-emoji">🏅</span><span class="nav-label">Квесты</span></button>
  </nav>
</div>

<script>
/* ======================================================
   CONSTANTS & CONFIG
====================================================== */
const STORAGE_KEY = 'footballManager_gameState';

/* ======================================================
   DEFAULT / INITIAL GAME STATE (расширен позже)
====================================================== */
const DEFAULT_STATE = {
  rubins: 1500,
  offsideTokens: 0,
  trainingPoints: 1000,
  ovrUpgradePoints: 500,
  passCredits: 0,
  fragments: 500,
  draftTokens: 10,
  xp: 0,
  level: 0,
  nickname: '',
  playerId: '',
  stars: 0,
  matchesPlayed: 0,
  goalsScored: 0,
  registered: false,
  awaitingNickname: false
};

/* ======================================================
   GAME STATE
====================================================== */
let gameState = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      gameState = Object.assign({}, DEFAULT_STATE, JSON.parse(raw));
    } else {
      gameState = Object.assign({}, DEFAULT_STATE);
    }
  } catch (e) {
    console.warn('loadState error:', e);
    gameState = Object.assign({}, DEFAULT_STATE);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
  } catch (e) {
    console.warn('saveState error:', e);
  }
}

/* ======================================================
   UTILITY HELPERS
====================================================== */
function getTimestamp() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  return `${h}:${m}`;
}

function generatePlayerId() {
  try {
    const arr = new Uint32Array(2);
    crypto.getRandomValues(arr);
    const part1 = String(arr[0]).padStart(10, '0');
    const part2 = String(arr[1]).padStart(10, '0');
    const combined = (part1 + part2).replace(/\D/g, '');
    return combined.slice(0, 15).padEnd(15, '0');
  } catch (e) {
    const ts = String(Date.now());
    const rnd = String(Math.floor(Math.random() * 1e9)).padStart(9, '0');
    return (ts + rnd).slice(0, 15);
  }
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return String(text).replace(/[&<>"']/g, m => map[m]);
}

/* ======================================================
   HEADER RESOURCES UPDATE
====================================================== */
function updateHeaderResources() {
  document.getElementById('hdr-rubins').textContent = gameState.rubins ?? 0;
  document.getElementById('hdr-offside').textContent = gameState.offsideTokens ?? 0;
  document.getElementById('hdr-xp').textContent = gameState.xp ?? 0;
  document.getElementById('hdr-level').textContent = gameState.level ?? 0;
}

/* ======================================================
   CHAT MESSAGE FUNCTIONS
====================================================== */
const chatEl = document.getElementById('chat');
let lastDateLabel = '';
let lastBotSequence = false;

function getTodayLabel() {
  const now = new Date();
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const d = now.getDate();
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${d} ${months[now.getMonth()]}`;
}

function ensureDateDivider() {
  const label = getTodayLabel();
  if (label !== lastDateLabel) {
    lastDateLabel = label;
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.innerHTML = `<span>${label}</span>`;
    chatEl.appendChild(div);
  }
}

function scrollChatToBottom() {
  setTimeout(() => { chatEl.scrollTop = chatEl.scrollHeight; }, 50);
}

function addMessage(content, type = 'bot', options = {}) {
  ensureDateDivider();
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${type}`;
  const time = getTimestamp();

  if (type === 'bot') {
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'msg-avatar' + (options.noAvatar ? ' hidden' : '');
    avatarDiv.textContent = '⚽';
    wrapper.appendChild(avatarDiv);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (options.card) {
      bubble.innerHTML = options.card;
    } else if (options.html) {
      const textDiv = document.createElement('div');
      textDiv.className = 'msg-text';
      textDiv.innerHTML = content;
      bubble.appendChild(textDiv);
    } else {
      const textDiv = document.createElement('div');
      textDiv.className = 'msg-text';
      textDiv.textContent = content;
      bubble.appendChild(textDiv);
    }

    const timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    timeDiv.textContent = time;
    bubble.appendChild(timeDiv);
    wrapper.appendChild(bubble);
    lastBotSequence = true;
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    const textDiv = document.createElement('div');
    textDiv.className = 'msg-text';
    if (options.html) {
      textDiv.innerHTML = content;
    } else {
      textDiv.textContent = content;
    }
    bubble.appendChild(textDiv);
    const timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    timeDiv.innerHTML = `${time} <span>✓✓</span>`;
    bubble.appendChild(timeDiv);
    wrapper.appendChild(bubble);
    lastBotSequence = false;
  }

  chatEl.appendChild(wrapper);
  scrollChatToBottom();
  return wrapper;
}

function addTypingIndicator() {
  ensureDateDivider();
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper bot';
  wrapper.id = 'typing-indicator';
  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = '⚽';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrapper.appendChild(avatarDiv);
  wrapper.appendChild(bubble);
  chatEl.appendChild(wrapper);
  scrollChatToBottom();
  return wrapper;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function botReply(content, delay = 600, options = {}) {
  return new Promise(resolve => {
    const typing = addTypingIndicator();
    setTimeout(() => {
      removeTypingIndicator();
      const msg = addMessage(content, 'bot', options);
      resolve(msg);
    }, delay);
  });
}

/* ======================================================
   PROFILE CARD HTML
====================================================== */
function buildProfileCardHTML(state) {
  return `
    <div class="profile-card">
      <div class="profile-card-title">📊 Профиль менеджера</div>
      <div class="profile-card-row"><span class="label">👤 Ник</span><span class="value">${escapeHtml(state.nickname)}</span></div>
      <div class="profile-card-row"><span class="label">🏆 Уровень</span><span class="value">${state.level}</span></div>
      <div class="profile-card-row"><span class="label">⭐ XP</span><span class="value">${state.xp}</span></div>
      <div class="profile-card-row"><span class="label">💎 Рубины</span><span class="value">${state.rubins}</span></div>
      <div class="profile-card-row"><span class="label">🔮 Оффсайд-токены</span><span class="value">${state.offsideTokens}</span></div>
      <div class="profile-card-row"><span class="label">🎯 Очки тренировок</span><span class="value">${state.trainingPoints}</span></div>
      <div class="profile-card-row"><span class="label">⚡ Очки OVR</span><span class="value">${state.ovrUpgradePoints}</span></div>
      <div class="profile-card-row"><span class="label">🧩 Фрагменты</span><span class="value">${state.fragments}</span></div>
      <div class="profile-card-row"><span class="label">🎟️ Драфт-токены</span><span class="value">${state.draftTokens}</span></div>
      <div class="profile-card-row"><span class="label">⚽ Матчей сыграно</span><span class="value">${state.matchesPlayed}</span></div>
      <div class="profile-card-row"><span class="label">🥅 Голов забито</span><span class="value">${state.goalsScored}</span></div>
      <div class="profile-card-id">🆔 ID: ${escapeHtml(state.playerId)}</div>
    </div>`;
}

/* ======================================================
   REGISTRATION FLOW
====================================================== */
async function startRegistrationFlow() {
  await botReply('Привет! Я — твой виртуальный тренер. 👋\n\nКак тебя зовут? Введи свой никнейм:', 800);
  gameState.awaitingNickname = true;
  saveState();
}

async function completeRegistration(nickname) {
  const trimmed = nickname.trim();
  if (!trimmed || trimmed.length < 2) {
    await botReply('Никнейм должен содержать минимум 2 символа. Попробуй ещё раз! 😊', 500);
    return;
  }
  if (trimmed.length > 20) {
    await botReply('Никнейм слишком длинный (максимум 20 символов). Попробуй ещё раз! 😊', 500);
    return;
  }

  const playerId = generatePlayerId();
  gameState.nickname = trimmed;
  gameState.playerId = playerId;
  gameState.awaitingNickname = false;
  gameState.registered = true;
  saveState();
  updateHeaderResources();

  await botReply(`Привет, <b>${escapeHtml(trimmed)}</b>! 🎉\n\nТвой ID: <code>${escapeHtml(playerId)}</code>\n\nТеперь ты — менеджер своей команды мечты. Собирай игроков, побеждай в дивизионах и веди свою команду к чемпионству! 🏆`, 700, { html: true });
  await botReply(null, 900, { card: buildProfileCardHTML(gameState) });
  await botReply('Используй кнопки внизу для навигации. Удачи на поле! ⚽', 600);
}

/* ======================================================
   START SCREEN LOGIC
====================================================== */
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');

function hideStartOverlay() {
  startOverlay.classList.add('hidden');
}

btnStart.addEventListener('click', () => {
  hideStartOverlay();
  startRegistrationFlow();
});

/* ======================================================
   SEND MESSAGE LOGIC
====================================================== */
const msgInput = document.getElementById('msg-input');

  processUserMessage(text);
}

/* ======================================================
   PROCESS USER MESSAGE
====================================================== */
function processUserMessage(text) {
  const lower = text.toLowerCase().trim();

  if (gameState.awaitingNickname) {
    completeRegistration(text);
    return;
  }
  if (!gameState.registered) {
    botReply('Нажми кнопку «НАЧАТЬ ИГРУ», чтобы начать! 😊', 500);
    return;
  }

  if (lower === 'профиль' || lower === '/profile' || lower === '/профиль') { showProfile(); return; }
  if (lower === 'помощь' || lower === '/help' || lower === '/помощь' || lower === 'помоги') { showHelp(); return; }
  if (lower === 'состав' || lower === '/состав' || lower === '/squad') { handleNavSquad(); return; }
  if (lower === 'магазин' || lower === '/магазин' || lower === '/shop') { handleNavShop(); return; }
  if (lower === 'игроки' || lower === '/игроки' || lower === '/inventory') { handleNavInventory(); return; }
  if (lower === 'события' || lower === '/события' || lower === '/events') { handleNavEvents(); return; }
  if (lower === 'дивизион' || lower === '/дивизион' || lower === '/division') { handleNavDivision(); return; }
  if (lower === 'квесты' || lower === '/квесты' || lower === '/quests') { handleNavQuests(); return; }

  botReply(`Я не понял команду «${escapeHtml(text)}». 🤔\n\nНапиши «помощь» или воспользуйся кнопками навигации внизу.`, 600, { html: true });
}

  if (!player || !player.stats) return {};

function getSquadAverageOvr() {

  const slots = gameState.squadSlots;

  for (let i = 0; i < 11; i++) {

    if (pid != null) {
      const player = findPlayerById(pid);
      if (player) { total += getEffectiveOvr(player); count++; }

  }

}

    id: q.id, title: q.title, type: q.type, target: q.target,
    rewards: {...q.rewards}, progress: 0, completed: false
  }));
}

function getMoscowDateString() {
  const now = new Date();
  const msk = new Date(now.getTime() + 3 * 3600 * 1000);
  return msk.toISOString().split('T')[0];
}

     * @param {Array<{minOvr:number, maxOvr:number, chance:number}>} ovrRanges
     * @returns {{minOvr:number, maxOvr:number, chance:number}|null}
     */
    function pickWeightedRange(ovrRanges) {
      if (!ovrRanges || ovrRanges.length === 0) return null;
      const totalWeight = ovrRanges.reduce((sum, r) => sum + (r.chance || 0), 0);
      if (totalWeight <= 0) return ovrRanges[0];
      let rand = Math.random() * totalWeight;
      for (const range of ovrRanges) {
        rand -= range.chance || 0;
        if (rand <= 0) return range;
      }
      return ovrRanges[ovrRanges.length - 1];
