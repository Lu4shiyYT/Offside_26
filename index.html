<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Offside 26 — Футбольный Симмулятор</title>
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #0e1621;
      --bg-header: #17212b;
      --bg-input: #17212b;
      --bg-bot-bubble: #182533;
      --bg-user-bubble: #2b5278;
      --bg-nav: #17212b;
      --text-primary: #e8e8e8;
      --text-secondary: #7d8e9e;
      --text-time: #6b7d8d;
      --accent: #5288c1;
      --border: #1e2d3d;
      --avatar-bg: #2b5278;
      --start-overlay-bg: #0e1621;
      --btn-primary: #5288c1;
      --btn-primary-hover: #4a7ab0;
      --nav-active: #5288c1;
      --nav-inactive: #6b7d8d;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0f18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      overflow: hidden;
    }

    #app {
      max-width: 600px;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* START OVERLAY */
    #start-overlay {
      position: absolute;
      inset: 0;
      background: var(--start-overlay-bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }
    #start-overlay.hidden { display: none; }

    .start-logo {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--avatar-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin-bottom: 8px;
      box-shadow: 0 4px 24px rgba(82,136,193,0.4);
    }
    .start-title { font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .start-subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 320px; }

    #btn-start {
      margin-top: 12px; padding: 14px 48px;
      background: var(--btn-primary); color: #fff; border: none;
      border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s; letter-spacing: 0.3px;
    }
    #btn-start:hover { background: var(--btn-primary-hover); }
    #btn-start:active { transform: scale(0.97); }

    /* HEADER */
    #header {
      background: var(--bg-header); padding: 8px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      min-height: 56px; z-index: 10;
    }
    .header-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--avatar-bg); display: flex;
      align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-size: 15px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 12px; color: #4dcd6c; margin-top: 1px; }
    .header-resources { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .resources-row { display: flex; gap: 8px; align-items: center; }
    .resource-item { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .resource-item span.emoji { font-size: 13px; }
    .resource-item span.val { font-weight: 600; color: var(--text-primary); min-width: 20px; }

    /* CHAT */
    #chat {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 12px 8px 8px; display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth; min-height: 0;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

    .date-divider { text-align: center; margin: 8px 0; font-size: 12px; color: var(--text-time); position: relative; }
    .date-divider span { background: var(--bg-main); padding: 0 10px; position: relative; z-index: 1; }
    .date-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }

    .msg-wrapper { display: flex; align-items: flex-end; gap: 6px; max-width: 100%; animation: fadeIn 0.25s ease forwards; }
    .msg-wrapper.bot { align-self: flex-start; flex-direction: row; max-width: 88%; }
    .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; align-self: flex-end; }
    .msg-avatar.hidden { visibility: hidden; }

    .msg-bubble { padding: 8px 10px 6px; border-radius: 12px; line-height: 1.5; word-break: break-word; position: relative; max-width: 100%; }
    .msg-wrapper.bot .msg-bubble { background: var(--bg-bot-bubble); border-bottom-left-radius: 4px; color: var(--text-primary); }
    .msg-wrapper.user .msg-bubble { background: var(--bg-user-bubble); border-bottom-right-radius: 4px; color: #fff; }
    .msg-text { font-size: 14px; line-height: 1.5; }
    .msg-time { font-size: 11px; color: var(--text-time); text-align: right; margin-top: 3px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
    .msg-wrapper.user .msg-time { color: rgba(255,255,255,0.55); }

    .profile-card { background: linear-gradient(135deg, #1a2f45 0%, #182533 100%); border: 1px solid #2a4060; border-radius: 10px; padding: 12px 14px; min-width: 220px; max-width: 280px; }
    .profile-card-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .profile-card-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .profile-card-row:last-child { border-bottom: none; }
    .profile-card-row .label { color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .profile-card-row .value { font-weight: 600; color: var(--text-primary); }
    .profile-card-id { margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: var(--text-time); word-break: break-all; }

    .typing-indicator { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: typingBounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-4px);opacity:1} }

    /* INPUT */
    #input-area { background: var(--bg-input); border-top: 1px solid var(--border); padding: 8px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; z-index: 10; }
    #msg-input { flex: 1; background: #0e1621; border: 1px solid #1e2d3d; border-radius: 20px; padding: 9px 14px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; resize: none; line-height: 1.4; }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-secondary); }
    #btn-send { width: 40px; height: 40px; border-radius: 50%; background: var(--btn-primary); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; }
    #btn-send:hover { background: var(--btn-primary-hover); }
    #btn-send:active { transform: scale(0.92); }

    /* BOTTOM NAV */
    #bottom-nav { background: var(--bg-nav); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; z-index: 10; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 2px 8px; gap: 3px; background: none; border: none; cursor: pointer; color: var(--nav-inactive); font-size: 10px; transition: color 0.2s; min-width: 0; -webkit-tap-highlight-color: transparent; }
    .nav-btn .nav-emoji { font-size: 20px; line-height: 1; }
    .nav-btn .nav-label { font-size: 9.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; font-family: inherit; }
    .nav-btn:hover, .nav-btn.active { color: var(--nav-active); }
    .nav-btn.active .nav-emoji { filter: drop-shadow(0 0 4px rgba(82,136,193,0.6)); }

    .inline-btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .inline-btn { padding: 6px 12px; background: rgba(82,136,193,0.2); border: 1px solid rgba(82,136,193,0.4); border-radius: 16px; color: var(--accent); font-size: 13px; cursor: pointer; transition: background 0.2s; font-family: inherit; }
    .inline-btn:hover { background: rgba(82,136,193,0.35); }
    .inline-btn:active { background: rgba(82,136,193,0.5); }

    @media (max-width: 400px) {
      .nav-btn .nav-label { font-size: 8.5px; }
      .nav-btn .nav-emoji { font-size: 18px; }
      .header-resources { gap: 2px; }
      .resource-item { font-size: 11px; }
    }

    .hidden { display: none !important; }
        /* Фиксированная панель управления матчем */
    #match-controls {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(23,33,43,0.95);
      border: 1px solid #2a4060;
      border-radius: 10px;
      padding: 6px 10px;
      display: none;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 600px;
      width: 90%;
    }
    #match-controls.visible { display: flex; }
    #match-controls .tactic-btn {
      padding: 5px 10px;
      background: rgba(82,136,193,0.2);
      border: 1px solid rgba(82,136,193,0.4);
      border-radius: 14px;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #match-controls .tactic-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    #match-controls .sub-btn {
      padding: 5px 12px;
      background: rgba(240,192,64,0.2);
      border: 1px solid rgba(240,192,64,0.4);
      border-radius: 14px;
      color: var(--gold);
      font-size: 12px;
      cursor: pointer;
    }
    .shop-nav-btn {
      background: rgba(82,136,193,0.2);
      border: 1px solid rgba(82,136,193,0.4);
      color: var(--accent);
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
    }
    .shop-nav-btn:hover {
      background: rgba(82,136,193,0.35);
    }

    /* Стили для фильтр-модала инвентаря */
    .filter-section { margin-bottom: 14px; }
    .filter-section-title { font-size: 12px; font-weight: 700; color: #7d8e9e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .filter-chip { padding: 4px 10px; background: rgba(255,255,255,0.07); border: 1px solid #1e2d3d; border-radius: 14px; color: #7d8e9e; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .filter-chip:hover { border-color: #5288c1; color: #5288c1; }
    .filter-chip.active { background: rgba(82,136,193,0.3); border-color: #5288c1; color: #5288c1; font-weight: 600; }
    .filter-input { background: #0e1621; border: 1px solid #1e2d3d; border-radius: 8px; padding: 7px 10px; color: #fff; font-size: 13px; width: 100%; font-family: inherit; outline: none; }
    .filter-input:focus { border-color: #5288c1; }
    .filter-range-row { display: flex; gap: 8px; align-items: center; }
    .filter-range-row .filter-input { flex: 1; }
    .filter-apply-btn { width: 100%; padding: 12px; background: #5288c1; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: inherit; }
    .filter-apply-btn:active { background: #4a7ab0; }
    .filter-reset-btn { width: 100%; padding: 9px; background: rgba(255,255,255,0.06); border: 1px solid #1e2d3d; border-radius: 10px; color: #7d8e9e; font-size: 13px; cursor: pointer; margin-top: 6px; font-family: inherit; }
    .filter-reset-btn:hover { background: rgba(255,255,255,0.1); }

    /* === MARKET === */
.market-tab { flex:1; padding:8px 4px; background:none; border:none; border-bottom:2px solid transparent; color:#7d8e9e; font-size:12px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.market-tab.active { color:#5288c1; border-bottom-color:#5288c1; font-weight:600; }
.market-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.market-card { background:rgba(255,255,255,0.04); border:1px solid #1e2d3d; border-radius:10px; overflow:hidden; cursor:pointer; position:relative; transition:border-color 0.2s; }
.market-card:hover { border-color:#5288c1; }
.market-card.selected { border-color:#f0c040; border-width:2px; }
.market-card-img { width:100%; aspect-ratio:1; background:linear-gradient(135deg,#1a2f45,#1e3550); background-size:cover; background-position:center; position:relative; }
.market-card-info { padding:6px 8px; }
.market-card-name { font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.market-card-pos { font-size:10px; color:#7d8e9e; }
.market-card-price { display:flex; align-items:center; gap:4px; font-size:11px; color:#f0c040; font-weight:700; margin-top:3px; }
.market-card-ovr { position:absolute; top:4px; left:4px; background:rgba(0,0,0,0.7); border-radius:6px; padding:2px 5px; font-size:11px; font-weight:700; color:#f0c040; }
.market-card-fav { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6); border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; }
.market-detail { background:linear-gradient(135deg,#1a2f45,#1e3550); border-radius:12px; padding:14px; margin-bottom:12px; }
.market-qty-row { display:flex; align-items:center; gap:10px; justify-content:center; margin:10px 0; }
.market-qty-btn { width:34px; height:34px; border-radius:50%; background:rgba(82,136,193,0.3); border:1px solid rgba(82,136,193,0.5); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.market-buy-btn { width:100%; padding:13px; background:linear-gradient(135deg,#4dc05a,#38a046); border:none; border-radius:10px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; font-family:inherit; letter-spacing:0.3px; }
.market-buy-btn:active { background:linear-gradient(135deg,#38a046,#2d8a39); }
.market-sell-btn { width:100%; padding:11px; background:rgba(224,80,80,0.2); border:1px solid rgba(224,80,80,0.4); border-radius:10px; color:#e05050; font-size:14px; font-weight:600; cursor:pointer; margin-top:6px; font-family:inherit; }
  </style>
</head>
<body>
<div id="app">
  <div id="start-overlay">
    <img src="https://i.ibb.co/0pN8LQch/Offside-26-logo.png" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 24px rgba(82,136,193,0.4);" />
    <div class="start-title">Offside 26</div>
    <div class="start-subtitle">Собирай лучших игроков, выигрывай турниры<br>и стань легендой футбола!</div>
    
    <!-- ✅ ДОБАВЬ ЭТО ПЕРЕД КНОПКОЙ -->
    <div style="font-size:11px;color:#7d8e9e;max-width:320px;text-align:center;line-height:1.6;padding:10px;background:rgba(255,255,255,0.04);border:1px solid #1e2d3d;border-radius:10px;">
      ⚠️ Пользователь самостоятельно несёт ответственность за содержимое загружаемых дата-паков. Разработчик не несёт ответственности за использование сторонних данных, изображений и имён.
    </div>
  
    <button id="btn-start">▶ НАЧАТЬ ИГРУ</button>
  </div>

  <div id="header">
    <img class="header-avatar" src="https://i.ibb.co/0pN8LQch/Offside-26-logo.png" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;" />
    <div class="header-info">
        <div class="header-name">Тренер</div>
        <div class="header-status">online</div>
      </div>
      <button onclick="if(gameState.registered){handleNavQuests();}else{promptRegister();}" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#f0c040;padding:5px 10px;cursor:pointer;font-size:11px;flex-shrink:0;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;">
        <span style="font-size:18px;">🏅</span>
        <span>Квесты</span>
      </button>
    <div class="header-resources">
  <div class="resources-row">
    <div class="resource-item"><img src="https://i.ibb.co/JRnypxvR/image.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-coins">0</span></div>
    <div class="resource-item"><img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-rubins">0</span></div>
    <div class="resource-item"><img src="https://i.ibb.co/Cpq33M9q/Offside.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-offside">0</span></div>
  </div>
  <div class="resources-row">
    <div class="resource-item"><img src="https://i.ibb.co/TxwKYZVc/XP.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-xp">0</span></div>
    <div class="resource-item"><img src="https://i.ibb.co/twVpcSbk/image.png" style="width:16px;height:16px;vertical-align:middle;" /><span class="val" id="hdr-level">0</span></div>
  </div>
</div>
  </div>

  <div style="position:relative;flex:1;display:flex;flex-direction:column;min-height:0;">
    <div id="chat" style="flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 8px 8px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth;"></div>
    <button id="scroll-down-btn" onclick="forceScrollToBottom()" style="display:none;position:absolute;bottom:12px;right:12px;width:38px;height:38px;border-radius:50%;background:rgba(82,136,193,0.9);border:none;color:#fff;font-size:18px;cursor:pointer;z-index:20;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.4);">↓</button>
  </div>

  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Написать сообщение..." autocomplete="off" autocorrect="off" spellcheck="false" maxlength="200" />
    <button id="btn-send" title="Отправить">➤</button>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-squad"><span class="nav-emoji">👥</span><span class="nav-label">Состав</span></button>
    <button class="nav-btn" id="nav-market"><span class="nav-emoji">💹</span><span class="nav-label">Рынок</span></button>
    <button class="nav-btn" id="nav-fragmarket"><span class="nav-emoji">🧩</span><span class="nav-label">Ярмарка</span></button>
    <button class="nav-btn" id="nav-shop"><span class="nav-emoji">🏪</span><span class="nav-label">Магазин</span></button>
    <button class="nav-btn" id="nav-events"><span class="nav-emoji">📋</span><span class="nav-label">События</span></button>
    <button class="nav-btn" id="nav-division"><span class="nav-emoji">⚽</span><span class="nav-label">Дивизион</span></button>
  </nav>
</div>

<script>
// === CONSTANTS & CONFIG ===
const STORAGE_KEY = 'footballManager_gameState';

// === DEFAULT STATE ===
const DEFAULT_STATE = {
  rubins: 1500, offsideTokens: 0, trainingPoints: 1000, ovrUpgradePoints: 500,
  passCredits: 0, fragments: 500, draftTokens: 10, xp: 0, level: 0, coins: 50000,
  nickname: '', playerId: '', stars: 0, matchesPlayed: 0, goalsScored: 0,
  registered: false, awaitingNickname: false, awaitingClubName: false, clubName: '',
  customDataUrl: '',
  customDataETag: '',
  customDataLastModified: '',
  customDataVersion: null,
  claimedDivisionRewards: [],
  seasonEndNotified: false
};

let gameState = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    gameState = raw ? Object.assign({}, DEFAULT_STATE, JSON.parse(raw)) : Object.assign({}, DEFAULT_STATE);
  } catch (e) { gameState = Object.assign({}, DEFAULT_STATE); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState)); }

// === UTILS ===
function getTimestamp() { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function generatePlayerId() {
  try {
    const arr = new Uint32Array(2); crypto.getRandomValues(arr);
    return (String(arr[0]).padStart(10,'0')+String(arr[1]).padStart(10,'0')).replace(/\D/g,'').slice(0,15).padEnd(15,'0');
  } catch(e) { return (String(Date.now())+String(Math.floor(Math.random()*1e9)).padStart(9,'0')).slice(0,15); }
}
function escapeHtml(t) { const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g,c=>m[c]); }

    img.style.height = '100%';

    avatar.appendChild(img);

    if (options.card) bubble.innerHTML = options.card;
    else {
      const textDiv = document.createElement('div'); textDiv.className = 'msg-text';

      bubble.appendChild(textDiv);
    }
    const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time'; timeDiv.textContent = time;
    bubble.appendChild(timeDiv);
    wrapper.appendChild(bubble);
  } else {
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    const textDiv = document.createElement('div'); textDiv.className = 'msg-text';
    if (options.html) textDiv.innerHTML = content; else textDiv.textContent = content;
    bubble.appendChild(textDiv);
    const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time'; timeDiv.innerHTML = `${time} <span>✓✓</span>`;
    bubble.appendChild(timeDiv);

}

// Применяет кастомные поля к существующему каталогу ALL_PLAYERS_TEMPLATE
function applyCustomPlayerData(data) {
  // Поддерживаем два формата:
  // 1) Старый: просто массив игроков [...players]
  // 2) Новый: объект { version, players: [...], bots: [...] }
  let customPlayers = [];

  if (Array.isArray(data)) {
    customPlayers = data;
  } else if (data && typeof data === 'object') {
    customPlayers = data.players || [];
    if (Array.isArray(data.bots)) {
      applyCustomBots(data.bots);
    }
  }

  const updated = JSON.parse(JSON.stringify(ALL_PLAYERS_TEMPLATE));
  for (const custom of customPlayers) {
    if (!custom || typeof custom.id === 'undefined') continue;
    const idx = updated.findIndex(p => p.id === custom.id);
    if (idx === -1) continue;
    if (typeof custom.name === 'string')       updated[idx].name       = custom.name;
    if (typeof custom.club === 'string')       updated[idx].club       = custom.club;
    if (typeof custom.image === 'string')      updated[idx].image      = custom.image;
    if (typeof custom.squadImage === 'string') updated[idx].squadImage = custom.squadImage;
    if (typeof custom.league === 'string')     updated[idx].league     = custom.league;
  }
  return updated;
}

function applyCustomBots(customBots) {
  if (!Array.isArray(customBots) || customBots.length === 0) return;

  for (const bot of customBots) {
    if (!bot || typeof bot.name !== 'string') continue;

    const oldName = bot.name;
    const newName = (typeof bot.newName === 'string') ? bot.newName : oldName;

    // Обновляем список BOTS (для матчмейкинга)
    const botIdx = BOTS.findIndex(b => b.name === oldName);
    if (botIdx !== -1) {
      BOTS[botIdx].name = newName;
      if (typeof bot.ovr === 'number')    BOTS[botIdx].ovr    = bot.ovr;
      if (typeof bot.minDiv === 'number') BOTS[botIdx].minDiv = bot.minDiv;
      if (typeof bot.maxDiv === 'number') BOTS[botIdx].maxDiv = bot.maxDiv;
    }

    // Обновляем/создаём состав бота в BOT_SQUADS
    if (bot.squad) {
      const newSquad = { starting: [], bench: [] };

      if (Array.isArray(bot.squad.starting)) {
        newSquad.starting = bot.squad.starting.map(p => ({
          name:          p.name          || 'Игрок',
          position:      p.position      || 'CM',
          ovr:           p.ovr           != null ? p.ovr    : 60,
          stamina:       p.stamina       != null ? p.stamina : 3.0,
          preferredFoot: p.preferredFoot || 'right',
          weakFoot:      p.weakFoot      != null ? p.weakFoot : 2,
          height:        p.height        != null ? p.height  : 178,
          weight:        p.weight        != null ? p.weight  : 75
        }));
      }

      if (Array.isArray(bot.squad.bench)) {
        newSquad.bench = bot.squad.bench.map(p => ({
          name:          p.name          || 'Игрок',
          position:      p.position      || 'CM',
          ovr:           p.ovr           != null ? p.ovr    : 55,
          stamina:       p.stamina       != null ? p.stamina : 3.0,
          preferredFoot: p.preferredFoot || 'right',
          weakFoot:      p.weakFoot      != null ? p.weakFoot : 2,
          height:        p.height        != null ? p.height  : 178,
          weight:        p.weight        != null ? p.weight  : 75
        }));
      }

      // Сохраняем под новым именем
      BOT_SQUADS[newName] = newSquad;

      // Если имя изменилось — удаляем старый ключ
      if (newName !== oldName && BOT_SQUADS[oldName]) {
        delete BOT_SQUADS[oldName];
      }
    } else if (newName !== oldName) {
      // Состав не задан, но имя изменилось — переименовываем ключ
      if (BOT_SQUADS[oldName]) {
        BOT_SQUADS[newName] = BOT_SQUADS[oldName];
        delete BOT_SQUADS[oldName];
      }
    }
  }
}

function applyCustomDataToMyPlayers(data) {
  if (!gameState.myPlayers || !data) return;
  const customPlayers = Array.isArray(data) ? data : (data.players || []);
  for (const custom of customPlayers) {
    if (!custom || typeof custom.id === 'undefined') continue;

    // Находим всех игроков с таким id в коллекции
    for (const player of gameState.myPlayers) {
      if (player.id !== custom.id) continue;

      // Обновляем только разрешённые поля
      if (typeof custom.name === 'string')       player.name       = custom.name;
      if (typeof custom.club === 'string')       player.club       = custom.club;
      if (typeof custom.image === 'string')      player.image      = custom.image;
      if (typeof custom.squadImage === 'string') player.squadImage = custom.squadImage;
      if (typeof custom.league === 'string')     player.league     = custom.league;
    }
  }
}

async function loadCustomDataPack() {
  const input = document.getElementById('custom-url-input');
  if (!input) return;
  const url = input.value.trim();
  if (!url) { await botReply('❌ Введите ссылку.', 300); return; }

  try {
    const response = await fetch(url, { method: 'HEAD' });
    const etag = response.headers.get('ETag') || '';
    const lastModified = response.headers.get('Last-Modified') || '';

    if (etag && etag === gameState.customDataETag && lastModified && lastModified === gameState.customDataLastModified) {
      await botReply('✅ Дата-пак уже актуален.', 400);
      return;
    }

    const dataResponse = await fetch(url);
    if (!dataResponse.ok) throw new Error('Ошибка загрузки');
    const players = await dataResponse.json();

    if (!Array.isArray(players) || players.length === 0) {
      throw new Error('Файл должен содержать массив игроков');
    }

    // Применяем к каталогу
    allPlayers = applyCustomPlayerData(players);
    localStorage.setItem('footballManager_allPlayers', JSON.stringify(allPlayers));

    // ✅ НОВОЕ: обновляем уже имеющихся игроков у пользователя
    applyCustomDataToMyPlayers(players);

    gameState.customDataUrl = url;
    gameState.customDataETag = etag;
    gameState.customDataLastModified = lastModified;
    saveState();

    await botReply(
      '✅ Дата-пак загружен! Изменены имена, клубы, изображения и лиги — в каталоге и у ваших игроков.',
      500
    );
  } catch (err) {
    console.error(err);
    await botReply(`❌ Ошибка: ${err.message}`, 400);
  }
}

let _dataPackCheckInProgress = false;

async function checkCustomDataUpdate() {
  if (!gameState.customDataUrl) return;
  if (_dataPackCheckInProgress) return;
  _dataPackCheckInProgress = true;

  try {
    const dataResponse = await fetch(
      gameState.customDataUrl + '?_t=' + Date.now(),
      { cache: 'no-store' }
    );
    if (!dataResponse.ok) return;

    const data = await dataResponse.json();

    // Если в файле есть поле version — сравниваем
    const newVersion = (data && data.version != null) ? data.version : null;
    if (newVersion !== null) {
      if (newVersion === gameState.customDataVersion) return; // не изменился
      gameState.customDataVersion = newVersion;
    }

    // Применяем данные
    allPlayers = applyCustomPlayerData(data);
    localStorage.setItem('footballManager_allPlayers', JSON.stringify(allPlayers));
    applyCustomDataToMyPlayers(data);
    saveState();

    console.log('🔄 Дата-пак обновлён, версия:', newVersion);

  } catch (err) {
    console.warn('Ошибка проверки обновлений дата-пака:', err);
  } finally {
    _dataPackCheckInProgress = false;
  }
}

  else if (lower==='состав'||lower==='/squad') handleNavSquad();

  else if (lower==='игроки'||lower==='/inventory') handleNavInventory();
  else if (lower==='события'||lower==='/events') handleNavEvents();
  else if (lower==='дивизион'||lower==='/division') handleNavDivision();
  else if (lower==='квесты'||lower==='/quests') handleNavQuests();
  else botReply(`Не понял команду. Напиши «помощь».`, 600);

  `;

function getPlayerMarketPrice(player) {
  if (player.coins_price && player.coins_price > 0) return player.coins_price;
  const ovr = getEffectiveOvr(player);
  if (ovr >= 95) return 5000000 + (ovr - 95) * 2000000;
  if (ovr >= 90) return 1000000 + (ovr - 90) * 800000;
  if (ovr >= 85) return  300000 + (ovr - 85) * 140000;
  if (ovr >= 80) return   80000 + (ovr - 80) *  44000;
  if (ovr >= 75) return   20000 + (ovr - 75) *  12000;
  if (ovr >= 70) return    5000 + (ovr - 70) *   3000;
  return Math.max(500, ovr * 50);
}

function formatCoins(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + ' млн';
  if (n >= 1000)    return Math.round(n / 1000) + ' тыс';
  return String(n);
}

if (mf.ovrMax !== '') myTradeable = myTradeable.filter(p => getEffectiveOvr(p) <= Number(mf.ovrMax));

if (mf.trainMax !== '') myTradeable = myTradeable.filter(p => (p.trainingLevel||0) <= Number(mf.trainMax));

if (mf.positions && mf.positions.length) myTradeable = myTradeable.filter(p => mf.positions.includes(p.position));
if (mf.nations && mf.nations.length) myTradeable = myTradeable.filter(p => mf.nations.includes(p.nation));
if (mf.clubs && mf.clubs.length) myTradeable = myTradeable.filter(p => mf.clubs.includes(p.club));
myTradeable.sort((a, b) => getEffectiveOvr(b) - getEffectiveOvr(a));

    : watchlistPlayers;

    ? allPlayers.find(p => p.id === marketState.selectedId) || null
    : null;

    f.ovrMin||f.ovrMax, f.priceMin||f.priceMax,

      <button class="market-tab${marketState.tab==='watchlist'?' active':''}" onclick="marketState.tab='watchlist';marketState.selectedId=null;renderMarketModal()">⭐ Избранное</button>

function buildMarketGrid(players) {
  if (!players.length) return '<div style="text-align:center;color:#7d8e9e;padding:30px 10px;font-size:13px;">Нет игроков</div>';

  let html = '<div style="display:flex;flex-direction:column;gap:6px;">';
  for (const p of players) {
    const price = getPlayerMarketPrice(p);
    const isSel = marketState.selectedId === p.id;
    const inFav = marketState.watchlist.includes(p.id);
    const effOvr = getEffectiveOvr(p);
    const color = getPositionColor(p.position);
    const stats = p.stats || {};
    const keys = p.position === 'GK' ? ['REF','KIC','PAS','SPE','DIV','HAN'] : ['PAC','SHO','PAS','DRB','DEF','STR'];
    
    let statsHtml = '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;">';
    for (const k of keys) {
      statsHtml += `<div style="background:rgba(255,255,255,0.05);border-radius:4px;padding:2px 5px;text-align:center;min-width:34px;"><div style="font-size:8px;color:#7d8e9e;">${k}</div><div style="font-size:11px;font-weight:700;">${stats[k]||0}</div></div>`;
    }
    statsHtml += '</div>';

    const trainingBadge = (p.trainingLevel > 0)
      ? `<span style="font-size:9px;background:#4dc05a;color:#fff;padding:1px 5px;border-radius:8px;">+${p.trainingLevel} тр.</span>` : '';
    const ovrUpBadge = (p.ovrUpgrade > 0)
      ? `<span style="font-size:9px;background:#f0c040;color:#000;padding:1px 5px;border-radius:8px;">+${p.ovrUpgrade} OVR</span>` : '';
    
    let cardStyle = p.image ? `background-image:url(${p.image});background-size:cover;background-position:center;` : `background:linear-gradient(135deg,#1a2f45,#1e3550);`;
    const overlayStyle = p.image ? 'background:rgba(0,0,0,0.55);border-radius:8px;padding:6px;' : '';
    const borderColor = isSel ? '#f0c040' : color;
    const borderWidth = isSel ? '2px' : '1px';

    html += `<div style="${cardStyle}border:${borderWidth} solid ${borderColor};border-radius:10px;padding:8px 10px;cursor:pointer;position:relative;" onclick="selectMarketPlayer(${p.id})">
      <div style="${overlayStyle}">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:36px;height:36px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;">${p.position}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
            <div style="font-size:10px;color:#7d8e9e;">${p.club} • ${p.nation}</div>
            <div style="display:flex;gap:4px;margin-top:2px;flex-wrap:wrap;">
              ${trainingBadge}${ovrUpBadge}
              ${p.tradeable===false?'<span style="font-size:9px;background:#e05050;color:#fff;padding:1px 5px;border-radius:8px;">🔒</span>':''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
            <div style="font-size:20px;font-weight:900;color:#f0c040;">${effOvr}</div>
            <div style="display:flex;align-items:center;gap:3px;font-size:10px;color:#f0c040;font-weight:700;">
              <img src="https://i.ibb.co/JRnypxvR/image.png" style="width:10px;height:10px;"/> ${formatCoins(price)}
            </div>
          </div>
        </div>
        ${statsHtml}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;">
          <span style="font-size:8px;color:#7d8e9e;">⚡${(p.stamina||3.0).toFixed(1)}</span>
          <span style="font-size:8px;color:#7d8e9e;">👟${p.preferredFoot==='right'?'П':'Л'}/${p.weakFoot||1}</span>
          <span style="font-size:8px;color:#7d8e9e;">🌀${((p.skill!=null)?p.skill:2.5).toFixed(1)}</span>
        </div>
      </div>
      <button style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1;" onclick="event.stopPropagation();toggleMarketFav(${p.id})">${inFav?'⭐':'☆'}</button>
    </div>`;
  }
  html += '</div>';
  return html;
}

function selectMarketPlayer(playerId) {
  const gridEl = document.getElementById('market-grid-container');
  const scrollTop = gridEl ? gridEl.scrollTop : 0;
  
  marketState.selectedId = playerId;
  marketState.qty = 1;
  renderMarketModal();
  
  // Восстанавливаем скролл грида
  setTimeout(() => {
    const gridEl2 = document.getElementById('market-grid-container');
    if (gridEl2) gridEl2.scrollTop = scrollTop;
  }, 0);
}

function toggleMarketFav(playerId) {
  const gridEl = document.getElementById('market-grid-container');

  setTimeout(() => {
    const gridEl2 = document.getElementById('market-grid-container');
    if (gridEl2) gridEl2.scrollTop = scrollTop;

}

function changeMarketQty(delta) {
  marketState.qty = Math.max(1, Math.min(99, marketState.qty + delta));
  renderMarketModal();
}

function setMarketQtyDirect(val) {
  const n = parseInt(val);
  if (!isNaN(n)) {
    marketState.qty = Math.max(1, Math.min(100, n));
  }
  // Обновляем значение в поле ввода, если оно отличается
  const inputEl = document.querySelector('#market-modal input[type="number"]');
  if (inputEl && parseInt(inputEl.value) !== marketState.qty) {
    inputEl.value = marketState.qty;
  }
}

function buyFromMarket(playerId) {
  const template = allPlayers.find(p => p.id === playerId);
  if (!template) return;
  const price = getPlayerMarketPrice(template);
  const total = price * marketState.qty;

  if ((gameState.coins || 0) < total) {
    closeMarketModal();
    botReply(`❌ Недостаточно монет. Нужно: ${COIN_ICON} ${formatCoins(total)}`, 400, { html: true });
    return;
  }

  gameState.coins = (gameState.coins || 0) - total;
  for (let i = 0; i < marketState.qty; i++) {
    const np = JSON.parse(JSON.stringify(template));
    np.trainingLevel = 0;
    np.ovrUpgrade = 0;
    np.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9) + '_' + i;
    gameState.myPlayers.push(np);
  }

  const qty = marketState.qty;
  marketState.qty = 1;
  saveState();
  updateHeaderResources();
  closeMarketModal();
  botReply(`✅ Куплено: <b>${template.name}</b> × ${qty}<br>${COIN_ICON} −${formatCoins(total)} монет`, 500, { html: true });
}

function sellToMarket(playerId) {
  // Собираем cardId игроков которые стоят в составе/скамейке
  const squadCardIds = new Set();

  // Получаем id-шники из слотов (числовые id)
  const slotPlayerIds = [
    ...Object.values(gameState.squadSlots || {}),
    ...Object.values(gameState.benchSlots || {})
  ];

  // Для каждого числового id из слотов ищем ОДИН экземпляр
  // Но нам нужно найти именно тот экземпляр что "реально стоит" в составе.
  // Поскольку squadSlots хранит числовые id, а у дубликатов одинаковый id,
  // нам нужно пометить ровно столько экземпляров сколько стоит в составе.

  // Считаем сколько раз каждый id встречается в слотах
  const idCountInSquad = {};
  for (const pid of slotPlayerIds) {
    if (pid == null) continue;
    idCountInSquad[pid] = (idCountInSquad[pid] || 0) + 1;
  }

  // Для каждого id помечаем соответствующее количество cardId как "занятых"
  for (const [pid, count] of Object.entries(idCountInSquad)) {
    const numId = parseInt(pid);
    let marked = 0;
    for (const player of (gameState.myPlayers || [])) {
      if (player.id === numId && player.cardId) {
        squadCardIds.add(player.cardId);
        marked++;
        if (marked >= count) break;
      }
    }
  }

  // Ищем игрока с нужным id, который НЕ в составе (по cardId)
  const idx = (gameState.myPlayers || []).findIndex(p =>
    p.id === playerId &&
    p.tradeable !== false &&
    !squadCardIds.has(p.cardId)
  );

  if (idx === -1) {
    const anyInSquad = slotPlayerIds.includes(playerId);
    closeMarketModal();
    if (anyInSquad) {
      botReply('❌ Все копии этого игрока стоят в составе или на скамейке. Убери из состава перед продажей.', 400);
    } else {
      botReply('❌ Игрок не найден или непродаваемый.', 400);
    }
    return;
  }

  const player = gameState.myPlayers[idx];
  const price = getPlayerMarketPrice(player);
  const sellPrice = Math.floor(price * 0.85);

  const hasUpgrades = (player.trainingLevel > 0) || (player.ovrUpgrade > 0);

  if (hasUpgrades) {
    let warnings = [];
    if (player.trainingLevel > 0) warnings.push(`уровень тренировки +${player.trainingLevel}`);
    if (player.ovrUpgrade > 0) warnings.push(`повышение OVR +${player.ovrUpgrade}`);

    const detailPanel = document.querySelector('#market-modal div[style*="width:155px"]');
    if (detailPanel) {
      const warningHtml = `
        <div style="padding:10px;background:#17212b;border-radius:8px;margin-top:6px;">
          <div style="font-size:11px;color:#f0a040;font-weight:700;margin-bottom:6px;">⚠️ Внимание!</div>
          <div style="font-size:10px;color:#7d8e9e;margin-bottom:8px;">Вы продаёте игрока с улучшениями:<br><b style="color:#fff;">${warnings.join(', ')}</b></div>
          <div style="font-size:10px;color:#7d8e9e;margin-bottom:8px;">Цена продажи: <b style="color:#f0c040;">${COIN_ICON_SM} ${formatCoins(sellPrice)}</b></div>
          <button onclick="confirmSellToMarketByIdx(${idx})" style="width:100%;padding:8px;background:rgba(224,80,80,0.2);border:1px solid rgba(224,80,80,0.4);border-radius:8px;color:#e05050;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:4px;">Всё равно продать</button>
          <button onclick="renderMarketModal()" style="width:100%;padding:8px;background:rgba(255,255,255,0.06);border:1px solid #1e2d3d;border-radius:8px;color:#7d8e9e;font-size:12px;cursor:pointer;font-family:inherit;">Отмена</button>
        </div>`;
      detailPanel.innerHTML = warningHtml;
    }
    return;
  }

  doSellToMarketByIdx(idx);
}

function confirmSellToMarket(playerId) {
  // Обратная совместимость — ищем по id
  const squadIds = new Set([
    ...Object.values(gameState.squadSlots || {}),
    ...Object.values(gameState.benchSlots || {})
  ]);
  const idx = (gameState.myPlayers || []).findIndex(p =>
    p.id === playerId && p.tradeable !== false && !squadIds.has(p.id)
  );
  if (idx !== -1) doSellToMarketByIdx(idx);
  else { closeMarketModal(); botReply('❌ Подходящий игрок не найден.', 400); }
}

function confirmSellToMarketByIdx(idx) {
  doSellToMarketByIdx(idx);
}

function doSellToMarket(playerId) {
  // Обратная совместимость
  const squadIds = new Set([
    ...Object.values(gameState.squadSlots || {}),
    ...Object.values(gameState.benchSlots || {})
  ]);
  const idx = (gameState.myPlayers || []).findIndex(p =>
    p.id === playerId && p.tradeable !== false && !squadIds.has(p.id)
  );
  if (idx !== -1) doSellToMarketByIdx(idx);
  else { closeMarketModal(); botReply('❌ Игрок не найден или все копии в составе.', 400); }
}

function doSellToMarketByIdx(idx) {
  if (idx < 0 || idx >= (gameState.myPlayers || []).length) {
    closeMarketModal();
    botReply('❌ Игрок не найден.', 400);
    return;
  }

  const player = gameState.myPlayers[idx];
  const price = getPlayerMarketPrice(player);
  const sellPrice = Math.floor(price * 0.85);

  gameState.myPlayers.splice(idx, 1);
  gameState.coins = (gameState.coins || 0) + sellPrice;
  saveState();
  updateHeaderResources();
  closeMarketModal();
  botReply(`💰 Продан: <b>${player.name}</b><br>${COIN_ICON} +${formatCoins(sellPrice)} монет (−15% комиссия)`, 500, { html: true });
}

    html += `<div style="font-size:12px;color:#7d8e9e;margin-bottom:8px;">${pack.description || ''}</div>`;

      html += '<div style="font-size:12px;margin-bottom:8px;">📦 Содержит: <b>' + pack.count + '</b> карт.</div>';
      if (pack.ovrRanges) {
        html += '<div style="font-size:11px;color:#7d8e9e;">Шансы OVR:</div>';
        for (const r of pack.ovrRanges) {
          html += `<div style="font-size:11px;">${r.minOvr}-${r.maxOvr}: ${r.chance}%</div>`;
        }
      }
      if (pack.idPools) {
        html += '<div style="font-size:11px;color:#7d8e9e;">Специальные пулы:</div>';
        for (const p of pack.idPools) {
          html += `<div style="font-size:11px;">Пул (${p.chance}%): ${p.ids.join(', ')}</div>`;
        }
      }
    } else if (pack.type === 'resources') {
      html += '<div style="font-size:12px;margin-bottom:8px;">🎯 Ресурсы:</div>';
      if (pack.resourceReward) {
        html += `<div style="font-size:11px;">${formatResource(pack.resourceReward)}</div>`;
      }
      if (pack.resourcePool) {
        html += '<div style="font-size:11px;color:#7d8e9e;">Случайный ресурс:</div>';
        for (const r of pack.resourcePool) {
          html += `<div style="font-size:11px;">${formatResource(r.reward)} — ${r.chance}%</div>`;
        }
      }
    }
    html += `<button class="shop-nav-btn" onclick="closeShopModal();purchasePack('${pack.id}');" style="margin-top:10px;width:100%;">${currencyIcon} Открыть за ${pack.price}</button>`;
  } else if (shopState.screen === 'promo') {
    html = backBtn + '<h3 style="margin:0 0 12px;">🔑 Промокод</h3>';
    html += '<div style="display:flex;gap:6px;"><input id="promo-input" type="text" placeholder="Введите код..." style="flex:1;background:#0e1621;border:1px solid #1e2d3d;border-radius:6px;padding:6px 10px;color:#fff;font-size:13px;" /><button class="shop-nav-btn" onclick="closeShopModal();redeemPromoCode();" style="padding:6px 12px;">Активировать</button></div>';
  }

  box.innerHTML = html;
}

function formatResource(reward) {
  const parts = [];
  if (reward.rubins) parts.push(`💎 ${reward.rubins} сапфиров`);
  if (reward.trainingPoints) parts.push(`🎯 ${reward.trainingPoints} очк. тренировки`);
  if (reward.ovrUpgradePoints) parts.push(`⚡ ${reward.ovrUpgradePoints} очк. OVR`);
  if (reward.fragments) parts.push(`🧩 ${reward.fragments} фрагментов`);
  if (reward.draftTokens) parts.push(`🎟️ ${reward.draftTokens} купонов`);
  if (reward.offsideTokens) parts.push(`🔮 ${reward.offsideTokens} Offside-токенов`);
  if (reward.passCredits) parts.push(`🪙 ${reward.passCredits} очк. прогресса`);
  return parts.join(', ') || 'пусто';
}

// ── Покупка пака ─────────────────────────────────────────────────────────
async function purchasePack(packId) {
  // Сохраняем состояние магазина перед покупкой
  shopStateBeforePurchase = JSON.parse(JSON.stringify(shopState));

  const pack = SHOP_PACKS.find(p => p.id === packId);
  if (!pack) { await botReply('❌ Пак не найден.', 300); return; }

  const currencyKey = pack.currency === 'rubins' ? 'rubins' : 'offsideTokens';
  if ((gameState[currencyKey] || 0) < pack.price) {
    await botReply(`❌ Недостаточно средств.`, 400);
    return;
  }

  gameState[currencyKey] -= pack.price;

  // ── Ресурсный пак ──────────────────────────────────────────────────────
  if (pack.type === 'resources') {
    if (pack.resourceReward) {
      applyResourceReward(pack.resourceReward);
      saveState(); updateHeaderResources();
      await botReply(`🎁 Вы получили: ${formatResource(pack.resourceReward)}`, 500, { html: true });
    } else if (pack.resourcePool) {
      const totalChance = pack.resourcePool.reduce((s, r) => s + r.chance, 0);
      let rand = Math.random() * totalChance;
      let selected = null;
      for (const r of pack.resourcePool) {
        rand -= r.chance;
        if (rand <= 0) { selected = r.reward; break; }
      }
      if (!selected) selected = pack.resourcePool[0].reward;
      applyResourceReward(selected);
      saveState(); updateHeaderResources();
      await botReply(`🎁 Вы получили: ${formatResource(selected)}`, 500, { html: true });
    }
    await showReturnToShopButton();
    return;
  }

  // ── Пак с игроками ─────────────────────────────────────────────────────
  const drawn = drawPackCards(pack);
  if (!drawn.length) {
    gameState[currencyKey] += pack.price;
    await botReply('⚠️ Нет доступных игроков.', 400);
    await showReturnToShopButton();
    return;
  }

  for (const p of drawn) gameState.myPlayers.push(p);
  gameState.packsOpened = (gameState.packsOpened || 0) + 1;
  saveState(); updateHeaderResources();

  // Сортируем по убыванию OVR
  drawn.sort((a, b) => b.ovr - a.ovr);

  const hasWalkout = drawn.some(p => p.ovr >= WALKOUT_THRESHOLD);

  if (drawn.length === 1) {
    const player = drawn[0];
    if (player.ovr >= WALKOUT_THRESHOLD) {
      await playWalkoutAnimation(player);
    } else {
      await botReply(null, 800, { card: buildPlayerCardHTML(player) });
    }
  } else {
    if (hasWalkout) {
      const walkoutPlayer = drawn.find(p => p.ovr >= WALKOUT_THRESHOLD);
      const others = drawn.filter(p => p !== walkoutPlayer);
      await playWalkoutAnimation(walkoutPlayer);
      if (others.length > 0) {
        await showRemainingCards(others);
      }
    } else {
      await showRemainingCards(drawn);
    }
  }

  // Сообщение об остатке средств
  const currencyIcon = pack.currency === 'rubins'
    ? '<img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:14px;height:14px;vertical-align:middle;" />'
    : '<img src="https://i.ibb.co/Cpq33M9q/Offside.png" style="width:14px;height:14px;vertical-align:middle;" />';
  await botReply(`${currencyIcon} Остаток: <b>${gameState[currencyKey] || 0}</b>`, 400, { html: true });

  await showReturnToShopButton();
}

async function showReturnToShopButton() {
  await botReply(
    `<button class="inline-btn" onclick="returnToShop()">⬅️ Вернуться в магазин</button>`,
    400,
    { html: true }
  );
}

function returnToShop() {
  shopState = JSON.parse(JSON.stringify(shopStateBeforePurchase));
  openShopModal();
}

function applyResourceReward(reward) {
  if (reward.rubins) gameState.rubins = (gameState.rubins || 0) + reward.rubins;
  if (reward.trainingPoints) gameState.trainingPoints = (gameState.trainingPoints || 0) + reward.trainingPoints;
  if (reward.ovrUpgradePoints) gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) + reward.ovrUpgradePoints;
  if (reward.fragments) gameState.fragments = (gameState.fragments || 0) + reward.fragments;
  if (reward.draftTokens) gameState.draftTokens = (gameState.draftTokens || 0) + reward.draftTokens;
  if (reward.offsideTokens) gameState.offsideTokens = (gameState.offsideTokens || 0) + reward.offsideTokens;
  if (reward.passCredits) gameState.passCredits = (gameState.passCredits || 0) + reward.passCredits;
}

// ── Волкаут-анимация ────────────────────────────────────────────────────
async function playWalkoutAnimation(player) {
  // 1) Флаг нации (эмодзи)
  const nationFlag = getFlagEmoji(player.nation) || '🏳️';
  await botReply(`<span style="font-size:36px;">${nationFlag}</span>`, 500, { html: true });

  // 2) Позиция
  await botReply(`<span style="font-size:24px;font-weight:700;">${player.position}</span>`, 500, { html: true });

  // 3) Если клуб == нация → показываем флаг нации + название нации
  //    Иначе → показываем флаг страны клуба + название клуба
  const clubFlag = getFlagEmoji(player.club) || nationFlag;
  if (player.club.toLowerCase() === player.nation.toLowerCase()) {
    await botReply(`<span style="font-size:20px;">${nationFlag} ${player.nation}</span>`, 1000, { html: true });
  } else {
    await botReply(`<span style="font-size:20px;">${clubFlag} ${player.club}</span>`, 1000, { html: true });
  }

  // 4) Карточка игрока
  await botReply(null, 1000, { card: buildPlayerCardHTML(player) });
}

function pickWeightedRange(ranges) {
  if (!ranges?.length) return null;
  const tw = ranges.reduce((s,r)=>s+(r.chance||0),0);
  if (tw<=0) return ranges[0];
  let rand = Math.random()*tw;
  for (const r of ranges) if ((rand-=r.chance||0)<=0) return r;
  return ranges[ranges.length-1];
}
function getPlayersInOvrRange(min,max) { return allPlayers.filter(p=>p.ovr>=min&&p.ovr<=max); }
function drawPackCards(pack) {
  const drawn = [];

  // ── Новый режим: пулы конкретных ID ──────────────────────────────────
  if (pack.idPools && pack.idPools.length > 0) {
    // Собираем только те пулы, в которых есть реальные игроки в allPlayers
    const availablePools = [];
    for (const pool of pack.idPools) {
      const existing = pool.ids
        .map(id => allPlayers.find(p => p.id === id))
        .filter(p => p !== undefined);
      if (existing.length > 0) {
        availablePools.push({
          chance: pool.chance,
          candidates: existing
        });
      }
    }
    if (availablePools.length === 0) return drawn;

    const totalWeight = availablePools.reduce((sum, p) => sum + p.chance, 0);

    for (let i = 0; i < (pack.count || 1); i++) {
      let rand = Math.random() * totalWeight;
      let selectedPool = null;
      for (const p of availablePools) {
        rand -= p.chance;
        if (rand <= 0) {
          selectedPool = p;
          break;
        }
      }
      if (!selectedPool) selectedPool = availablePools[availablePools.length - 1];

      const player = JSON.parse(JSON.stringify(
        selectedPool.candidates[Math.floor(Math.random() * selectedPool.candidates.length)]
      ));
      player.trainingLevel = 0;
      player.ovrUpgrade    = 0;
      player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      drawn.push(player);
    }
    return drawn;
  }

  // ── Старый режим: OVR‑диапазоны ──────────────────────────────────────
  const availableRanges = [];
  for (const range of pack.ovrRanges) {
    const candidates = getPlayersInOvrRange(range.minOvr, range.maxOvr);
    if (candidates.length > 0) {
      availableRanges.push({
        minOvr: range.minOvr,
        maxOvr: range.maxOvr,
        chance: range.chance,
        candidates: candidates
      });
    }
  }

  if (availableRanges.length === 0) return drawn;

  const totalWeight = availableRanges.reduce((sum, r) => sum + r.chance, 0);

  for (let i = 0; i < (pack.count || 1); i++) {
    let rand = Math.random() * totalWeight;
    let selectedRange = null;
    for (const r of availableRanges) {
      rand -= r.chance;
      if (rand <= 0) {
        selectedRange = r;
        break;
      }
    }
    if (!selectedRange) selectedRange = availableRanges[availableRanges.length - 1];

    const player = JSON.parse(JSON.stringify(
      selectedRange.candidates[Math.floor(Math.random() * selectedRange.candidates.length)]
    ));
    player.trainingLevel = 0;
    player.ovrUpgrade    = 0;
    player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    drawn.push(player);
  }

  return drawn;
}
function getPackById(id) { return SHOP_PACKS.find(p=>p.id===id)||null; }
function resolveDraftPull(cfg) {
  const roll = Math.random(); let tier;
  if (roll<DRAFT_PROB_A && cfg.poolA?.length) tier='A';
  else if (roll<DRAFT_PROB_A+DRAFT_PROB_B && cfg.poolB?.length) tier='B';
  else tier='C';
  if (tier==='A'&&!cfg.poolA?.length) tier='B';
  if (tier==='B'&&!cfg.poolB?.length) tier='C';
  if (tier==='C'&&!cfg.poolC?.length) return {tier:'C',player:null};
  const pool = tier==='A'?cfg.poolA:tier==='B'?cfg.poolB:cfg.poolC;
  const pickedId = pool[Math.floor(Math.random()*pool.length)];
  const tpl = allPlayers.find(p=>p.id===pickedId)||null;
  const player = tpl ? JSON.parse(JSON.stringify(tpl)) : null;
  if (player) player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  if (player) { player.trainingLevel=0; player.ovrUpgrade=0; }
  return {tier,player};
}

    async function openDraft(draftId) {
      const config = getDraftConfig(draftId);
      if (!config) {
        await botReply('❌ Драфт не найден.', 300);
        return;
      }

      if ((gameState.draftTokens || 0) < config.cost) {
        await botReply('❌ Недостаточно купонов открытия.', 400);
        return;
      }

      gameState.draftTokens -= config.cost;

      // Initialise counters if missing
      if (!gameState.draftCounterB) gameState.draftCounterB = 0;
      if (!gameState.draftCounterA) gameState.draftCounterA = 0;

      gameState.draftCounterB++;
      gameState.draftCounterA++;

      let { tier, player } = resolveDraftPull(config);

      // ── Pity B: every 10 pulls guaranteed pool B+ ─────────────────────────
      if (gameState.draftCounterB >= 10 && tier === 'C') {
        const result = forcePoolB(config);
        if (result) { tier = result.tier; player = result.player; }
      }

      // ── Pity A: every 100 pulls guaranteed pool A ─────────────────────────
      if (gameState.draftCounterA >= 100) {
        const result = forcePoolA(config);
        if (result) { tier = result.tier; player = result.player; }
      }

      // ── Reset counters on natural high-tier drops ─────────────────────────
      if (tier === 'A') {
        gameState.draftCounterA = 0;
        gameState.draftCounterB = 0;
      } else if (tier === 'B') {
        gameState.draftCounterB = 0;
      }

      if (player) {
        gameState.myPlayers.push(player);
      }

      saveState();
      updateHeaderResources();

      if (player) {
        const card      = buildPlayerCardHTML(player);
        const tierEmoji = tier === 'A' ? '👑' : tier === 'B' ? '⭐' : '';

      const bulkCost = config.costBulk || 10;
      if ((gameState.draftTokens || 0) < bulkCost) {
        await botReply('❌ Недостаточно купонов открытия.', 400);
        return;
      }

      gameState.draftTokens -= bulkCost;

      const results      = [];
      let hasBOrBetter   = false;
      let bestPlayer     = null;
      let bestTier       = 'C';

      for (let i = 0; i < 10; i++) {
        let { tier, player } = resolveDraftPull(config);

        gameState.draftCounterB = (gameState.draftCounterB || 0) + 1;
        gameState.draftCounterA = (gameState.draftCounterA || 0) + 1;

        // Per-pull pity checks
        if (gameState.draftCounterB >= 10 && tier === 'C') {
          const forced = forcePoolB(config);
          if (forced) { tier = forced.tier; player = forced.player; }
        }
        if (gameState.draftCounterA >= 100) {
          const forced = forcePoolA(config);
          if (forced) { tier = forced.tier; player = forced.player; }
        }

        if (tier === 'A') {
          gameState.draftCounterA = 0;
          gameState.draftCounterB = 0;
        } else if (tier === 'B') {
          gameState.draftCounterB = 0;
        }

        if (tier === 'A' || tier === 'B') hasBOrBetter = true;

        if (player) {
          gameState.myPlayers.push(player);

          // Track the best result for the walkout reveal
          const isBetter =
            tier === 'A' ||
            (tier === 'B' && bestTier !== 'A') ||
            (tier === 'C' && bestTier === 'C' && (!bestPlayer || player.ovr > bestPlayer.ovr));

          if (isBetter) {
            bestPlayer = player;
            bestTier   = tier;
          }
        }

        results.push({ tier, player });
      }

      // ── Bulk guarantee: at least one B+ in the whole batch ────────────────
      if (!hasBOrBetter) {
        const forced = forcePoolB(config);
        if (forced && forced.player) {
          gameState.myPlayers.push(forced.player);
          results.push({ tier: forced.tier, player: forced.player });
          bestPlayer = forced.player;
          bestTier   = forced.tier;
          gameState.draftCounterB = 0;
        }
      }

      saveState();
      updateHeaderResources();

      // ── Walkout reveal for the best card ──────────────────────────────────
      if (bestPlayer) {
        await botReply(
          `🌟 Волкаут! <b>${config.name}</b>`,
          400,
          { html: true }
        );
        await botReply(null, 1000, { card: buildPlayerCardHTML(bestPlayer) });
      }

      // ── List remaining cards (sorted best → worst by OVR) ─────────────────
      const others = results.filter(
        r => r.player && r.player !== bestPlayer
      );
      others.sort(
        (a, b) => (b.player ? b.player.ovr : 0) - (a.player ? a.player.ovr : 0)
      );

      if (others.length > 0) {
        let listHtml = '<div class="msg-text"><b>Остальные игроки:</b></div>';
        for (const r of others) {
          if (r.player) {
            listHtml += buildPlayerCardHTML(r.player);
          }
        }
        await botReply(listHtml, 800, { html: true });
      }

      await botReply(
        `<img src="https://i.ibb.co/6RTT8K1z/image.png" style="width:16px;height:16px;vertical-align:middle;" /> Осталось купонов: <b>${gameState.draftTokens || 0}</b>`,
        400,
        { html: true }
      );
    }

    // === FORCE POOL B (pity helper) ===
    function forcePoolB(config) {
      if (config.poolB && config.poolB.length > 0) {
        const id       = config.poolB[Math.floor(Math.random() * config.poolB.length)];
        const template = allPlayers.find(p => p.id === id);
        if (template) {
          const player = JSON.parse(JSON.stringify(template));
          player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          player.trainingLevel = 0;
          player.ovrUpgrade    = 0;
          return { tier: 'B', player };
        }
      }
      return null;
    }

    // === FORCE POOL A (pity helper) ===
    // Falls back to pool B if pool A is empty.
    function forcePoolA(config) {
      if (config.poolA && config.poolA.length > 0) {
        const id       = config.poolA[Math.floor(Math.random() * config.poolA.length)];
        const template = allPlayers.find(p => p.id === id);
        if (template) {
          const player = JSON.parse(JSON.stringify(template));
          player.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          player.trainingLevel = 0;
          player.ovrUpgrade    = 0;
          return { tier: 'A', player };
        }
      }
      // Pool A empty — fall back to pool B
      return forcePoolB(config);
    }

    // === EXECUTE SBC ===
    async function executeSbc(sbcId) {
      const sbc = SBC_LIST.find(s => s.id === sbcId);
      if (!sbc) {
        await botReply('❌ Обмен не найден.', 300);
        return;
      }

      // ── Validate all requirements (read-only pass, no mutations yet) ────────
      const playersToRemove = [];

      for (const req of sbc.requirements) {

        if (req.type === 'player_any') {
          const eligible = (gameState.myPlayers || [])
            .filter(p => getEffectiveOvr(p) >= (req.minOvr || 0));
          if (eligible.length < req.count) {
            await botReply(
              `❌ Недостаточно игроков с OVR ${req.minOvr}+. `
              + `Нужно: ${req.count}, доступно: ${eligible.length}`,
              400
            );
            return;
          }
          eligible.sort((a, b) => getEffectiveOvr(a) - getEffectiveOvr(b));
          for (let i = 0; i < req.count; i++) {
            playersToRemove.push(eligible[i].id);
          }

        } else if (req.type === 'player_program') {
          const eligible = (gameState.myPlayers || [])
            .filter(p => p.program === req.program && getEffectiveOvr(p) >= (req.minOvr || 0));
          if (eligible.length < req.count) {
            await botReply(
              `❌ Недостаточно игроков программы «${req.program}» с OVR ${req.minOvr}+. `
              + `Нужно: ${req.count}, доступно: ${eligible.length}`,
              400
            );
            return;
          }
          eligible.sort((a, b) => getEffectiveOvr(a) - getEffectiveOvr(b));
          for (let i = 0; i < req.count; i++) {
            playersToRemove.push(eligible[i].id);
          }

        } else if (req.type === 'rubins') {
          if ((gameState.rubins || 0) < req.amount) {
            await botReply(`❌ Недостаточно сапфиров. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'fragments') {
          if ((gameState.fragments || 0) < req.amount) {
            await botReply(`❌ Недостаточно фрагментов. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'draftTokens') {
          if ((gameState.draftTokens || 0) < req.amount) {
            await botReply(`❌ Недостаточно купонов открытия. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'offsideTokens') {
          if ((gameState.offsideTokens || 0) < req.amount) {
            await botReply(`❌ Недостаточно Offside-токенов. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'trainingPoints') {
          if ((gameState.trainingPoints || 0) < req.amount) {
            await botReply(`❌ Недостаточно очков тренировки. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'ovrUpgradePoints') {
          if ((gameState.ovrUpgradePoints || 0) < req.amount) {
            await botReply(`❌ Недостаточно очков повышения OVR. Нужно: ${req.amount}`, 400);
            return;
          }
        }
      }

      // ── Deduct currency requirements ────────────────────────────────────────
      for (const req of sbc.requirements) {
        if (req.type === 'rubins')           gameState.rubins           = (gameState.rubins           || 0) - req.amount;
        if (req.type === 'fragments')        gameState.fragments        = (gameState.fragments        || 0) - req.amount;
        if (req.type === 'draftTokens')      gameState.draftTokens      = (gameState.draftTokens      || 0) - req.amount;
        if (req.type === 'offsideTokens')    gameState.offsideTokens    = (gameState.offsideTokens    || 0) - req.amount;
        if (req.type === 'trainingPoints')   gameState.trainingPoints   = (gameState.trainingPoints   || 0) - req.amount;
        if (req.type === 'ovrUpgradePoints') gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) - req.amount;
      }

      // ── Remove consumed players ─────────────────────────────────────────────
      for (const pid of playersToRemove) {
        const idx = gameState.myPlayers.findIndex(p => p.id === pid);
        if (idx !== -1) gameState.myPlayers.splice(idx, 1);
      }

      // ── Apply reward ────────────────────────────────────────────────────────
      const reward = sbc.reward;
      let rewardMsg = '';

      const rubyIcon = '<img src="https://i.ibb.co/5gkW9zFJ/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const fragmentIcon = '<img src="https://i.ibb.co/xtBftkpX/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const cuponIcon = '<img src="https://i.ibb.co/6RTT8K1z/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const trainingIcon = '<img src="https://i.ibb.co/gb178dPT/image.png" style="width:16px;height:16px;vertical-align:middle;" />';
      const ovrIcon = '<img src="https://i.ibb.co/jv3KsbMx/OVR.png" style="width:16px;height:16px;vertical-align:middle;" />';

      if (reward.type === 'player') {
        const template = allPlayers.find(p => p.id === reward.playerId);
        if (template) {
          const newPlayer = JSON.parse(JSON.stringify(template));
          newPlayer.trainingLevel = 0;
          newPlayer.ovrUpgrade    = 0;
          newPlayer.cardId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          gameState.myPlayers.push(newPlayer);
          rewardMsg = `👤 ${newPlayer.name} (OVR ${newPlayer.ovr})`;
        }
      } else if (reward.type === 'rubins') {
        gameState.rubins = (gameState.rubins || 0) + (reward.amount || 0);
        rewardMsg = `${rubyIcon} ${reward.amount} сапфиров`;
      } else if (reward.type === 'fragments') {
        gameState.fragments = (gameState.fragments || 0) + (reward.amount || 0);
        rewardMsg = `${fragmentIcon} ${reward.amount} фрагментов`;
      } else if (reward.type === 'draftTokens') {
        gameState.draftTokens = (gameState.draftTokens || 0) + (reward.amount || 0);
        rewardMsg = `${cuponIcon} ${reward.amount} купонов`;
      } else if (reward.type === 'trainingPoints') {
        gameState.trainingPoints = (gameState.trainingPoints || 0) + (reward.amount || 0);
        rewardMsg = `${trainingIcon} ${reward.amount} очк. тренировки`;
      } else if (reward.type === 'ovrUpgradePoints') {
        gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) + (reward.amount || 0);
        rewardMsg = `${ovrIcon} ${reward.amount} очк. OVR`;
      }

      saveState();
      updateHeaderResources();

      await botReply(
        `✅ Обмен «${sbc.title}» выполнен!`
        + (rewardMsg ? `\n🎁 Получено: ${rewardMsg}` : ''),
        500
      );

      // If the exchange is one-time, show a player card for the new player
      if (reward.type === 'player') {
        const acquired = gameState.myPlayers[gameState.myPlayers.length - 1];
        if (acquired) {
          await botReply(null, 600, { card: buildPlayerCardHTML(acquired) });
        }
      }

function toggleInvFilter(key, val) {
  // Сохраняем позицию скролла ДО перерисовки
  const fOverlay = document.getElementById('inv-filter-modal');
  const scrollContainer = fOverlay ? fOverlay.querySelector('div') : null;
  const scrollTop = scrollContainer ? scrollContainer.scrollTop : 0;

  // Для числовых значений приводим тип
  let typedVal = val;
  if (['ovrUpgrades','weakFeets'].includes(key)) typedVal = parseInt(val);
  if (key === 'staminas') typedVal = parseFloat(val);

  const arr = invFilters[key];
  const idx = arr.indexOf(typedVal);
  if (idx === -1) arr.push(typedVal);
  else arr.splice(idx, 1);

  // Если изменили лигу — сбрасываем клубы
  if (key === 'leagues') invFilters.clubs = [];

  renderInvFilterModal();

  // Восстанавливаем позицию скролла ПОСЛЕ перерисовки
  const newScrollContainer = fOverlay ? fOverlay.querySelector('div') : null;
  if (newScrollContainer) newScrollContainer.scrollTop = scrollTop;
}

// ── Рендер списка игроков ─────────────────────────────────────────────────
function renderInventoryList() {
  const container = document.getElementById('inv-list');
  const countEl   = document.getElementById('inv-count');
  if (!container) return;

  let filtered = [...(gameState.myPlayers || [])];

  // По имени
  if (invFilters.name.trim()) {
    const q = invFilters.name.trim().toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
  }
  // По OVR
  if (invFilters.ovrMin !== '') filtered = filtered.filter(p => getEffectiveOvr(p) >= Number(invFilters.ovrMin));
  if (invFilters.ovrMax !== '') filtered = filtered.filter(p => getEffectiveOvr(p) <= Number(invFilters.ovrMax));
  // По программе
  if (invFilters.programs.length) filtered = filtered.filter(p => invFilters.programs.includes(p.program));
  // По позиции
  if (invFilters.positions.length) filtered = filtered.filter(p => invFilters.positions.includes(p.position));
  // По уровню тренировки
  if (invFilters.trainMin !== '') filtered = filtered.filter(p => (p.trainingLevel||0) >= Number(invFilters.trainMin));
  if (invFilters.trainMax !== '') filtered = filtered.filter(p => (p.trainingLevel||0) <= Number(invFilters.trainMax));
  // По повышению OVR
  if (invFilters.ovrUpgrades.length) filtered = filtered.filter(p => invFilters.ovrUpgrades.includes(p.ovrUpgrade||0));
  // По лиге
  if (invFilters.leagues.length) filtered = filtered.filter(p => invFilters.leagues.includes(p.league || 'Без лиги'));
  // По команде
  if (invFilters.clubs.length) filtered = filtered.filter(p => invFilters.clubs.includes(p.club));
  // По нации
  if (invFilters.nations.length) filtered = filtered.filter(p => invFilters.nations.includes(p.nation));
  // По выносливости
  if (invFilters.staminas.length) filtered = filtered.filter(p => invFilters.staminas.includes(parseFloat((p.stamina||3.0).toFixed(1))));
  // По финтам (weakFoot)
  if (invFilters.weakFeets.length) filtered = filtered.filter(p => invFilters.weakFeets.includes(p.weakFoot||1));
  // По рабочей ноге
  if (invFilters.preferredFeet.length) filtered = filtered.filter(p => invFilters.preferredFeet.includes(p.preferredFoot||'right'));

  // Сортировка по OVR
  filtered.sort((a,b) => getEffectiveOvr(b) - getEffectiveOvr(a));

  if (countEl) countEl.textContent = `Найдено: ${filtered.length} из ${(gameState.myPlayers||[]).length}`;

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:#7d8e9e;padding:20px;">Нет игроков по выбранным фильтрам.</div>';
    return;
  }

  const imgTrain = '<img src="https://i.ibb.co/gb178dPT/image.png" style="width:14px;height:14px;vertical-align:middle;" />';
  const imgOvr   = '<img src="https://i.ibb.co/jv3KsbMx/OVR.png" style="width:14px;height:14px;vertical-align:middle;" />';
  const imgFrag  = '<img src="https://i.ibb.co/xtBftkpX/image.png" style="width:14px;height:14px;vertical-align:middle;" />';
  const btnSt    = 'font-size:10px;padding:3px 8px;';

  let html = '';
  for (const player of filtered) {
    html += buildPlayerCardHTML(player);
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">';

    if (player.trainingLevel < MAX_TRAINING_LEVEL) {
      html += '<button class="inline-btn" onclick="trainPlayer(\'' + player.cardId + '\')" style="' + btnSt + '">'
            + imgTrain + ' Тренировать (' + TRAINING_COST_PER_LEVEL + ' очк)</button>';
    }
    if (player.ovrUpgrade < 5) {
      const cost = OVR_UPGRADE_COSTS[player.ovrUpgrade];
      html += '<button class="inline-btn" onclick="upgradePlayerOvr(\'' + player.cardId + '\')" style="' + btnSt + '">'
            + imgOvr + ' Повысить OVR (' + cost + ' очк)</button>';
    }
    html += '<button class="inline-btn" onclick="confirmExchangePlayer(\'' + player.cardId + '\')" style="' + btnSt + '">'
          + imgFrag + ' Обменять на фрагменты</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}

// ── Тренировка ────────────────────────────────────────────────────────────
function trainPlayer(cardId) {
  const player = findPlayerByCardId(cardId);
  if (!player) { botReply('❌ Игрок не найден.', 300); return; }
  if (player.trainingLevel >= MAX_TRAINING_LEVEL) { botReply(`❌ Максимальный уровень тренировки (${MAX_TRAINING_LEVEL}).`, 300); return; }
  if ((gameState.trainingPoints||0) < TRAINING_COST_PER_LEVEL) { botReply(`❌ Недостаточно очков тренировки (нужно ${TRAINING_COST_PER_LEVEL}).`, 300); return; }
  gameState.trainingPoints -= TRAINING_COST_PER_LEVEL;
  player.trainingLevel = (player.trainingLevel||0) + 1;
  saveState(); updateHeaderResources(); renderInventoryList();
  botReply(`✅ Тренировка <b>${player.name}</b> завершена! Уровень: ${player.trainingLevel}.`, 300, { html: true });
}

// ── Повышение OVR ─────────────────────────────────────────────────────────
function upgradePlayerOvr(cardId) {
  const player = findPlayerByCardId(cardId);
  if (!player) { botReply('❌ Игрок не найден.', 300); return; }
  if (player.ovrUpgrade >= 5) { botReply('❌ Максимальный ранг OVR (5).', 300); return; }
  const cost = OVR_UPGRADE_COSTS[player.ovrUpgrade];
  if ((gameState.ovrUpgradePoints||0) < cost) { botReply(`❌ Недостаточно очков OVR (нужно ${cost}).`, 300); return; }
  gameState.ovrUpgradePoints -= cost;
  player.ovrUpgrade = (player.ovrUpgrade||0) + 1;
  saveState(); updateHeaderResources(); renderInventoryList();
  botReply(`✅ Ранг OVR <b>${player.name}</b> повышен! OVR +${player.ovrUpgrade}.`, 300, { html: true });
}

// ── Обмен на фрагменты ────────────────────────────────────────────────────
async function confirmExchangePlayer(cardId) {
  const player = findPlayerByCardId(cardId);
  if (!player) { await botReply('❌ Игрок не найден.', 300); return; }
  const ovr = getEffectiveOvr(player);
  const frags = getFragmentReward(ovr);
  const fragmentIcon = '<img src="https://i.ibb.co/xtBftkpX/image.png" style="width:14px;height:14px;vertical-align:middle;" />';
  const msg = `Вы уверены, что хотите обменять <b>${player.name}</b> (OVR ${ovr}) на ${fragmentIcon} <b>${frags}</b> фрагментов?`;
  const btns = `<div class="inline-btn-row">
    <button class="inline-btn" onclick="doExchangePlayerForFragments('${cardId}')">Да</button>
    <button class="inline-btn" onclick="botReply('❌ Обмен отменён.', 200); openInventoryModal();">Нет</button>
  </div>`;
  closeInventoryModal();
  await botReply(msg + btns, 400, { html: true });
}

async function doExchangePlayerForFragments(cardId) {
  const idx = (gameState.myPlayers||[]).findIndex(p => p.cardId === cardId);
  if (idx === -1) { await botReply('❌ Игрок не найден.', 300); return; }
  const player = gameState.myPlayers[idx];
  const ovr = getEffectiveOvr(player);
  const frags = getFragmentReward(ovr);
  gameState.myPlayers.splice(idx, 1);
  gameState.fragments = (gameState.fragments||0) + frags;
  saveState(); updateHeaderResources();
  const fragmentIcon = '<img src="https://i.ibb.co/xtBftkpX/image.png" style="width:14px;height:14px;vertical-align:middle;" />';
  await botReply(`${fragmentIcon} Игрок <b>${player.name}</b> обменян на <b>${frags}</b> фрагментов.`, 500, { html: true });
  openInventoryModal();
}

function findPlayerByCardId(cardId) {
  return (gameState.myPlayers||[]).find(p => p.cardId === cardId) || null;
}

        GK: [], LB: ['LB','CB','RB'], CB: ['LB','CB','RB','CDM'], RB: ['LB','CB','RB'],
        CDM: ['LM','CM','CAM','RM','CDM','CB'], CM: ['LM','CM','CAM','RM','CDM'],
        CAM: ['LM','CM','CAM','RM','CDM'], LM: ['LM','CM','CAM','RM','CDM'],

        RW: ['LW','RW','ST','CF'], ST: ['LW','RW','ST','CF'], CF: ['LW','RW','ST','CF']
      };
      const sameLine = LINE_GROUPS[player.position] || [];
      return sameLine.includes(slotPos) ? 4 : 15;
