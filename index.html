<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Offside 26 — Футбольный Симмулятор</title>
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #0e1621;
      --bg-header: #17212b;
      --bg-input: #17212b;
      --bg-bot-bubble: #182533;
      --bg-user-bubble: #2b5278;
      --bg-nav: #17212b;
      --text-primary: #e8e8e8;
      --text-secondary: #7d8e9e;
      --text-time: #6b7d8d;
      --accent: #5288c1;
      --border: #1e2d3d;
      --avatar-bg: #2b5278;
      --start-overlay-bg: #0e1621;
      --btn-primary: #5288c1;
      --btn-primary-hover: #4a7ab0;
      --nav-active: #5288c1;
      --nav-inactive: #6b7d8d;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0f18;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      overflow: hidden;
    }

    #app {
      max-width: 600px;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* START OVERLAY */
    #start-overlay {
      position: absolute;
      inset: 0;
      background: var(--start-overlay-bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }
    #start-overlay.hidden { display: none; }

    .start-logo {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--avatar-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin-bottom: 8px;
      box-shadow: 0 4px 24px rgba(82,136,193,0.4);
    }
    .start-title { font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .start-subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 320px; }

    #btn-start {
      margin-top: 12px; padding: 14px 48px;
      background: var(--btn-primary); color: #fff; border: none;
      border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s; letter-spacing: 0.3px;
    }
    #btn-start:hover { background: var(--btn-primary-hover); }
    #btn-start:active { transform: scale(0.97); }

    /* HEADER */
    #header {
      background: var(--bg-header); padding: 8px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      min-height: 56px; z-index: 10;
    }
    .header-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--avatar-bg); display: flex;
      align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-size: 15px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 12px; color: #4dcd6c; margin-top: 1px; }
    .header-resources { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .resources-row { display: flex; gap: 8px; align-items: center; }
    .resource-item { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .resource-item span.emoji { font-size: 13px; }
    .resource-item span.val { font-weight: 600; color: var(--text-primary); min-width: 20px; }

    /* CHAT */
    #chat {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 12px 8px 8px; display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

    .date-divider { text-align: center; margin: 8px 0; font-size: 12px; color: var(--text-time); position: relative; }
    .date-divider span { background: var(--bg-main); padding: 0 10px; position: relative; z-index: 1; }
    .date-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }

    .msg-wrapper { display: flex; align-items: flex-end; gap: 6px; max-width: 100%; animation: fadeIn 0.25s ease forwards; }
    .msg-wrapper.bot { align-self: flex-start; flex-direction: row; max-width: 88%; }
    .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; align-self: flex-end; }
    .msg-avatar.hidden { visibility: hidden; }

    .msg-bubble { padding: 8px 10px 6px; border-radius: 12px; line-height: 1.5; word-break: break-word; position: relative; max-width: 100%; }
    .msg-wrapper.bot .msg-bubble { background: var(--bg-bot-bubble); border-bottom-left-radius: 4px; color: var(--text-primary); }
    .msg-wrapper.user .msg-bubble { background: var(--bg-user-bubble); border-bottom-right-radius: 4px; color: #fff; }
    .msg-text { font-size: 14px; line-height: 1.5; }
    .msg-time { font-size: 11px; color: var(--text-time); text-align: right; margin-top: 3px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
    .msg-wrapper.user .msg-time { color: rgba(255,255,255,0.55); }

    .profile-card { background: linear-gradient(135deg, #1a2f45 0%, #182533 100%); border: 1px solid #2a4060; border-radius: 10px; padding: 12px 14px; min-width: 220px; max-width: 280px; }
    .profile-card-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .profile-card-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .profile-card-row:last-child { border-bottom: none; }
    .profile-card-row .label { color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .profile-card-row .value { font-weight: 600; color: var(--text-primary); }
    .profile-card-id { margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: var(--text-time); word-break: break-all; }

    .typing-indicator { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: typingBounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-4px);opacity:1} }

    /* INPUT */
    #input-area { background: var(--bg-input); border-top: 1px solid var(--border); padding: 8px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; z-index: 10; }
    #msg-input { flex: 1; background: #0e1621; border: 1px solid #1e2d3d; border-radius: 20px; padding: 9px 14px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; resize: none; line-height: 1.4; }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-secondary); }
    #btn-send { width: 40px; height: 40px; border-radius: 50%; background: var(--btn-primary); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; }
    #btn-send:hover { background: var(--btn-primary-hover); }
    #btn-send:active { transform: scale(0.92); }

    /* BOTTOM NAV */
    #bottom-nav { background: var(--bg-nav); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; z-index: 10; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 2px 8px; gap: 3px; background: none; border: none; cursor: pointer; color: var(--nav-inactive); font-size: 10px; transition: color 0.2s; min-width: 0; -webkit-tap-highlight-color: transparent; }
    .nav-btn .nav-emoji { font-size: 20px; line-height: 1; }
    .nav-btn .nav-label { font-size: 9.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; font-family: inherit; }
    .nav-btn:hover, .nav-btn.active { color: var(--nav-active); }
    .nav-btn.active .nav-emoji { filter: drop-shadow(0 0 4px rgba(82,136,193,0.6)); }

    .inline-btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .inline-btn { padding: 6px 12px; background: rgba(82,136,193,0.2); border: 1px solid rgba(82,136,193,0.4); border-radius: 16px; color: var(--accent); font-size: 13px; cursor: pointer; transition: background 0.2s; font-family: inherit; }
    .inline-btn:hover { background: rgba(82,136,193,0.35); }
    .inline-btn:active { background: rgba(82,136,193,0.5); }

    @media (max-width: 400px) {
      .nav-btn .nav-label { font-size: 8.5px; }
      .nav-btn .nav-emoji { font-size: 18px; }
      .header-resources { gap: 2px; }
      .resource-item { font-size: 11px; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <div id="start-overlay">
    <div class="start-logo">⚽</div>
    <div class="start-title">Тренер<br>Футбольный Менеджер</div>
    <div class="start-subtitle">Собери команду мечты, побеждай в дивизионах<br>и стань лучшим менеджером!</div>
    <button id="btn-start">▶ НАЧАТЬ ИГРУ</button>
  </div>

  <div id="header">
    <div class="header-avatar">⚽</div>
    <div class="header-info">
      <div class="header-name">Тренер</div>
      <div class="header-status">online</div>
    </div>
    <div class="header-resources">
      <div class="resources-row">
        <div class="resource-item"><span class="emoji">💎</span><span class="val" id="hdr-rubins">0</span></div>
        <div class="resource-item"><span class="emoji">🔮</span><span class="val" id="hdr-offside">0</span></div>
      </div>
      <div class="resources-row">
        <div class="resource-item"><span class="emoji">⭐</span><span class="val" id="hdr-xp">0</span></div>
        <div class="resource-item"><span class="emoji">🏆</span><span class="val" id="hdr-level">0</span></div>
      </div>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Написать сообщение..." autocomplete="off" autocorrect="off" spellcheck="false" maxlength="200" />
    <button id="btn-send" title="Отправить">➤</button>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-squad"><span class="nav-emoji">👥</span><span class="nav-label">Состав</span></button>
    <button class="nav-btn" id="nav-inventory"><span class="nav-emoji">🎒</span><span class="nav-label">Игроки</span></button>
    <button class="nav-btn" id="nav-shop"><span class="nav-emoji">🏪</span><span class="nav-label">Магазин</span></button>
    <button class="nav-btn" id="nav-events"><span class="nav-emoji">📋</span><span class="nav-label">События</span></button>
    <button class="nav-btn" id="nav-division"><span class="nav-emoji">⚽</span><span class="nav-label">Дивизион</span></button>
    <button class="nav-btn" id="nav-quests"><span class="nav-emoji">🏅</span><span class="nav-label">Квесты</span></button>
  </nav>
</div>

<script>
// === CONSTANTS & CONFIG ===
const STORAGE_KEY = 'footballManager_gameState';

// === DEFAULT STATE ===
const DEFAULT_STATE = {
  rubins: 1500, offsideTokens: 0, trainingPoints: 1000, ovrUpgradePoints: 500,
  passCredits: 0, fragments: 500, draftTokens: 10, xp: 0, level: 0,
  nickname: '', playerId: '', stars: 0, matchesPlayed: 0, goalsScored: 0,
  registered: false, awaitingNickname: false
};

let gameState = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    gameState = raw ? Object.assign({}, DEFAULT_STATE, JSON.parse(raw)) : Object.assign({}, DEFAULT_STATE);
  } catch (e) { gameState = Object.assign({}, DEFAULT_STATE); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState)); }

// === UTILS ===
function getTimestamp() { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function generatePlayerId() {
  try {
    const arr = new Uint32Array(2); crypto.getRandomValues(arr);
    return (String(arr[0]).padStart(10,'0')+String(arr[1]).padStart(10,'0')).replace(/\D/g,'').slice(0,15).padEnd(15,'0');
  } catch(e) { return (String(Date.now())+String(Math.floor(Math.random()*1e9)).padStart(9,'0')).slice(0,15); }
}
function escapeHtml(t) { const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g,c=>m[c]); }

// === HEADER ===
function updateHeaderResources() {
  document.getElementById('hdr-rubins').textContent = gameState.rubins ?? 0;
  document.getElementById('hdr-offside').textContent = gameState.offsideTokens ?? 0;
  document.getElementById('hdr-xp').textContent = gameState.xp ?? 0;
  document.getElementById('hdr-level').textContent = gameState.level ?? 0;
}

// === CHAT ===
const chatEl = document.getElementById('chat');
let lastDateLabel = '';

function getTodayLabel() {
  const now = new Date();
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${now.getDate()} ${months[now.getMonth()]}`;
}
function ensureDateDivider() {
  const label = getTodayLabel();
  if (label !== lastDateLabel) {
    lastDateLabel = label;
    const div = document.createElement('div'); div.className = 'date-divider'; div.innerHTML = `<span>${label}</span>`;
    chatEl.appendChild(div);
  }
}
function scrollChatToBottom() { setTimeout(()=>{ chatEl.scrollTop = chatEl.scrollHeight; }, 50); }

function addMessage(content, type='bot', options={}) {
  ensureDateDivider();
  const wrapper = document.createElement('div'); wrapper.className = `msg-wrapper ${type}`;
  const time = getTimestamp();

  if (type === 'bot') {
    const avatar = document.createElement('div'); avatar.className = 'msg-avatar'+(options.noAvatar?' hidden':''); avatar.textContent='⚽';
    wrapper.appendChild(avatar);
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    if (options.card) bubble.innerHTML = options.card;
    else {
      const textDiv = document.createElement('div'); textDiv.className = 'msg-text';
      if (options.html) textDiv.innerHTML = content; else textDiv.textContent = content;
      bubble.appendChild(textDiv);
    }
    const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time'; timeDiv.textContent = time;
    bubble.appendChild(timeDiv);
    wrapper.appendChild(bubble);
  } else {
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    const textDiv = document.createElement('div'); textDiv.className = 'msg-text';
    if (options.html) textDiv.innerHTML = content; else textDiv.textContent = content;
    bubble.appendChild(textDiv);
    const timeDiv = document.createElement('div'); timeDiv.className = 'msg-time'; timeDiv.innerHTML = `${time} <span>✓✓</span>`;
    bubble.appendChild(timeDiv);
    wrapper.appendChild(bubble);
  }
  chatEl.appendChild(wrapper);
  scrollChatToBottom();
  return wrapper;
}

function addTypingIndicator() {
  ensureDateDivider();
  const wrapper = document.createElement('div'); wrapper.className = 'msg-wrapper bot'; wrapper.id='typing-indicator';
  wrapper.innerHTML = `<div class="msg-avatar">⚽</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  chatEl.appendChild(wrapper); scrollChatToBottom(); return wrapper;
}
function removeTypingIndicator() { const el=document.getElementById('typing-indicator'); if(el)el.remove(); }
function botReply(content, delay=600, options={}) {
  return new Promise(resolve => {
    const typing = addTypingIndicator();
    setTimeout(()=>{ removeTypingIndicator(); resolve(addMessage(content,'bot',options)); }, delay);
  });
}

// === PROFILE CARD ===
function buildProfileCardHTML(s) {
  return `<div class="profile-card"><div class="profile-card-title">📊 Профиль менеджера</div>
    <div class="profile-card-row"><span class="label">👤 Ник</span><span class="value">${escapeHtml(s.nickname)}</span></div>
    <div class="profile-card-row"><span class="label">🏆 Уровень</span><span class="value">${s.level}</span></div>
    <div class="profile-card-row"><span class="label">⭐ XP</span><span class="value">${s.xp}</span></div>
    <div class="profile-card-row"><span class="label">💎 Рубины</span><span class="value">${s.rubins}</span></div>
    <div class="profile-card-row"><span class="label">🔮 Оффсайд-токены</span><span class="value">${s.offsideTokens}</span></div>
    <div class="profile-card-row"><span class="label">🎯 Очки тренировок</span><span class="value">${s.trainingPoints}</span></div>
    <div class="profile-card-row"><span class="label">⚡ Очки OVR</span><span class="value">${s.ovrUpgradePoints}</span></div>
    <div class="profile-card-row"><span class="label">🧩 Фрагменты</span><span class="value">${s.fragments}</span></div>
    <div class="profile-card-row"><span class="label">🎟️ Драфт-токены</span><span class="value">${s.draftTokens}</span></div>
    <div class="profile-card-row"><span class="label">⚽ Матчей сыграно</span><span class="value">${s.matchesPlayed}</span></div>
    <div class="profile-card-row"><span class="label">🥅 Голов забито</span><span class="value">${s.goalsScored}</span></div>
    <div class="profile-card-id">🆔 ID: ${escapeHtml(s.playerId)}</div></div>`;
}

// === REGISTRATION ===
async function startRegistrationFlow() {
  await botReply('Привет! Я — твой виртуальный тренер. 👋\n\nКак тебя зовут? Введи свой никнейм:', 800);
  gameState.awaitingNickname = true; saveState();
}
async function completeRegistration(nickname) {
  const trimmed = nickname.trim();
  if (!trimmed || trimmed.length < 2) { await botReply('Никнейм должен содержать минимум 2 символа.', 500); return; }
  if (trimmed.length > 20) { await botReply('Никнейм слишком длинный (макс. 20).', 500); return; }
  const playerId = generatePlayerId();
  gameState.nickname = trimmed; gameState.playerId = playerId;
  gameState.awaitingNickname = false; gameState.registered = true;
  saveState(); updateHeaderResources();
  await botReply(`Привет, <b>${escapeHtml(trimmed)}</b>! 🎉\n\nТвой ID: <code>${escapeHtml(playerId)}</code>`, 700, {html:true});
  await botReply(null, 900, {card: buildProfileCardHTML(gameState)});
  await botReply('Используй кнопки внизу для навигации. Удачи на поле! ⚽', 600);
}

// === START SCREEN ===
const startOverlay = document.getElementById('start-overlay');
const btnStart = document.getElementById('btn-start');
function hideStartOverlay() { startOverlay.classList.add('hidden'); }
btnStart.addEventListener('click', ()=>{ hideStartOverlay(); startRegistrationFlow(); });

// === SEND MESSAGE ===
const msgInput = document.getElementById('msg-input');
const btnSend = document.getElementById('btn-send');
function sendUserMessage() {
  const text = msgInput.value.trim(); if (!text) return;
  msgInput.value = ''; addMessage(text,'user'); processUserMessage(text);
}
btnSend.addEventListener('click', sendUserMessage);
msgInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendUserMessage(); } });

function processUserMessage(text) {
  const lower = text.toLowerCase().trim();
  if (gameState.awaitingNickname) { completeRegistration(text); return; }
  if (!gameState.registered) { botReply('Нажми кнопку «НАЧАТЬ ИГРУ»!', 500); return; }
  if (lower==='профиль'||lower==='/profile') showProfile();
  else if (lower==='помощь'||lower==='/help') showHelp();
  else if (lower==='состав'||lower==='/squad') handleNavSquad();
  else if (lower==='магазин'||lower==='/shop') handleNavShop();
  else if (lower==='игроки'||lower==='/inventory') handleNavInventory();
  else if (lower==='события'||lower==='/events') handleNavEvents();
  else if (lower==='дивизион'||lower==='/division') handleNavDivision();
  else if (lower==='квесты'||lower==='/quests') handleNavQuests();
  else botReply(`Не понял команду. Напиши «помощь».`, 600);
}

function showProfile() { botReply(null, 500, {card: buildProfileCardHTML(gameState)}); }
function showHelp() {
  botReply(`<div class="msg-text"><b>📖 Доступные команды:</b><br><br><b>профиль</b> — профиль<br><b>состав</b> — состав<br><b>игроки</b> — инвентарь<br><b>магазин</b> — магазин<br><b>события</b> — события<br><b>дивизион</b> — матчи<br><b>квесты</b> — квесты</div>`, 400, {html:true});
}

// === NAVIGATION ===
function setActiveNav(btnId) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const a=document.getElementById(btnId); if(a)a.classList.add('active');
}
function promptRegister() { botReply('Сначала зарегистрируйся!', 400); }

function handleNavSquad() { if(!gameState.registered){promptRegister();return;} setActiveNav('nav-squad'); botReply('👥 <b>Состав</b> — в разработке.', 500, {html:true}); }

    ovrRanges:[{minOvr:45,maxOvr:64,chance:60},{minOvr:65,maxOvr:74,chance:30},{minOvr:75,maxOvr:84,chance:9},{minOvr:85,maxOvr:99,chance:1}]

const DRAFT_CONFIGS = {
  // 'toty': { name:'TOTY Draft', emoji:'🏆', cost:1, costBulk:10, poolA:[], poolB:[], poolC:[] }
};
const DRAFT_PROB_A = 0.01, DRAFT_PROB_B = 0.12;

function pickWeightedRange(ranges) {
  if (!ranges?.length) return null;
  const tw = ranges.reduce((s,r)=>s+(r.chance||0),0);
  if (tw<=0) return ranges[0];
  let rand = Math.random()*tw;
  for (const r of ranges) if ((rand-=r.chance||0)<=0) return r;
  return ranges[ranges.length-1];
}
function getPlayersInOvrRange(min,max) { return allPlayers.filter(p=>p.ovr>=min&&p.ovr<=max); }
function drawPackCards(pack) {
  const drawn = [];
  for (let i=0;i<(pack.count||1);i++) {
    let player = null;
    for (let a=0;a<10;a++) {
      const range = pickWeightedRange(pack.ovrRanges); if (!range) break;
      const candidates = getPlayersInOvrRange(range.minOvr,range.maxOvr);
      if (candidates.length) {
        player = JSON.parse(JSON.stringify(candidates[Math.floor(Math.random()*candidates.length)]));
        player.trainingLevel = 0; player.ovrUpgrade = 0; break;
      }
    }
    if (player) drawn.push(player);
  }
  return drawn;
}
function getPackById(id) { return SHOP_PACKS.find(p=>p.id===id)||null; }
function resolveDraftPull(cfg) {
  const roll = Math.random(); let tier;
  if (roll<DRAFT_PROB_A && cfg.poolA?.length) tier='A';
  else if (roll<DRAFT_PROB_A+DRAFT_PROB_B && cfg.poolB?.length) tier='B';
  else tier='C';
  if (tier==='A'&&!cfg.poolA?.length) tier='B';
  if (tier==='B'&&!cfg.poolB?.length) tier='C';
  if (tier==='C'&&!cfg.poolC?.length) return {tier:'C',player:null};
  const pool = tier==='A'?cfg.poolA:tier==='B'?cfg.poolB:cfg.poolC;
  const pickedId = pool[Math.floor(Math.random()*pool.length)];
  const tpl = allPlayers.find(p=>p.id===pickedId)||null;
  const player = tpl ? JSON.parse(JSON.stringify(tpl)) : null;
  if (player) { player.trainingLevel=0; player.ovrUpgrade=0; }
  return {tier,player};
}
function getDraftConfig(draftId) { return DRAFT_CONFIGS[draftId]||null; }
function getDraftIds() { return Object.keys(DRAFT_CONFIGS); }

  if (r.ovrUpgradePoints) parts.push(`⚡ ${r.ovrUpgradePoints} очк.OVR`);
  if (r.fragments) parts.push(`🧩 ${r.fragments} фрагм.`);

  if (r.playerIds?.length) parts.push(`👤 ${r.playerIds.length} игр.`);
  msg += parts.join(', ')+'.';

  input.value = '';

      gameState.draftTokens -= bulkCost;

      const results      = [];
      let hasBOrBetter   = false;
      let bestPlayer     = null;
      let bestTier       = 'C';

      for (let i = 0; i < 10; i++) {
        let { tier, player } = resolveDraftPull(config);

        gameState.draftCounterB = (gameState.draftCounterB || 0) + 1;
        gameState.draftCounterA = (gameState.draftCounterA || 0) + 1;

        // Per-pull pity checks
        if (gameState.draftCounterB >= 10 && tier === 'C') {
          const forced = forcePoolB(config);
          if (forced) { tier = forced.tier; player = forced.player; }
        }
        if (gameState.draftCounterA >= 100) {

          if (forced) { tier = forced.tier; player = forced.player; }

          gameState.draftCounterA = 0;
          gameState.draftCounterB = 0;
        } else if (tier === 'B') {
          gameState.draftCounterB = 0;

        if (player) {
          gameState.myPlayers.push(player);

          const isBetter =
            tier === 'A' ||
            (tier === 'B' && bestTier !== 'A') ||
            (tier === 'C' && bestTier === 'C' && (!bestPlayer || player.ovr > bestPlayer.ovr));

          if (isBetter) {
            bestPlayer = player;
            bestTier   = tier;
          }
        }

        results.push({ tier, player });

      if (!hasBOrBetter) {

          gameState.myPlayers.push(forced.player);
          results.push({ tier: forced.tier, player: forced.player });

          bestTier   = forced.tier;
          gameState.draftCounterB = 0;

      const others = results.filter(
        r => r.player && r.player !== bestPlayer
      );
      others.sort(
        (a, b) => (b.player ? b.player.ovr : 0) - (a.player ? a.player.ovr : 0)

      if (others.length > 0) {

        400,
        { html: true }
      );
    }

    // === FORCE POOL B (pity helper) ===
    function forcePoolB(config) {
      if (config.poolB && config.poolB.length > 0) {
        const id       = config.poolB[Math.floor(Math.random() * config.poolB.length)];
        const template = allPlayers.find(p => p.id === id);

          player.trainingLevel = 0;
          player.ovrUpgrade    = 0;
          return { tier: 'B', player };
        }
      }
      return null;
    }

    // === FORCE POOL A (pity helper) ===

    function forcePoolA(config) {
      if (config.poolA && config.poolA.length > 0) {

        const template = allPlayers.find(p => p.id === id);

          player.trainingLevel = 0;
          player.ovrUpgrade    = 0;
          return { tier: 'A', player };

      return forcePoolB(config);

          }
        } else if (req.type === 'draftTokens') {
          if ((gameState.draftTokens || 0) < req.amount) {
            await botReply(`❌ Недостаточно жетонов открытия. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'offsideTokens') {
          if ((gameState.offsideTokens || 0) < req.amount) {
            await botReply(`❌ Недостаточно offside tokens. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'trainingPoints') {
          if ((gameState.trainingPoints || 0) < req.amount) {
            await botReply(`❌ Недостаточно очков тренировки. Нужно: ${req.amount}`, 400);
            return;
          }
        } else if (req.type === 'ovrUpgradePoints') {
          if ((gameState.ovrUpgradePoints || 0) < req.amount) {
            await botReply(`❌ Недостаточно очков повышения OVR. Нужно: ${req.amount}`, 400);
            return;
          }
        }
      }

      // ── Deduct currency requirements ────────────────────────────────────────
      for (const req of sbc.requirements) {
        if (req.type === 'rubins')           gameState.rubins           = (gameState.rubins           || 0) - req.amount;
        if (req.type === 'fragments')        gameState.fragments        = (gameState.fragments        || 0) - req.amount;
        if (req.type === 'draftTokens')      gameState.draftTokens      = (gameState.draftTokens      || 0) - req.amount;
        if (req.type === 'offsideTokens')    gameState.offsideTokens    = (gameState.offsideTokens    || 0) - req.amount;
        if (req.type === 'trainingPoints')   gameState.trainingPoints   = (gameState.trainingPoints   || 0) - req.amount;
        if (req.type === 'ovrUpgradePoints') gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) - req.amount;
      }

      // ── Remove consumed players ─────────────────────────────────────────────
      for (const pid of playersToRemove) {
        const idx = gameState.myPlayers.findIndex(p => p.id === pid);
        if (idx !== -1) gameState.myPlayers.splice(idx, 1);
      }

      // ── Apply reward ────────────────────────────────────────────────────────
      const reward = sbc.reward;
      let rewardMsg = '';

      if (reward.type === 'player') {
        const template = allPlayers.find(p => p.id === reward.playerId);
        if (template) {
          const newPlayer = JSON.parse(JSON.stringify(template));
          newPlayer.trainingLevel = 0;
          newPlayer.ovrUpgrade    = 0;
          gameState.myPlayers.push(newPlayer);
          rewardMsg = `👤 ${newPlayer.name} (OVR ${newPlayer.ovr})`;
        }
      } else if (reward.type === 'rubins') {
        gameState.rubins = (gameState.rubins || 0) + (reward.amount || 0);
        rewardMsg = `💎 ${reward.amount} рубинов`;
      } else if (reward.type === 'fragments') {
        gameState.fragments = (gameState.fragments || 0) + (reward.amount || 0);
        rewardMsg = `🧩 ${reward.amount} фрагментов`;
      } else if (reward.type === 'draftTokens') {
        gameState.draftTokens = (gameState.draftTokens || 0) + (reward.amount || 0);
        rewardMsg = `🎟️ ${reward.amount} жетонов`;
      } else if (reward.type === 'trainingPoints') {
        gameState.trainingPoints = (gameState.trainingPoints || 0) + (reward.amount || 0);
        rewardMsg = `🎯 ${reward.amount} оч. тренировки`;
      } else if (reward.type === 'ovrUpgradePoints') {
        gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) + (reward.amount || 0);
        rewardMsg = `⚡ ${reward.amount} оч. OVR`;
      }

      saveState();
      updateHeaderResources();

      await botReply(
        `✅ Обмен «${sbc.title}» выполнен!`
        + (rewardMsg ? `\n🎁 Получено: ${rewardMsg}` : ''),
        500
      );

      // If the exchange is one-time, show a player card for the new player
      if (reward.type === 'player') {
        const acquired = gameState.myPlayers[gameState.myPlayers.length - 1];
        if (acquired) {
          await botReply(null, 600, { card: buildPlayerCardHTML(acquired) });
        }
      }
    }

     * @returns {string}  display text for the reward

    function applyPassReward(reward) {
      if (!reward) return '';
      switch (reward.type) {
        case 'rubins':
          gameState.rubins = (gameState.rubins || 0) + reward.amount;
          return `💎 ${reward.amount} рубинов`;
        case 'fragments':
          gameState.fragments = (gameState.fragments || 0) + reward.amount;
          return `🧩 ${reward.amount} фрагментов`;
        case 'draftTokens':
          gameState.draftTokens = (gameState.draftTokens || 0) + reward.amount;
          return `🎟️ ${reward.amount} жетонов`;
        case 'trainingPoints':
          gameState.trainingPoints = (gameState.trainingPoints || 0) + reward.amount;
          return `🎯 ${reward.amount} оч. тренировки`;
        case 'ovrUpgradePoints':
          gameState.ovrUpgradePoints = (gameState.ovrUpgradePoints || 0) + reward.amount;
          return `⚡ ${reward.amount} оч. OVR`;
        case 'offsideTokens':
          gameState.offsideTokens = (gameState.offsideTokens || 0) + reward.amount;
          return `🚩 ${reward.amount} offside tokens`;
        case 'passCredits':
          gameState.passCredits = (gameState.passCredits || 0) + reward.amount;
          return `🎫 ${reward.amount} кредитов пасса`;
        case 'random_player': {
          const pool = (typeof allPlayers !== 'undefined' ? allPlayers : [])
            .filter(p => p.ovr >= (reward.minOvr || 0) && p.ovr <= (reward.maxOvr || 999));
          if (pool.length === 0) return '👤 (нет игроков в этом диапазоне OVR)';
          const template = pool[Math.floor(Math.random() * pool.length)];
          const newPlayer = JSON.parse(JSON.stringify(template));
          newPlayer.trainingLevel = 0;
          newPlayer.ovrUpgrade    = 0;
          gameState.myPlayers.push(newPlayer);
          return `👤 ${newPlayer.name} (OVR ${newPlayer.ovr})`;
        }
        case 'specific_player': {
          const template = (typeof allPlayers !== 'undefined' ? allPlayers : [])
            .find(p => p.id === reward.playerId);
          if (!template) return `👤 Игрок ID ${reward.playerId} (не найден)`;
          const newPlayer = JSON.parse(JSON.stringify(template));
          newPlayer.trainingLevel = 0;
          newPlayer.ovrUpgrade    = 0;
          gameState.myPlayers.push(newPlayer);
          return `👤 ${newPlayer.name} (OVR ${newPlayer.ovr})`;
        }
        default:
          return reward.type;
      }

    /**
     * @param {string} endDateStr  'YYYY-MM-DD'
     * @returns {number}  days remaining (negative = expired)
     */
    function eventDaysRemaining(endDateStr) {
      if (!endDateStr) return 0;
      const end  = new Date(endDateStr);
      const now  = new Date();
      const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
      return diff;
    }

    function buildEventCardHTML(event) {
      const days    = eventDaysRemaining(event.endDate);
      const expired = days <= 0;
      const daysTxt = expired
        ? '<span style="color:#e05050;">Завершено</span>'
        : `<span style="color:#4dc05a;">Ещё ${days} дн.</span>`;

      let buttonsHtml = '';
      if (!expired) {
        if (event.draftId) {
          buttonsHtml += `<button class="inline-btn" onclick="showDraftMenu('${event.draftId}')">`
                       + `🎟️ Открыть драфт</button>`;
        }
        if (event.packId) {
          buttonsHtml += `<button class="inline-btn" onclick="openPackMenu('${event.packId}')">`
                       + `📦 Открыть пак</button>`;
        }
      }

      return `<div style="background:linear-gradient(135deg,#1a2f45,#1e3550);`
           + `border:1px solid ${event.color};border-radius:10px;padding:12px;margin:4px 0;`
           + `opacity:${expired ? '0.6' : '1'};">`

           + (buttonsHtml ? `<div class="inline-btn-row">${buttonsHtml}</div>` : '')
           + `</div>`;

          : '';
        const ovrUpBadge = (player.ovrUpgrade > 0)
          ? `<span style="font-size:9px;background:#f0c040;color:#000;padding:1px 5px;border-radius:8px;">+${player.ovrUpgrade} OVR</span>`
          : '';
        const programBadge = player.program
          ? `<span style="font-size:10px;color:#5288c1;">${player.program}</span>`
          : '';

        return `
          <div style="background:linear-gradient(135deg,#1a2f45,#1e3550);border:1px solid ${color};border-radius:10px;padding:10px 12px;cursor:pointer;margin:2px 0;" onclick="showPlayerDetail(${player.id})">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:44px;height:44px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;">${player.position}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${player.name}</div>
                <div style="font-size:11px;color:#7d8e9e;">${player.club} • ${player.nation}</div>
                <div style="display:flex;gap:4px;margin-top:2px;">
                  ${programBadge}
                  ${trainingBadge}
                  ${ovrUpBadge}
                </div>
              </div>
              <div style="font-size:24px;font-weight:900;color:#f0c040;min-width:40px;text-align:center;">${effOvr}</div>
            </div>
            ${statsHtml}
          </div>`;
      }
    }

    if (typeof showPlayerDetail !== 'function') {
      function showPlayerDetail(playerId) {
        const player = findPlayerById(playerId);
        if (!player) return;
        const detailHtml = buildPlayerCardHTML(player);
        botReply(null, 200, { card: detailHtml });
      }
    }
// ============================================
// === INSERT MODULE: inventory modal ===
// ============================================

    function openInventoryModal() {
      let overlay = document.getElementById('inventory-modal');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'inventory-modal';
        overlay.className = 'modal-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;';
        overlay.innerHTML = `
          <div id="inv-modal-box" style="background:#17212b;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:16px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
              <h3 style="margin:0;font-size:16px;">🎒 Мои игроки</h3>
              <button onclick="closeInventoryModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;">✕</button>
            </div>
            <div id="inv-filters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;"></div>
            <div id="inv-list" style="display:flex;flex-direction:column;gap:4px;"></div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) closeInventoryModal();
        });
      }
      overlay.style.display = 'flex';
      renderInventoryFilters();
      renderInventoryList();
    }

    function closeInventoryModal() {
      const overlay = document.getElementById('inventory-modal');
      if (overlay) overlay.style.display = 'none';
    }

    function renderInventoryFilters() {
      const container = document.getElementById('inv-filters');
      if (!container) return;

      const clubs = [...new Set((gameState.myPlayers || []).map(p => p.club))].sort();
      const nations = [...new Set((gameState.myPlayers || []).map(p => p.nation))].sort();
      const programs = [...new Set((gameState.myPlayers || []).map(p => p.program).filter(Boolean))].sort();
      const positions = [...new Set((gameState.myPlayers || []).map(p => p.position))].sort();

      let html = '<select id="filter-club" onchange="renderInventoryList()" style="background:#0e1621;border:1px solid #1e2d3d;color:#fff;border-radius:6px;padding:4px 8px;font-size:12px;">';
      html += '<option value="">Все клубы</option>';
      for (const c of clubs) html += `<option value="${c}">${c}</option>`;
      html += '</select>';

      html += '<select id="filter-nation" onchange="renderInventoryList()" style="background:#0e1621;border:1px solid #1e2d3d;color:#fff;border-radius:6px;padding:4px 8px;font-size:12px;">';
      html += '<option value="">Все страны</option>';
      for (const n of nations) html += `<option value="${n}">${n}</option>`;
      html += '</select>';

      html += '<select id="filter-position" onchange="renderInventoryList()" style="background:#0e1621;border:1px solid #1e2d3d;color:#fff;border-radius:6px;padding:4px 8px;font-size:12px;">';
      html += '<option value="">Все позиции</option>';
      for (const p of positions) html += `<option value="${p}">${p}</option>`;
      html += '</select>';

      if (programs.length > 0) {
        html += '<select id="filter-program" onchange="renderInventoryList()" style="background:#0e1621;border:1px solid #1e2d3d;color:#fff;border-radius:6px;padding:4px 8px;font-size:12px;">';
        html += '<option value="">Все программы</option>';
        for (const pr of programs) html += `<option value="${pr}">${pr}</option>`;
        html += '</select>';
      }

      html += '<select id="filter-ovr" onchange="renderInventoryList()" style="background:#0e1621;border:1px solid #1e2d3d;color:#fff;border-radius:6px;padding:4px 8px;font-size:12px;">';
      html += '<option value="">Любой OVR</option>';
      html += '<option value="45-64">45-64</option><option value="65-74">65-74</option><option value="75-84">75-84</option><option value="85-94">85-94</option><option value="95-120">95+</option>';
      html += '</select>';

      container.innerHTML = html;
    }

    function renderInventoryList() {
      const container = document.getElementById('inv-list');
      if (!container) return;

      const clubFilter = document.getElementById('filter-club')?.value || '';
      const nationFilter = document.getElementById('filter-nation')?.value || '';
      const posFilter = document.getElementById('filter-position')?.value || '';
      const progFilter = document.getElementById('filter-program')?.value || '';
      const ovrFilter = document.getElementById('filter-ovr')?.value || '';

      let filtered = [...(gameState.myPlayers || [])];

      if (clubFilter) filtered = filtered.filter(p => p.club === clubFilter);
      if (nationFilter) filtered = filtered.filter(p => p.nation === nationFilter);
      if (posFilter) filtered = filtered.filter(p => p.position === posFilter);
      if (progFilter) filtered = filtered.filter(p => p.program === progFilter);
      if (ovrFilter) {
        const [min, max] = ovrFilter.split('-').map(Number);
        filtered = filtered.filter(p => getEffectiveOvr(p) >= min && getEffectiveOvr(p) <= (max || 999));
      }

      filtered.sort((a, b) => getEffectiveOvr(b) - getEffectiveOvr(a));

      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#7d8e9e;padding:20px;">Нет игроков по выбранным фильтрам.</div>';
        return;
      }

      let html = '';
      for (const player of filtered) {
        html += buildPlayerCardHTML(player);
        html += `<div style="display:flex;gap:6px;margin-bottom:4px;">
          <button class="inline-btn" onclick="exchangePlayerForFragments(${player.id})" style="font-size:10px;padding:3px 8px;">🧩 Обменять на фрагменты</button>
        </div>`;
      }
      container.innerHTML = html;
    }

    async function exchangePlayerForFragments(playerId) {
      const idx = (gameState.myPlayers || []).findIndex(p => p.id === playerId);
      if (idx === -1) {
        await botReply('❌ Игрок не найден.', 300);
        return;
      }
      const player = gameState.myPlayers[idx];
      const ovr = getEffectiveOvr(player);
      const frags = getFragmentReward(ovr);

      gameState.myPlayers.splice(idx, 1);
      gameState.fragments = (gameState.fragments || 0) + frags;
      saveState();
      updateHeaderResources();

      await botReply(`🧩 Игрок <b>${player.name}</b> обменян на <b>${frags}</b> фрагментов.`, 500, { html: true });

      if (document.getElementById('inventory-modal')?.style.display === 'flex') {
        renderInventoryList();
      }
    }

    // Переопределяем навигационную функцию
    const _origHandleNavInventory2 = handleNavInventory;
    handleNavInventory = function() {
      if (!gameState.registered) { promptRegister(); return; }
      setActiveNav('nav-inventory');
      openInventoryModal();
    };
// ========== INIT ==========
function init() {
  loadState(); updateHeaderResources();
  allPlayers = JSON.parse(JSON.stringify(ALL_PLAYERS_TEMPLATE));
  if (!gameState.myPlayers || gameState.myPlayers.length === 0) {
    gameState.myPlayers = STARTER_PLAYER_IDS.map(id=>allPlayers.find(p=>p.id===id)).filter(p=>p).map(p=>JSON.parse(JSON.stringify(p)));
    saveState();
  }
  if (gameState.registered) { hideStartOverlay(); botReply(`С возвращением, <b>${escapeHtml(gameState.nickname)}</b>! ⚽`, 600, {html:true}); }
  else if (gameState.awaitingNickname) { hideStartOverlay(); botReply('Введи никнейм для продолжения регистрации:', 400); }
  else { startOverlay.classList.remove('hidden'); }
}
document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
</script>
